<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0f1419; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0f1419;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1a2332;
  padding: 12pt 30pt;
}
.header-title {
  color: #00d9ff;
  font-size: 20pt;
  font-weight: bold;
  margin: 0;
}
.content {
  padding: 15pt 30pt;
  flex: 1;
}
.principle {
  display: flex;
  align-items: center;
  margin-bottom: 12pt;
  background: #1a2332;
  padding: 12pt 15pt;
  border-radius: 8pt;
}
.principle-icon {
  width: 45pt;
  height: 45pt;
  background: #00d9ff;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-right: 15pt;
}
.icon-text {
  color: #0f1419;
  font-size: 20pt;
  font-weight: bold;
  margin: 0;
}
.principle-content {
  flex: 1;
}
.principle-title {
  color: #00d9ff;
  font-size: 16pt;
  font-weight: bold;
  margin: 0 0 3pt 0;
}
.principle-desc {
  color: #cccccc;
  font-size: 13pt;
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1 class="header-title">核心理念（用游戏语言）</h1>
</div>
<div class="content">
  <div class="principle">
    <div class="principle-icon"><p class="icon-text">1</p></div>
    <div class="principle-content">
      <p class="principle-title">协调 > 控制</p>
      <p class="principle-desc">5人组队打本 ≠ 1人指挥4个挂机</p>
    </div>
  </div>
  <div class="principle">
    <div class="principle-icon"><p class="icon-text">2</p></div>
    <div class="principle-content">
      <p class="principle-title">专业 > 通用</p>
      <p class="principle-desc">战法牧各司其职 ≠ 全能号单刷</p>
    </div>
  </div>
  <div class="principle">
    <div class="principle-icon"><p class="icon-text">3</p></div>
    <div class="principle-content">
      <p class="principle-title">标准 > 随意</p>
      <p class="principle-desc">看攻略打副本 ≠ 瞎打碰运气</p>
    </div>
  </div>
</div>
</body>
</html>
