<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0f1419; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0f1419;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.quote {
  color: #ffffff;
  font-size: 24pt;
  font-style: italic;
  margin: 0 0 30pt 0;
  text-align: center;
  max-width: 500pt;
  line-height: 1.5;
}
.highlight {
  color: #00d9ff;
  font-weight: bold;
}
</style>
</head>
<body>
<p class="quote">"把团队最好的工作方式，<br/><span class="highlight">固化成 AI 能执行的标准</span>"</p>
</body>
</html>
