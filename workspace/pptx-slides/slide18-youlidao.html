<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0f1419; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0f1419;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1a2332;
  padding: 15pt 30pt;
}
.header-title {
  color: #00d9ff;
  font-size: 22pt;
  font-weight: bold;
  margin: 0;
}
.content {
  padding: 25pt 30pt;
  flex: 1;
}
.features {
  display: flex;
  justify-content: space-between;
}
.feature {
  width: 200pt;
  background: #1a2332;
  padding: 20pt;
  border-radius: 8pt;
  text-align: center;
  border-top: 4pt solid #00d9ff;
}
.feature-icon {
  color: #00d9ff;
  font-size: 36pt;
  margin: 0 0 10pt 0;
}
.feature-title {
  color: #ffffff;
  font-size: 16pt;
  font-weight: bold;
  margin: 0 0 10pt 0;
}
.feature-desc {
  color: #aaaaaa;
  font-size: 11pt;
  margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1 class="header-title">youlidao.ai 核心价值</h1>
</div>
<div class="content">
  <div class="features">
    <div class="feature">
      <p class="feature-icon">⊞</p>
      <p class="feature-title">可视化</p>
      <p class="feature-desc">拖拽式交互</p>
      <p class="feature-desc">不用命令行</p>
    </div>
    <div class="feature">
      <p class="feature-icon">☷</p>
      <p class="feature-title">团队协作</p>
      <p class="feature-desc">多人同时操作</p>
      <p class="feature-desc">评论和反馈</p>
    </div>
    <div class="feature">
      <p class="feature-icon">◎</p>
      <p class="feature-title">进度可视</p>
      <p class="feature-desc">看板视图</p>
      <p class="feature-desc">状态一目了然</p>
    </div>
  </div>
</div>
</body>
</html>
