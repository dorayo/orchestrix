<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0f1419; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0f1419;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1a2332;
  padding: 15pt 30pt;
}
.header-title {
  color: #00d9ff;
  font-size: 22pt;
  font-weight: bold;
  margin: 0;
}
.content {
  padding: 20pt 30pt;
  flex: 1;
}
.phases {
  display: flex;
  justify-content: space-between;
}
.phase {
  width: 155pt;
  background: #1a2332;
  border-radius: 8pt;
  overflow: hidden;
}
.phase-header {
  background: #2d3d4a;
  padding: 10pt;
  text-align: center;
}
.phase-title {
  color: #00d9ff;
  font-size: 14pt;
  font-weight: bold;
  margin: 0;
}
.phase-time {
  color: #aaaaaa;
  font-size: 10pt;
  margin: 5pt 0 0 0;
}
.phase-body {
  padding: 12pt;
}
.phase-item {
  color: #ffffff;
  font-size: 10pt;
  margin: 0 0 5pt 0;
}
</style>
</head>
<body>
<div class="header">
  <h1 class="header-title">分阶段落地路径</h1>
</div>
<div class="content">
  <div class="phases">
    <div class="phase">
      <div class="phase-header">
        <p class="phase-title">体验期</p>
        <p class="phase-time">1-2周</p>
      </div>
      <div class="phase-body">
        <p class="phase-item">目标：初步感受</p>
        <p class="phase-item">选一个小功能</p>
        <p class="phase-item">跑一遍流程</p>
      </div>
    </div>
    <div class="phase">
      <div class="phase-header">
        <p class="phase-title">试点期</p>
        <p class="phase-time">2-4周</p>
      </div>
      <div class="phase-body">
        <p class="phase-item">目标：真实验证</p>
        <p class="phase-item">非核心模块</p>
        <p class="phase-item">完整走流程</p>
      </div>
    </div>
    <div class="phase">
      <div class="phase-header">
        <p class="phase-title">推广期</p>
        <p class="phase-time">1-2月</p>
      </div>
      <div class="phase-body">
        <p class="phase-item">目标：扩大范围</p>
        <p class="phase-item">更多模块</p>
        <p class="phase-item">更多成员</p>
      </div>
    </div>
    <div class="phase">
      <div class="phase-header">
        <p class="phase-title">定制期</p>
        <p class="phase-time">持续</p>
      </div>
      <div class="phase-body">
        <p class="phase-item">目标：深度优化</p>
        <p class="phase-item">游戏专用Agent</p>
        <p class="phase-item">定制工作流</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
