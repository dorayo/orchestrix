<!DOCTYPE html><html><head><style>
html{background:#0B0F19}
body{width:720pt;height:405pt;margin:0;padding:0;font-family:Arial,sans-serif;display:flex;flex-direction:column;position:relative;overflow:hidden;background-image:url('../assets/bg-pain.png');background-size:cover;background-position:center}
</style></head><body>
<div style="position:absolute;top:0;left:0;width:100%;height:100%">
  <img src="../assets/grid.png" style="width:100%;height:100%;position:absolute;top:0;left:0;opacity:0.15">
</div>
<div style="margin:45pt 55pt 0 55pt;position:relative">
  <p style="color:#F85149;font-size:10pt;letter-spacing:3pt;margin:0">THE PROBLEM</p>
  <h1 style="color:#FFFFFF;font-size:32pt;margin:8pt 0 0 0">软件开发，为什么这么痛？</h1>
  <div style="margin-top:8pt"><img src="../assets/accent-gold.png" style="width:80pt;height:2pt"></div>
</div>
<div style="display:flex;margin:30pt 55pt 0 55pt;gap:20pt;position:relative">
  <div style="flex:1;background:#141B2D;border:1pt solid #1E293B;border-radius:8pt;padding:22pt 18pt;border-top:3pt solid #F85149">
    <h2 style="color:#F85149;font-size:28pt;margin:0;font-weight:bold">200万+</h2>
    <p style="color:#FFB84D;font-size:11pt;margin:6pt 0 0 0;font-weight:bold">年均人力成本</p>
    <p style="color:#A0AEC0;font-size:10pt;margin:8pt 0 0 0;line-height:1.5">一个 5 人技术团队的年薪、社保、管理成本</p>
  </div>
  <div style="flex:1;background:#141B2D;border:1pt solid #1E293B;border-radius:8pt;padding:22pt 18pt;border-top:3pt solid #FFB84D">
    <h2 style="color:#FFB84D;font-size:28pt;margin:0;font-weight:bold">3-6 个月</h2>
    <p style="color:#FFB84D;font-size:11pt;margin:6pt 0 0 0;font-weight:bold">平均交付周期</p>
    <p style="color:#A0AEC0;font-size:10pt;margin:8pt 0 0 0;line-height:1.5">从需求确认到 MVP 上线的漫长等待</p>
  </div>
  <div style="flex:1;background:#141B2D;border:1pt solid #1E293B;border-radius:8pt;padding:22pt 18pt;border-top:3pt solid #6C63FF">

    <p style="color:#FFB84D;font-size:11pt;margin:6pt 0 0 0;font-weight:bold">非编码时间</p>
    <p style="color:#A0AEC0;font-size:10pt;margin:8pt 0 0 0;line-height:1.5">沟通、会议、返工、等待确认消耗大量时间</p>
  </div>
</div>
<div style="margin:22pt 55pt 0 55pt;position:relative">
  <p style="color:#5A6578;font-size:10pt;margin:0;text-align:center">传统软件开发中，写代码只占总时间的 20%，剩下的 80% 都在沟通和返工</p>
