<!DOCTYPE html><html><head><style>
html{background:#0B0F19}
body{width:720pt;height:405pt;margin:0;padding:0;font-family:Arial,sans-serif;display:flex;flex-direction:column;position:relative;overflow:hidden;background-image:url('../assets/bg-content.png');background-size:cover;background-position:center}
</style></head><body>
<div style="position:absolute;top:0;left:0;width:100%;height:100%">
  <img src="../assets/grid.png" style="width:100%;height:100%;position:absolute;top:0;left:0;opacity:0.12">
</div>
<div style="margin:40pt 55pt 0 55pt;position:relative">
  <p style="color:#00D2FF;font-size:22pt;margin:0;font-weight:bold">01</p>
  <h1 style="color:#FFFFFF;font-size:28pt;margin:4pt 0 0 0">创业者的 MVP 加速器</h1>
</div>
<div style="margin:20pt 55pt 0 55pt;display:flex;gap:16pt;position:relative">
  <div style="flex:1;background:rgba(248,81,73,0.08);border:1pt solid rgba(248,81,73,0.3);border-radius:8pt;padding:18pt">
    <p style="color:#F85149;font-size:10pt;margin:0;font-weight:bold;letter-spacing:1pt">BEFORE</p>
    <p style="color:#A0AEC0;font-size:10pt;margin:12pt 0 0 0;line-height:1.6">招聘团队：2-3 个月</p>
    <p style="color:#A0AEC0;font-size:10pt;margin:4pt 0 0 0;line-height:1.6">外包沟通：效率低下</p>
    <p style="color:#A0AEC0;font-size:10pt;margin:4pt 0 0 0;line-height:1.6">预算门槛：50 万+</p>
    <p style="color:#A0AEC0;font-size:10pt;margin:4pt 0 0 0;line-height:1.6">交付周期：3-6 个月</p>
  </div>
  <div style="display:flex;align-items:center"><p style="color:#6C63FF;font-size:18pt;margin:0">&#x25B6;</p></div>
  <div style="flex:1;background:rgba(63,185,80,0.08);border:1pt solid rgba(63,185,80,0.3);border-radius:8pt;padding:18pt">
    <p style="color:#3FB950;font-size:10pt;margin:0;font-weight:bold;letter-spacing:1pt">AFTER</p>
    <p style="color:#FFFFFF;font-size:10pt;margin:12pt 0 0 0;line-height:1.6;font-weight:bold">即刻开始，无需招聘</p>
    <p style="color:#FFFFFF;font-size:10pt;margin:4pt 0 0 0;line-height:1.6;font-weight:bold">直接对话 AI，零沟通损耗</p>
    <p style="color:#FFFFFF;font-size:10pt;margin:4pt 0 0 0;line-height:1.6;font-weight:bold">3000 元/月起</p>
    <p style="color:#FFFFFF;font-size:10pt;margin:4pt 0 0 0;line-height:1.6;font-weight:bold">数天内获得可用原型</p>
  </div>
</div>
<div style="margin:22pt 55pt 0 55pt;background:#141B2D;border:1pt solid #FFB84D;border-radius:8pt;padding:14pt 20pt;text-align:center">
  <p style="color:#FFB84D;font-size:14pt;margin:0;font-weight:bold">从想法到 MVP：数天 vs 数月</p>
</div></body></html>
