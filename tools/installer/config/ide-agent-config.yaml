# IDE-specific agent configurations
# This file defines agent-specific settings for different IDEs

# Claude Code automation preferences
# Agents with auto-task capabilities for enhanced automation
claude-code-automation:
  # Core development cycle agents (priority auto-tasks)
  sm:
    preferred-tasks: ["create-story-auto.md", "create-next-story.md"]
    automation-level: "high"
    description: "Story creation with automatic context assembly"
  architect:
    preferred-tasks: ["create-doc-auto.md", "review-story-technical-auto.md", "create-doc.md", "review-story-technical-accuracy.md"]  
    automation-level: "high"
    description: "Architecture docs and technical review automation"
  dev:
    preferred-tasks: ["implement-story-auto.md"]
    automation-level: "high"
    description: "Story implementation with automated quality checks"
  qa:
    preferred-tasks: ["review-code-auto.md", "review-story.md", "validate-compilation-auto.md", "validate-container-auto.md", "validate-functional-auto.md"]
    automation-level: "high" 
    description: "Code review with comprehensive testing validation and refactoring capabilities"
  po:
    preferred-tasks: ["shard-doc-auto.md", "shard-doc.md"]
    automation-level: "medium"
    description: "Document sharding for development phase transition"
  
  # Planning phase agents (selective automation)
  analyst:
    preferred-tasks: ["create-doc-auto.md", "create-doc.md"]
    automation-level: "medium"
    description: "Project brief and research document generation"
  pm:
    preferred-tasks: ["create-doc-auto.md", "create-doc.md"]
    automation-level: "medium"
    description: "PRD and requirement document automation"
    
  # Orchestration agent (full automation capabilities)
  orchestrix-orchestrator:
    preferred-tasks: ["orchestrator-automation.md"]
    automation-level: "maximum"
    description: "Intelligent workflow coordination and agent orchestration"

# Roo Code file permissions
# Each agent can have restricted file access based on regex patterns
# If an agent is not listed here, it gets full edit access
roo-permissions:
  # Core agents
  analyst:
    fileRegex: "\\.(md|txt)$"
    description: "Documentation and text files"
  pm:
    fileRegex: "\\.(md|txt)$"
    description: "Product documentation"
  architect:
    fileRegex: "\\.(md|txt|yml|yaml|json)$"
    description: "Architecture docs and configs"
  qa:
    fileRegex: "\\.(test|spec)\\.(js|ts|jsx|tsx)$|\\.md$"
    description: "Test files and documentation"
  ux-expert:
    fileRegex: "\\.(md|css|scss|html|jsx|tsx)$"
    description: "Design-related files"
  po:
    fileRegex: "\\.(md|txt)$"
    description: "Story and requirement docs"
  sm:
    fileRegex: "\\.(md|txt)$"
    description: "Process and planning docs"
  # Expansion pack agents
  game-designer:
    fileRegex: "\\.(md|txt|json|yaml|yml)$"
    description: "Game design documents and configs"
  game-sm:
    fileRegex: "\\.(md|txt)$"
    description: "Game project management docs"

# Cline agent ordering
# Lower numbers appear first in the list
# Agents not listed get order 99
cline-order:
  # Core agents - automation-first ordering
  orchestrix-orchestrator: 1  # Primary automation coordinator
  orchestrix-master: 2
  sm: 3                        # Core development cycle start
  architect: 4                 # Technical review
  dev: 5                       # Implementation 
  qa: 6                        # Code review
  po: 7                        # Quality control and phase transition
  analyst: 8                   # Planning phase
  pm: 9                        # Planning phase
  ux-expert: 10
  # Expansion pack agents
  orchestrix-the-creator: 11
  game-designer: 12
  game-developer: 13
  game-sm: 14
  infra-devops-platform: 15