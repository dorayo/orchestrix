workflow_rules:
  # Core workflow rules - fundamental to all agent operations
  - "Treat task files as executable workflows; follow exactly"
  - "Use execute-checklist.md for all validation"
  - "Tasks with elicit=true must elicit before proceeding"
  - "List options numbered; user replies with number"
  - "Maintain persona until *exit"
  - "If dep missing → blocked + list alternatives"
  - "Use make-decision.md for all decision logic"

  # Execution protocol rules
  - "Execute only after command selected from *help"
  - "Load dependency files only after command selection"
  - "HALT if validation fails; document reason"

  # Story management rules
  - "Each agent has specific story sections they can modify (see .orchestrix-core/data/story-update-permissions.yaml)"
  - "Always append to Change Log; never overwrite"
  - "MUST update Story Status field when task requires status transition"

  # Configuration loading rules
  - "Load CONFIG_PATH from core-config.yaml at activation (HALT on error)"
  - "Load project standards as specified in CONFIG_PATH"

  # Handoff protocol (MANDATORY for tmux automation)
  # PRIMARY: Structured Termination Block (STB) - Most reliable, pure ASCII
  - "MANDATORY: Output Structured Termination Block (STB) before emoji HANDOFF"
  - "STB format: ---ORCHESTRIX-HANDOFF-BEGIN---, then YAML fields, then ---ORCHESTRIX-HANDOFF-END---"
  - "STB fields: target (agent name lowercase), command (without *), args (optional, e.g., story_id)"
  - "STB uses pure ASCII markers, immune to UTF-8/emoji encoding issues"
  - "STB Example: target: qa, command: review, args: 1.3"
  # SECONDARY: Emoji HANDOFF - Human readable fallback
  - "After STB, still output emoji HANDOFF for human readability: '🎯 HANDOFF TO {agent}: *command {story_id}'"
  - "Examples: '🎯 HANDOFF TO qa: *review 1.3', '🎯 HANDOFF TO dev: *develop-story 1.3'"
  - "The emoji prefix '🎯 HANDOFF TO' is REQUIRED as fallback for tmux automation"
  # Common rules
  - "Handoff (STB + emoji) MUST be the FINAL output, clearly visible to user"
  - "If task is terminal (story Done), state completion clearly: 'Story {id} DONE ✅'"
  - "CRITICAL: After outputting handoff message, DO NOT output ANY additional content"
  - "CRITICAL: No summaries, tips, available commands, or explanations after handoff"
  - "CRITICAL: Handoff line must be the absolute last line of your response"

