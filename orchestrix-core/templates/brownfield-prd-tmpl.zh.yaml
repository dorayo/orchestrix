        - id: "1.2"
          title: "前端 - AI 搜索 UI 组件"
          repository_type: frontend
          estimated_complexity: medium
          priority: P0

          acceptance_criteria:
            - id: AC1
              title: "搜索栏中的 AI 搜索切换"
              scenario:
                given: "用户在任何带搜索栏的页面"
                when: "用户点击 AI 搜索切换"
                then:
                  - "切换在 AI 和关键词模式之间切换"
