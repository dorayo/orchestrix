        title: 监控栈
        template: |
          - **前端监控:** {{frontend_monitoring}}
          - **后端监控:** {{backend_monitoring}}
          - **错误追踪:** {{error_tracking}}
          - **性能监控:** {{perf_monitoring}}
      - id: key-metrics
