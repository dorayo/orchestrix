template:
  id: fullstack-architecture-template-v2
  name: 全栈架构文档
  version: 2.0
  output:
    format: markdown
    filename: docs/architecture.md
    title: "{{project_name}} 全栈架构文档"

workflow:
  mode: interactive
  elicitation: advanced-elicitation

sections:
  - id: introduction
    title: 引言
    instruction: |
      If available, review any provided relevant documents to gather all relevant context before beginning. At minimum, you should have access to docs/prd.md and docs/front-end-spec.md. Ask the user for any documents you need but cannot locate. This template creates a unified architecture that covers both backend and frontend concerns to guide AI-driven fullstack development.
    elicit: true
    content: |
      本文档概述了 {{project_name}} 的完整全栈架构，包括后端系统、前端实现及其集成方式。它是 AI 驱动开发的唯一真实来源，确保整个技术栈的一致性。

      这种统一方法将传统上分离的后端和前端架构文档结合在一起，简化了现代全栈应用的开发流程，因为这些关注点越来越紧密地交织在一起。
    sections:
      - id: starter-template
        title: 启动模板或现有项目
        instruction: |
          Before proceeding with architecture design, check if the project is based on any starter templates or existing codebases:

          1. Review the PRD and other documents for mentions of:
          - Fullstack starter templates (e.g., T3 Stack, MEAN/MERN starters, Django + React templates)
          - Monorepo templates (e.g., Nx, Turborepo starters)
          - Platform-specific starters (e.g., Vercel templates, AWS Amplify starters)
          - Existing projects being extended or cloned

          2. If starter templates or existing projects are mentioned:
          - Ask the user to provide access (links, repos, or files)
          - Analyze to understand pre-configured choices and constraints
          - Note any architectural decisions already made
          - Identify what can be modified vs what must be retained

          3. If no starter is mentioned but this is greenfield:
          - Suggest appropriate fullstack starters based on tech preferences
          - Consider platform-specific options (Vercel, AWS, etc.)
          - Let user decide whether to use one

          4. Document the decision and any constraints it imposes

          If none, state "N/A - Greenfield project"
      - id: changelog
        title: 变更日志
        type: table
        columns: [日期, 版本, 描述, 作者]
        instruction: Track document versions and changes

  - id: high-level-architecture
    title: 高层架构
    instruction: This section contains multiple subsections that establish the foundation. Present all subsections together, then elicit feedback on the complete section.
    elicit: true
    sections:
      - id: technical-summary
        title: 技术概述
        instruction: |
          Provide a comprehensive overview (4-6 sentences) covering:
          - Overall architectural style and deployment approach
          - Frontend framework and backend technology choices
          - Key integration points between frontend and backend
          - Infrastructure platform and services
          - How this architecture achieves PRD goals
      - id: platform-infrastructure
        title: 平台与基础设施选择
        instruction: |
          Based on PRD requirements and technical assumptions, make a platform recommendation:

          1. Consider common patterns (not an exhaustive list, use your own best judgement and search the web as needed for emerging trends):
          - **Vercel + Supabase**: For rapid development with Next.js, built-in auth/storage
          - **AWS Full Stack**: For enterprise scale with Lambda, API Gateway, S3, Cognito
          - **Azure**: For .NET ecosystems or enterprise Microsoft environments
          - **Google Cloud**: For ML/AI heavy applications or Google ecosystem integration

          2. Present 2-3 viable options with clear pros/cons
          3. Make a recommendation with rationale
          4. Get explicit user confirmation

          Document the choice and key services that will be used.
        template: |
          **平台:** {{selected_platform}}
          **核心服务:** {{core_services_list}}
          **部署主机与区域:** {{regions}}
      - id: repository-structure
        title: 仓库结构
        instruction: |
          Define the repository approach based on PRD requirements and platform choice, explain your rationale or ask questions to the user if unsure:

          1. For modern fullstack apps, monorepo is often preferred
          2. Consider tooling (Nx, Turborepo, Lerna, npm workspaces)
          3. Define package/app boundaries
          4. Plan for shared code between frontend and backend
        template: |
          **结构:** {{repo_structure_choice}}
          **Monorepo 工具:** {{monorepo_tool_if_applicable}}
          **包组织方式:** {{package_strategy}}
      - id: architecture-diagram
        title: 高层架构图
        type: mermaid
        mermaid_type: graph
        instruction: |
          Create a Mermaid diagram showing the complete system architecture including:
          - User entry points (web, mobile)
          - Frontend application deployment
          - API layer (REST/GraphQL)
          - Backend services
          - Databases and storage
          - External integrations
          - CDN and caching layers

          Use appropriate diagram type for clarity.
      - id: architectural-patterns
        title: 架构模式
        instruction: |
          List patterns that will guide both frontend and backend development. Include patterns for:
          - Overall architecture (e.g., Jamstack, Serverless, Microservices)
          - Frontend patterns (e.g., Component-based, State management)
          - Backend patterns (e.g., Repository, CQRS, Event-driven)
          - Integration patterns (e.g., BFF, API Gateway)

          For each pattern, provide recommendation and rationale.
        repeatable: true
        template: "- **{{pattern_name}}:** {{pattern_description}} - _理由:_ {{rationale}}"
        examples:
          - "**Jamstack 架构:** 使用无服务器 API 的静态站点生成 - _理由:_ 为内容密集型应用提供最佳性能和可扩展性"
          - "**组件化 UI:** 使用 TypeScript 的可复用 React 组件 - _理由:_ 大型代码库的可维护性和类型安全"
          - "**仓库模式:** 抽象数据访问逻辑 - _理由:_ 支持测试和未来数据库迁移的灵活性"
          - "**API 网关模式:** 所有 API 调用的单一入口点 - _理由:_ 集中式认证、限流和监控"

  - id: tech-stack
    title: 技术栈
    instruction: |
      This is the DEFINITIVE technology selection for the entire project. Work with user to finalize all choices. This table is the single source of truth - all development must use these exact versions.

      Key areas to cover:
      - Frontend and backend languages/frameworks
      - Databases and caching
      - Authentication and authorization
      - API approach
      - Testing tools for both frontend and backend
      - Build and deployment tools
      - Monitoring and logging

      Upon render, elicit feedback immediately.
    elicit: true
    sections:
      - id: tech-stack-table
        title: 技术栈表
        type: table
        columns: [类别, 技术, 版本, 用途, 选择理由]
        rows:
          - ["前端语言", "{{fe_language}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["前端框架", "{{fe_framework}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["UI 组件库", "{{ui_library}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["状态管理", "{{state_mgmt}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["后端语言", "{{be_language}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["后端框架", "{{be_framework}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["API 风格", "{{api_style}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["数据库", "{{database}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["缓存", "{{cache}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["文件存储", "{{storage}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["认证", "{{auth}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["前端测试", "{{fe_test}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["后端测试", "{{be_test}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["E2E 测试", "{{e2e_test}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["构建工具", "{{build_tool}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["打包工具", "{{bundler}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["IaC 工具", "{{iac_tool}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["CI/CD", "{{cicd}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["监控", "{{monitoring}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["日志", "{{logging}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]
          - ["CSS 框架", "{{css_framework}}", "{{version}}", "{{purpose}}", "{{why_chosen}}"]

  - id: data-models
    title: 数据模型
    instruction: |
      Define the core data models/entities that will be shared between frontend and backend:

      1. Review PRD requirements and identify key business entities
      2. For each model, explain its purpose and relationships
      3. Include key attributes and data types
      4. Show relationships between models
      5. Create TypeScript interfaces that can be shared
      6. Discuss design decisions with user

      Create a clear conceptual model before moving to database schema.
    elicit: true
    repeatable: true
    sections:
      - id: model
        title: "{{model_name}}"
        template: |
          **用途:** {{model_purpose}}

          **关键属性:**
          - {{attribute_1}}: {{type_1}} - {{description_1}}
          - {{attribute_2}}: {{type_2}} - {{description_2}}
        sections:
          - id: typescript-interface
            title: TypeScript 接口
            type: code
            language: typescript
            template: "{{model_interface}}"
          - id: relationships
            title: 关系
            type: bullet-list
            template: "- {{relationship}}"

  - id: api-spec
    title: API 规格
    instruction: |
      Based on the chosen API style from Tech Stack:

      1. If REST API, create an OpenAPI 3.0 specification
      2. If GraphQL, provide the GraphQL schema
      3. If tRPC, show router definitions
      4. Include all endpoints from epics/stories
      5. Define request/response schemas based on data models
      6. Document authentication requirements
      7. Include example requests/responses

      Use appropriate format for the chosen API style. If no API (e.g., static site), skip this section.
    elicit: true
    sections:
      - id: rest-api
        title: REST API 规格
        condition: API style is REST
        type: code
        language: yaml
        template: |
          openapi: 3.0.0
          info:
            title: {{api_title}}
            version: {{api_version}}
            description: {{api_description}}
          servers:
            - url: {{server_url}}
              description: {{server_description}}
      - id: graphql-api
        title: GraphQL Schema
        condition: API style is GraphQL
        type: code
        language: graphql
        template: "{{graphql_schema}}"
      - id: trpc-api
        title: tRPC Router 定义
        condition: API style is tRPC
        type: code
        language: typescript
        template: "{{trpc_routers}}"

  - id: components
    title: 组件
    instruction: |
      Based on the architectural patterns, tech stack, and data models from above:

      1. Identify major logical components/services across the fullstack
      2. Consider both frontend and backend components
      3. Define clear boundaries and interfaces between components
      4. For each component, specify:
      - Primary responsibility
      - Key interfaces/APIs exposed
      - Dependencies on other components
      - Technology specifics based on tech stack choices

      5. Create component diagrams where helpful
    elicit: true
    sections:
      - id: component-list
        repeatable: true
        title: "{{component_name}}"
        template: |
          **职责:** {{component_description}}

          **关键接口:**
          - {{interface_1}}
          - {{interface_2}}

          **依赖:** {{dependencies}}

          **技术栈:** {{component_tech_details}}
      - id: component-diagrams
        title: 组件图
        type: mermaid
        instruction: |
          Create Mermaid diagrams to visualize component relationships. Options:
          - C4 Container diagram for high-level view
          - Component diagram for detailed internal structure
          - Sequence diagrams for complex interactions
          Choose the most appropriate for clarity

  - id: external-apis
    title: 外部 API
    condition: Project requires external API integrations
    instruction: |
      For each external service integration:

      1. Identify APIs needed based on PRD requirements and component design
      2. If documentation URLs are unknown, ask user for specifics
      3. Document authentication methods and security considerations
      4. List specific endpoints that will be used
      5. Note any rate limits or usage constraints

      If no external APIs are needed, state this explicitly and skip to next section.
    elicit: true
    repeatable: true
    sections:
      - id: api
        title: "{{api_name}} API"
        template: |
          - **用途:** {{api_purpose}}
          - **文档:** {{api_docs_url}}
          - **基础 URL:** {{api_base_url}}
          - **认证:** {{auth_method}}
          - **限流:** {{rate_limits}}

          **使用的关键端点:**
          - `{{method}} {{endpoint_path}}` - {{endpoint_purpose}}

          **集成说明:** {{integration_considerations}}

  - id: core-workflows
    title: 核心工作流
    type: mermaid
    mermaid_type: sequence
    instruction: |
      Illustrate key system workflows using sequence diagrams:

      1. Identify critical user journeys from PRD
      2. Show component interactions including external APIs
      3. Include both frontend and backend flows
      4. Include error handling paths
      5. Document async operations
      6. Create both high-level and detailed diagrams as needed

      Focus on workflows that clarify architecture decisions or complex interactions.
    elicit: true

  - id: database-schema
    title: 数据库 Schema
    instruction: |
      Transform the conceptual data models into concrete database schemas:

      1. Use the database type(s) selected in Tech Stack
      2. Create schema definitions using appropriate notation
      3. Include indexes, constraints, and relationships
      4. Consider performance and scalability
      5. For NoSQL, show document structures

      Present schema in format appropriate to database type (SQL DDL, JSON schema, etc.)
    elicit: true

  - id: frontend-architecture
    title: 前端架构
    instruction: Define frontend-specific architecture details. After each subsection, note if user wants to refine before continuing.
    elicit: true
    sections:
      - id: component-architecture
        title: 组件架构
        instruction: Define component organization and patterns based on chosen framework.
        sections:
          - id: component-organization
            title: 组件组织
            type: code
            language: text
            template: "{{component_structure}}"
          - id: component-template
            title: 组件模板
            type: code
            language: typescript
            template: "{{component_template}}"
      - id: state-management
        title: 状态管理架构
        instruction: Detail state management approach based on chosen solution.
        sections:
          - id: state-structure
            title: 状态结构
            type: code
            language: typescript
            template: "{{state_structure}}"
          - id: state-patterns
            title: 状态管理模式
            type: bullet-list
            template: "- {{pattern}}"
      - id: routing-architecture
        title: 路由架构
        instruction: Define routing structure based on framework choice.
        sections:
          - id: route-organization
            title: 路由组织
            type: code
            language: text
            template: "{{route_structure}}"
          - id: protected-routes
            title: 受保护路由模式
            type: code
            language: typescript
            template: "{{protected_route_example}}"
      - id: frontend-services
        title: 前端服务层
        instruction: Define how frontend communicates with backend.
        sections:
          - id: api-client-setup
            title: API 客户端配置
            type: code
            language: typescript
            template: "{{api_client_setup}}"
          - id: service-example
            title: 服务示例
            type: code
            language: typescript
            template: "{{service_example}}"

  - id: backend-architecture
    title: 后端架构
    instruction: Define backend-specific architecture details. Consider serverless vs traditional server approaches.
    elicit: true
    sections:
      - id: service-architecture
        title: 服务架构
        instruction: Based on platform choice, define service organization.
        sections:
          - id: serverless-architecture
            condition: Serverless architecture chosen
            sections:
              - id: function-organization
                title: 函数组织
                type: code
                language: text
                template: "{{function_structure}}"
              - id: function-template
                title: 函数模板
                type: code
                language: typescript
                template: "{{function_template}}"
          - id: traditional-server
            condition: Traditional server architecture chosen
            sections:
              - id: controller-organization
                title: 控制器/路由组织
                type: code
                language: text
                template: "{{controller_structure}}"
              - id: controller-template
                title: 控制器模板
                type: code
                language: typescript
                template: "{{controller_template}}"
      - id: database-architecture
        title: 数据库架构
        instruction: Define database schema and access patterns.
        sections:
          - id: schema-design
            title: Schema 设计
            type: code
            language: sql
            template: "{{database_schema}}"
          - id: data-access-layer
            title: 数据访问层
            type: code
            language: typescript
            template: "{{repository_pattern}}"
      - id: auth-architecture
        title: 认证与授权
        instruction: Define auth implementation details.
        sections:
          - id: auth-flow
            title: 认证流程
            type: mermaid
            mermaid_type: sequence
            template: "{{auth_flow_diagram}}"
          - id: auth-middleware
            title: 中间件/守卫
            type: code
            language: typescript
            template: "{{auth_middleware}}"

  - id: source-tree
    title: 源码目录
    instruction: Create a monorepo structure that accommodates both frontend and backend. Adapt based on chosen tools and frameworks.
    elicit: true
    type: code
    language: plaintext
    examples:
    - |
      {{project-name}}/
      ├── .github/                    # CI/CD 工作流
      │   └── workflows/
      │       ├── ci.yaml
      │       └── deploy.yaml
      ├── apps/                       # 应用包
      │   ├── web/                    # 前端应用
      │   │   ├── src/
      │   │   │   ├── components/     # UI 组件
      │   │   │   ├── pages/          # 页面组件/路由
      │   │   │   ├── hooks/          # 自定义 React Hooks
      │   │   │   ├── services/       # API 客户端服务
      │   │   │   ├── stores/         # 状态管理
      │   │   │   ├── styles/         # 全局样式/主题
      │   │   │   └── utils/          # 前端工具函数
      │   │   ├── public/             # 静态资源
      │   │   ├── tests/              # 前端测试
      │   │   └── package.json
      │   └── api/                    # 后端应用
      │       ├── src/
      │       │   ├── routes/         # API 路由/控制器
      │       │   ├── services/       # 业务逻辑
      │       │   ├── models/         # 数据模型
      │       │   ├── middleware/     # Express/API 中间件
      │       │   ├── utils/          # 后端工具函数
      │       │   └── {{serverless_or_server_entry}}
      │       ├── tests/              # 后端测试
      │       └── package.json
      ├── packages/                   # 共享包
      │   ├── shared/                 # 共享类型/工具
      │   │   ├── src/
      │   │   │   ├── types/          # TypeScript 接口
      │   │   │   ├── constants/      # 共享常量
      │   │   │   └── utils/          # 共享工具函数
      │   │   └── package.json
      │   ├── ui/                     # 共享 UI 组件
      │   │   ├── src/
      │   │   └── package.json
      │   └── config/                 # 共享配置
      │       ├── eslint/
      │       ├── typescript/
      │       └── jest/
      ├── infrastructure/             # IaC 定义
      │   └── {{iac_structure}}
      ├── scripts/                    # 构建/部署脚本
      ├── docs/                       # 文档
      │   ├── prd.md
      │   ├── front-end-spec.md
      │   └── fullstack-architecture.md
      ├── .env.example                # 环境变量模板
      ├── package.json                # 根 package.json
      ├── {{monorepo_config}}         # Monorepo 配置
      └── README.md

  - id: development-workflow
    title: 开发工作流
    instruction: Define the development setup and workflow for the fullstack application.
    elicit: true
    sections:
      - id: local-setup
        title: 本地开发配置
        sections:
          - id: prerequisites
            title: 前置条件
            type: code
            language: bash
            template: "{{prerequisites_commands}}"
          - id: initial-setup
            title: 初始配置
            type: code
            language: bash
            template: "{{setup_commands}}"
          - id: dev-commands
            title: 开发命令
            type: code
            language: bash
            template: |
              # 启动所有服务
              {{start_all_command}}

              # 仅启动前端
              {{start_frontend_command}}

              # 仅启动后端
              {{start_backend_command}}

              # 运行测试
              {{test_commands}}
      - id: environment-config
        title: 环境配置
        sections:
          - id: env-vars
            title: 必需的环境变量
            type: code
            language: bash
            template: |
              # 前端 (.env.local)
              {{frontend_env_vars}}

              # 后端 (.env)
              {{backend_env_vars}}

              # 共享
              {{shared_env_vars}}

  - id: deployment-architecture
    title: 部署架构
    instruction: Define deployment strategy based on platform choice.
    elicit: true
    sections:
      - id: deployment-strategy
        title: 部署策略
        template: |
          **前端部署:**
          - **平台:** {{frontend_deploy_platform}}
          - **构建命令:** {{frontend_build_command}}
          - **输出目录:** {{frontend_output_dir}}
          - **CDN/边缘:** {{cdn_strategy}}

          **后端部署:**
          - **平台:** {{backend_deploy_platform}}
          - **构建命令:** {{backend_build_command}}
          - **部署方式:** {{deployment_method}}
      - id: cicd-pipeline
        title: CI/CD 流水线
        type: code
        language: yaml
        template: "{{cicd_pipeline_config}}"
      - id: environments
        title: 环境
        type: table
        columns: [环境, 前端 URL, 后端 URL, 用途]
        rows:
          - ["开发", "{{dev_fe_url}}", "{{dev_be_url}}", "本地开发"]
          - ["预发", "{{staging_fe_url}}", "{{staging_be_url}}", "生产前测试"]
          - ["生产", "{{prod_fe_url}}", "{{prod_be_url}}", "线上环境"]

  - id: security-performance
    title: 安全与性能
    instruction: Define security and performance considerations for the fullstack application.
    elicit: true
    sections:
      - id: security-requirements
        title: 安全要求
        template: |
          **前端安全:**
          - CSP 头: {{csp_policy}}
          - XSS 防护: {{xss_strategy}}
          - 安全存储: {{storage_strategy}}

          **后端安全:**
          - 输入验证: {{validation_approach}}
          - 限流: {{rate_limit_config}}
          - CORS 策略: {{cors_config}}

          **认证安全:**
          - Token 存储: {{token_strategy}}
          - 会话管理: {{session_approach}}
          - 密码策略: {{password_requirements}}
      - id: performance-optimization
        title: 性能优化
        template: |
          **前端性能:**
          - 包体积目标: {{bundle_size}}
          - 加载策略: {{loading_approach}}
          - 缓存策略: {{fe_cache_strategy}}

          **后端性能:**
          - 响应时间目标: {{response_target}}
          - 数据库优化: {{db_optimization}}
          - 缓存策略: {{be_cache_strategy}}

  - id: testing-strategy
    title: 测试策略
    instruction: Define comprehensive testing approach for fullstack application.
    elicit: true
