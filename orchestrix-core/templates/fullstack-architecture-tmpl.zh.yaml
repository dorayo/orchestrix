  - id: coding-standards
    title: 编码规范
    instruction: Define MINIMAL but CRITICAL standards for AI agents. Focus only on project-specific rules that prevent common mistakes. These will be used by dev agents.
    elicit: true
    sections:
      - id: critical-rules
        title: 关键全栈规则
        repeatable: true
        template: "- **{{rule_name}}:** {{rule_description}}"
        examples:
          - "**类型共享:** 始终在 packages/shared 中定义类型并从那里导入"
          - "**API 调用:** 永远不要直接发起 HTTP 调用 - 使用服务层"
          - "**环境变量:** 只能通过配置对象访问，不要直接使用 process.env"
          - "**错误处理:** 所有 API 路由必须使用标准错误处理器"
          - "**状态更新:** 永远不要直接修改状态 - 使用正确的状态管理模式"
      - id: naming-conventions
        title: 命名规范
        type: table
        columns: [元素, 前端, 后端, 示例]
        rows:
          - ["组件", "PascalCase", "-", "`UserProfile.tsx`"]
          - ["Hooks", "camelCase 带 'use'", "-", "`useAuth.ts`"]
          - ["API 路由", "-", "kebab-case", "`/api/user-profile`"]
          - ["数据库表", "-", "snake_case", "`user_profiles`"]

  - id: error-handling
    title: 错误处理策略
    instruction: Define unified error handling across frontend and backend.
    elicit: true
    sections:
      - id: error-flow
        title: 错误流程
        type: mermaid
        mermaid_type: sequence
        template: "{{error_flow_diagram}}"
      - id: error-format
        title: 错误响应格式
        type: code
        language: typescript
        template: |
          interface ApiError {
            error: {
              code: string;
              message: string;
              details?: Record<string, any>;
              timestamp: string;
              requestId: string;
            };
          }
      - id: frontend-error-handling
        title: 前端错误处理
        type: code
        language: typescript
        template: "{{frontend_error_handler}}"
      - id: backend-error-handling
        title: 后端错误处理
        type: code
        language: typescript
        template: "{{backend_error_handler}}"

  - id: monitoring
    title: 监控与可观测性
    instruction: Define monitoring strategy for fullstack application.
    elicit: true
    sections:
