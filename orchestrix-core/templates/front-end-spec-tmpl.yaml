template:
  id: frontend-spec-template-v2
  name: UI/UX Specification
  version: 2.0
  output:
    format: markdown
    filename: docs/front-end-spec.md
    title: "{{project_name}} UI/UX Specification"

workflow:
  mode: draft-first
  elicitation: advanced-elicitation

sections:
  - id: introduction
    title: Introduction
    instruction: |
      Review provided documents including Project Brief, PRD, and any user research to gather context. Focus on understanding user needs, pain points, and desired outcomes before beginning the specification.
      
      Establish the document's purpose and scope. Keep the content below but ensure project name is properly substituted.
    content: |
      This document defines the user experience goals, information architecture, user flows, and visual design specifications for {{project_name}}'s user interface. It serves as the foundation for visual design and frontend development, ensuring a cohesive and user-centered experience.
    sections:
      - id: ux-goals-principles
        title: Overall UX Goals & Principles
        instruction: |
          Work with the user to establish and document the following. If not already defined, facilitate a discussion to determine:
          
          1. Target User Personas - elicit details or confirm existing ones from PRD
          2. Key Usability Goals - understand what success looks like for users
          3. Core Design Principles - establish 3-5 guiding principles
        elicit: true
        sections:
          - id: user-personas
            title: Target User Personas
            template: "{{persona_descriptions}}"
            examples:
              - "**Power User:** Technical professionals who need advanced features and efficiency"
              - "**Casual User:** Occasional users who prioritize ease of use and clear guidance"
              - "**Administrator:** System managers who need control and oversight capabilities"
          - id: usability-goals
            title: Usability Goals
            template: "{{usability_goals}}"
            examples:
              - "Ease of learning: New users can complete core tasks within 5 minutes"
              - "Efficiency of use: Power users can complete frequent tasks with minimal clicks"
              - "Error prevention: Clear validation and confirmation for destructive actions"
              - "Memorability: Infrequent users can return without relearning"
          - id: design-principles
            title: Design Principles
            template: "{{design_principles}}"
            type: numbered-list
            examples:
              - "**Clarity over cleverness** - Prioritize clear communication over aesthetic innovation"
              - "**Progressive disclosure** - Show only what's needed, when it's needed"
              - "**Consistent patterns** - Use familiar UI patterns throughout the application"
              - "**Immediate feedback** - Every action should have a clear, immediate response"
              - "**Accessible by default** - Design for all users from the start"
      - id: changelog
        title: Change Log
        type: table
        columns: [Date, Version, Description, Author]
        instruction: Track document versions and changes

  - id: information-architecture
    title: Information Architecture (IA)
    instruction: |
      Collaborate with the user to create a comprehensive information architecture:
      
      1. Build a Site Map or Screen Inventory showing all major areas
      2. Define the Navigation Structure (primary, secondary, breadcrumbs)
      3. Use Mermaid diagrams for visual representation
      4. Consider user mental models and expected groupings
    elicit: true
    sections:
      - id: sitemap
        title: Site Map / Screen Inventory
        type: mermaid
        mermaid_type: graph
        template: "{{sitemap_diagram}}"
        examples:
          - |
            graph TD
                A[Homepage] --> B[Dashboard]
                A --> C[Products]
                A --> D[Account]
                B --> B1[Analytics]
                B --> B2[Recent Activity]
                C --> C1[Browse]
                C --> C2[Search]
                C --> C3[Product Details]
                D --> D1[Profile]
                D --> D2[Settings]
                D --> D3[Billing]
      - id: navigation-structure
        title: Navigation Structure
        template: |
          **Primary Navigation:** {{primary_nav_description}}
          
          **Secondary Navigation:** {{secondary_nav_description}}
          
          **Breadcrumb Strategy:** {{breadcrumb_strategy}}

  - id: user-flows
    title: User Flows
    instruction: |
      For each critical user task identified in the PRD:
      
      1. Define the user's goal clearly
      2. Map out all steps including decision points
      3. Consider edge cases and error states
      4. Use Mermaid flow diagrams for clarity
      5. Link to external tools (Figma/Miro) if detailed flows exist there
      
      Create subsections for each major flow.
    elicit: true
    repeatable: true
    sections:
      - id: flow
        title: "{{flow_name}}"
        template: |
          **User Goal:** {{flow_goal}}
          
          **Entry Points:** {{entry_points}}
          
          **Success Criteria:** {{success_criteria}}
        sections:
          - id: flow-diagram
            title: Flow Diagram
            type: mermaid
            mermaid_type: graph
            template: "{{flow_diagram}}"
          - id: edge-cases
            title: "Edge Cases & Error Handling:"
            type: bullet-list
            template: "- {{edge_case}}"
          - id: notes
            template: "**Notes:** {{flow_notes}}"

  - id: wireframes-mockups
    title: Wireframes & Mockups
    instruction: |
      Clarify where detailed visual designs will be created (Figma, Sketch, etc.) and how to reference them. If low-fidelity wireframes are needed, offer to help conceptualize layouts for key screens.
    elicit: true
    sections:
      - id: design-files
        template: "**Primary Design Files:** {{design_tool_link}}"
      - id: key-screen-layouts
        title: Key Screen Layouts
        repeatable: true
        sections:
          - id: screen
            title: "{{screen_name}}"
            template: |
              **Purpose:** {{screen_purpose}}
              
              **Key Elements:**
              - {{element_1}}
              - {{element_2}}
              - {{element_3}}
              
              **Interaction Notes:** {{interaction_notes}}
              
              **Design File Reference:** {{specific_frame_link}}

  - id: component-library
    title: Component Library / Design System
    instruction: |
      Discuss whether to use an existing design system or create a new one. If creating new, identify foundational components and their key states. Note that detailed technical specs belong in front-end-architecture.
    elicit: true
    sections:
      - id: design-system-approach
        template: "**Design System Approach:** {{design_system_approach}}"
      - id: core-components
        title: Core Components
        repeatable: true
        sections:
          - id: component
            title: "{{component_name}}"
            template: |
              **Purpose:** {{component_purpose}}
              
              **Variants:** {{component_variants}}
              
              **States:** {{component_states}}
              
              **Usage Guidelines:** {{usage_guidelines}}

  - id: branding-style
    title: Branding & Style Guide
    instruction: |
      CRITICAL: This section must produce CONCRETE design tokens, not placeholders.

      Before filling in values, commit to an aesthetic direction. Ask: "What is the ONE
      unforgettable visual element of this product?" Then build the system around it.

      Anti-convergence check — REJECT these defaults:
      - Inter/Roboto/Arial as display fonts
      - Purple gradients on white backgrounds
      - Timid, evenly-distributed color palettes
      - Generic card-grid layouts

      If existing brand guidelines exist, link and extend them.
      If starting fresh, build a distinctive system using these rules:
      - Color: Apply 60-30-10 rule. Enforce WCAG AA (4.5:1 normal, 3:1 large text).
      - Typography: Choose distinctive fonts. Create weight contrast (100 vs 900) and size hierarchy (3x+ jumps).
      - Spacing: Use a 4px base unit system.
      - Every value must be a CSS variable for theming consistency.
    elicit: true
    sections:
      - id: aesthetic-direction
        title: Aesthetic Direction
        instruction: |
          Commit to ONE bold direction BEFORE defining tokens. Safe middle-ground produces forgettable interfaces.
          Options include (but are not limited to): brutally minimal, maximalist chaos, retro-futuristic,
          organic/natural, luxury/refined, editorial, neo-brutalist, glassmorphic, dark-mode-first,
          data-dense/dashboard, playful/illustration-heavy.
        template: |
          **Chosen Direction:** {{aesthetic_direction}}

          **Unforgettable Element:** {{signature_element}}

          **Inspiration References:** {{mood_references}}
      - id: visual-identity
        title: Visual Identity
        template: "**Brand Guidelines:** {{brand_guidelines_link}}"
      - id: color-palette
        title: Color Palette
        instruction: |
          Define colors as CSS custom properties. Apply the 60-30-10 rule:
          60% dominant (backgrounds, large areas), 30% secondary (cards, sections), 10% accent (CTAs, highlights).
          All color pairs must pass WCAG AA contrast ratios.
        type: table
        columns: ["CSS Variable", "Hex Code", "Role (60/30/10)", "Contrast Ratio", "Usage"]
        rows:
          - ["--color-primary", "{{primary_color}}", "{{primary_ratio}}", "{{primary_contrast}}", "{{primary_usage}}"]
          - ["--color-secondary", "{{secondary_color}}", "{{secondary_ratio}}", "{{secondary_contrast}}", "{{secondary_usage}}"]
          - ["--color-accent", "{{accent_color}}", "10% accent", "{{accent_contrast}}", "{{accent_usage}}"]
          - ["--color-background", "{{bg_color}}", "60% dominant", "-", "{{bg_usage}}"]
          - ["--color-surface", "{{surface_color}}", "30% secondary", "-", "{{surface_usage}}"]
          - ["--color-text", "{{text_color}}", "-", "{{text_contrast}}", "Primary text on background"]
          - ["--color-text-muted", "{{muted_color}}", "-", "{{muted_contrast}}", "Secondary/helper text"]
          - ["--color-success", "{{success_color}}", "-", "{{success_contrast}}", "Positive feedback, confirmations"]
          - ["--color-warning", "{{warning_color}}", "-", "{{warning_contrast}}", "Cautions, important notices"]
          - ["--color-error", "{{error_color}}", "-", "{{error_contrast}}", "Errors, destructive actions"]
          - ["--color-border", "{{border_color}}", "-", "-", "Dividers, input borders"]
      - id: background-atmosphere
        title: Background & Atmosphere
        instruction: |
          Backgrounds set mood — they are NOT an afterthought.
          AVOID: flat solid white or #f5f5f5 with zero atmosphere.
          CONSIDER: gradient meshes, noise/grain textures, geometric patterns,
          layered transparencies, subtle dot grids, dramatic shadows.
        template: |
          **Background Strategy:** {{background_strategy}}

          **Texture/Pattern:** {{texture_details}}

          **Dark Mode Approach:** {{dark_mode_strategy}}
      - id: typography
        title: Typography
        instruction: |
          Choose distinctive fonts — NEVER default to Inter/Roboto/Arial for display text.
          Create meaningful contrast: weight jumps (300 vs 800), size jumps (3x between levels).
          All sizes should sit on a 4px baseline grid.
        sections:
          - id: font-families
            title: Font Families
            template: |
              - **Display/Heading:** {{display_font}} — {{display_font_rationale}}
              - **Body:** {{body_font}} — {{body_font_rationale}}
              - **Monospace:** {{mono_font}} — {{mono_font_rationale}}
              - **Font Loading Strategy:** {{font_loading}}
          - id: type-scale
            title: Type Scale
            type: table
            columns: ["Element", "CSS Variable", "Size", "Weight", "Line Height", "Letter Spacing"]
            rows:
              - ["Display", "--text-display", "{{display_size}}", "{{display_weight}}", "{{display_line}}", "{{display_tracking}}"]
              - ["H1", "--text-h1", "{{h1_size}}", "{{h1_weight}}", "{{h1_line}}", "{{h1_tracking}}"]
              - ["H2", "--text-h2", "{{h2_size}}", "{{h2_weight}}", "{{h2_line}}", "{{h2_tracking}}"]
              - ["H3", "--text-h3", "{{h3_size}}", "{{h3_weight}}", "{{h3_line}}", "{{h3_tracking}}"]
              - ["Body", "--text-body", "{{body_size}}", "{{body_weight}}", "{{body_line}}", "normal"]
              - ["Small", "--text-small", "{{small_size}}", "{{small_weight}}", "{{small_line}}", "normal"]
              - ["Caption", "--text-caption", "{{caption_size}}", "{{caption_weight}}", "{{caption_line}}", "{{caption_tracking}}"]
      - id: iconography
        title: Iconography
        template: |
          **Icon Library:** {{icon_library}}

          **Icon Size Scale:** {{icon_sizes}}

          **Usage Guidelines:** {{icon_guidelines}}
      - id: spacing-layout
        title: Spacing & Layout
        instruction: |
          Use a 4px base unit system. All spacing values must be multiples of 4.
          Define a grid system (12-column recommended). Consider the Müller-Brockmann
          principle: 95% grid adherence + 5% intentional breakage for emphasis.
        template: |
          **Base Unit:** 4px

          **Spacing Scale:**
          | Token | Value | Usage |
          |-------|-------|-------|
          | --space-1 | 4px | Tight inline gaps |
          | --space-2 | 8px | Related element spacing |
          | --space-3 | 12px | Form field gaps |
          | --space-4 | 16px | Default component padding |
          | --space-6 | 24px | Section internal padding |
          | --space-8 | 32px | Card padding, component gaps |
          | --space-12 | 48px | Section separation |
          | --space-16 | 64px | Major section breaks |

          **Grid System:** {{grid_system}}

          **Max Content Width:** {{max_width}}
      - id: shadows-depth
        title: Shadows & Depth
        instruction: Define a consistent shadow system for elevation hierarchy.
        template: |
          | Level | CSS Variable | Value | Usage |
          |-------|-------------|-------|-------|
          | Subtle | --shadow-sm | {{shadow_sm}} | Cards at rest |
          | Default | --shadow-md | {{shadow_md}} | Dropdowns, popovers |
          | Medium | --shadow-lg | {{shadow_lg}} | Modals, dialogs |
          | Large | --shadow-xl | {{shadow_xl}} | Floating elements |
          | Prominent | --shadow-2xl | {{shadow_2xl}} | Hero cards, feature highlights |
      - id: border-radius
        title: Border Radius
        template: |
          | Token | Value | Usage |
          |-------|-------|-------|
          | --radius-none | 0 | Sharp edges |
          | --radius-sm | {{radius_sm}} | Buttons, inputs |
          | --radius-md | {{radius_md}} | Cards, containers |
          | --radius-lg | {{radius_lg}} | Modals, large panels |
          | --radius-full | 9999px | Avatars, pills, badges |

  - id: accessibility
    title: Accessibility Requirements
    instruction: Define specific accessibility requirements based on target compliance level and user needs. Be comprehensive but practical.
    elicit: true
    sections:
      - id: compliance-target
        title: Compliance Target
        template: "**Standard:** {{compliance_standard}}"
      - id: key-requirements
        title: Key Requirements
        template: |
          **Visual:**
          - Color contrast ratios: {{contrast_requirements}}
          - Focus indicators: {{focus_requirements}}
          - Text sizing: {{text_requirements}}
          
          **Interaction:**
          - Keyboard navigation: {{keyboard_requirements}}
          - Screen reader support: {{screen_reader_requirements}}
          - Touch targets: {{touch_requirements}}
          
          **Content:**
          - Alternative text: {{alt_text_requirements}}
          - Heading structure: {{heading_requirements}}
          - Form labels: {{form_requirements}}
      - id: testing-strategy
        title: Testing Strategy
        template: "{{accessibility_testing}}"

  - id: responsiveness
    title: Responsiveness Strategy
    instruction: Define breakpoints and adaptation strategies for different device sizes. Consider both technical constraints and user contexts.
    elicit: true
    sections:
      - id: breakpoints
        title: Breakpoints
        type: table
        columns: ["Breakpoint", "Min Width", "Max Width", "Target Devices"]
        rows:
          - ["Mobile", "{{mobile_min}}", "{{mobile_max}}", "{{mobile_devices}}"]
          - ["Tablet", "{{tablet_min}}", "{{tablet_max}}", "{{tablet_devices}}"]
          - ["Desktop", "{{desktop_min}}", "{{desktop_max}}", "{{desktop_devices}}"]
          - ["Wide", "{{wide_min}}", "-", "{{wide_devices}}"]
      - id: adaptation-patterns
        title: Adaptation Patterns
        template: |
          **Layout Changes:** {{layout_adaptations}}
          
          **Navigation Changes:** {{nav_adaptations}}
          
          **Content Priority:** {{content_adaptations}}
          
          **Interaction Changes:** {{interaction_adaptations}}

  - id: animation
    title: Animation & Motion Choreography
    instruction: |
      Motion is storytelling, not decoration. Define a cohesive motion system.

      Core principle: One well-orchestrated page load with staggered reveals
      (animation-delay) creates more delight than scattered micro-interactions.

      Prefer CSS-only solutions for HTML. Use Framer Motion for React.
      ALWAYS respect prefers-reduced-motion.
    elicit: true
    sections:
      - id: motion-principles
        title: Motion Principles
        template: |
          **Philosophy:** {{motion_philosophy}}

          **Default Timing:**
          | Interaction Type | Duration | Easing |
          |-----------------|----------|--------|
          | Micro-interaction (hover, focus) | 150-200ms | ease-out |
          | Layout transition | 300-500ms | cubic-bezier(0.33, 1, 0.68, 1) |
          | Page enter/exit | 400-600ms | cubic-bezier(0.16, 1, 0.3, 1) |
          | Stagger delay per item | 50-80ms | - |

          **Reduced Motion Fallback:** {{reduced_motion_strategy}}
      - id: choreography-moments
        title: Key Choreography Moments
        instruction: |
          Identify the 3-5 highest-impact moments where motion creates delight.
          Focus on: page load, first meaningful interaction, success confirmation,
          navigation transitions, data visualization entry.
        repeatable: true
        template: |
          - **{{moment_name}}:** {{moment_description}}
            - Trigger: {{trigger}}
            - Duration: {{duration}} | Easing: {{easing}}
            - Stagger: {{stagger_detail}}
            - Reduced motion alternative: {{fallback}}

  - id: performance
    title: Performance Considerations
    instruction: Define performance goals and strategies that impact UX design decisions.
    sections:
      - id: performance-goals
        title: Performance Goals
        template: |
          - **Page Load:** {{load_time_goal}}
          - **Interaction Response:** {{interaction_goal}}
          - **Animation FPS:** {{animation_goal}}
      - id: design-strategies
        title: Design Strategies
        template: "{{performance_strategies}}"

  - id: next-steps
    title: Next Steps
    instruction: |
      After completing the UI/UX specification:
      
      1. Recommend review with stakeholders
      2. Suggest creating/updating visual designs in design tool
      3. Prepare for handoff to Design Architect for frontend architecture
      4. Note any open questions or decisions needed
    sections:
      - id: immediate-actions
        title: Immediate Actions
        type: numbered-list
        template: "{{action}}"
      - id: design-handoff-checklist
        title: Design Handoff Checklist
        type: checklist
        items:
          - "All user flows documented"
          - "Component inventory complete"
          - "Accessibility requirements defined"
          - "Responsive strategy clear"
          - "Brand guidelines incorporated"
          - "Performance goals established"

  - id: checklist-results
    title: Checklist Results
    instruction: If a UI/UX checklist exists, run it against this document and report results here.