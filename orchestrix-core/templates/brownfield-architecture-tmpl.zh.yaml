template:
  id: brownfield-architecture-template-v2
  name: 棕地项目增强架构
  version: 2.0
  output:
    format: markdown
    filename: docs/architecture.md
    title: "{{project_name}} 棕地项目增强架构"

workflow:
  mode: interactive
  elicitation: advanced-elicitation

sections:
  - id: introduction
    title: 引言
    instruction: |
      IMPORTANT - SCOPE AND PREREQUISITES:

      This architecture document is for SIGNIFICANT enhancements to existing projects that require comprehensive architectural planning. Before proceeding:

      1. **Verify Complexity**: Confirm this enhancement requires architectural planning. For simple additions, recommend: "For simpler changes that don't require architectural planning, consider using the brownfield-create-epic or brownfield-create-story task with the Product Owner instead."

      2. **REQUIRED PREREQUISITES** (MUST have before starting):
         - **REQUIRED**: docs/prd.md (created via @pm *create-doc brownfield-prd-tmpl.yaml)
         - **REQUIRED**: docs/existing-system-analysis.md (created via @architect *document-project)
         - **REQUIRED**: Access to existing project structure (IDE or uploaded files)

      3. **Prerequisites Validation**:
         - HALT if docs/prd.md is missing: "Please create brownfield PRD first using '@pm *create-doc brownfield-prd-tmpl.yaml'"
         - HALT if docs/existing-system-analysis.md is missing: "Please analyze existing system first using '@architect *document-project'"
         - Load and review both documents before proceeding

      4. **DEEP ANALYSIS MANDATE**: You MUST base ALL architectural decisions on:
         - Existing system constraints from docs/existing-system-analysis.md
         - Enhancement requirements from docs/prd.md
         - Real codebase patterns (if IDE access available)
         Every suggestion must be grounded in actual analysis, not assumptions.

      5. **CONTINUOUS VALIDATION**: Throughout this process, explicitly reference your sources. For every architectural decision, state: "Based on [existing-system-analysis finding] and [PRD requirement], I recommend [decision] because [rationale]. This improves upon the current [existing practice] while maintaining [compatibility]. Does this align with your goals?"

      If any required prerequisites are missing, HALT and request them before proceeding.
    elicit: true
    sections:
      - id: intro-content
        content: |
          本文档概述了使用 {{enhancement_description}} 增强 {{project_name}} 的架构方案。其主要目标是作为 AI 驱动开发新功能的架构蓝图，同时确保与现有系统的无缝集成。

          **关键改进**: 本架构为增强定义了改进的编码规范和模式，借鉴但不复制 docs/existing-system-analysis.md 中记录的现有系统的弱点。

          **与现有文档的关系:**
          - **docs/existing-system-analysis.md**: 描述当前系统状态（现状，包括技术债务）
          - **docs/prd.md**: 定义要构建的增强内容
          - **docs/architecture.md**（本文档）: 定义如何以改进的标准构建增强

          当新旧模式发生冲突时，本文档提供关于在实施更好实践的同时保持兼容性的指导。
      - id: existing-project-analysis
        title: 现有项目分析
        instruction: |
          Load and reference docs/existing-system-analysis.md as primary source:

          1. Review docs/existing-system-analysis.md thoroughly
          2. Extract current tech stack and versions from "Tech Stack" section
          3. Note architectural patterns from "High Level Architecture" section
          4. Identify constraints from "Technical Debt and Known Issues" section
          5. Review "Gaps and Recommendations" for improvement opportunities
          6. If IDE access available, validate analysis against current codebase

          CRITICAL: After reviewing existing-system-analysis.md, explicitly summarize: "Based on docs/existing-system-analysis.md, I understand your existing system has: [key constraints and patterns]. The enhancement will improve upon [identified weaknesses] while maintaining [compatibility requirements]. Please confirm this understanding before I proceed with architectural recommendations."
        elicit: true
        sections:
          - id: current-state
            title: 当前项目状态
            instruction: Extract summary from docs/existing-system-analysis.md
            template: |
              - **主要用途:** {{existing_project_purpose}}
              - **当前技术栈:** {{existing_tech_summary}}
              - **架构风格:** {{existing_architecture_style}}
              - **部署方式:** {{existing_deployment_approach}}
              - **参考**: 详见 docs/existing-system-analysis.md
          - id: available-docs
            title: 可用文档
            instruction: Reference docs/existing-system-analysis.md
            type: bullet-list
            template: "- {{existing_docs_summary}}"
          - id: constraints
            title: 已识别的约束
            instruction: Extract from "Technical Debt and Known Issues" section of existing-system-analysis.md
            type: bullet-list
            template: "- {{constraint}}"
      - id: changelog
        title: 变更日志
        type: table
        columns: [变更, 日期, 版本, 描述, 作者]
        instruction: Track document versions and changes

  - id: enhancement-scope
    title: 增强范围与集成策略
    instruction: |
      Define how the enhancement will integrate with the existing system:

      1. Review the brownfield PRD enhancement scope
      2. Identify integration points with existing code
      3. Define boundaries between new and existing functionality
      4. Establish compatibility requirements

      VALIDATION CHECKPOINT: Before presenting the integration strategy, confirm: "Based on my analysis, the integration approach I'm proposing takes into account [specific existing system characteristics]. These integration points and boundaries respect your current architecture patterns. Is this assessment accurate?"
    elicit: true
    sections:
      - id: enhancement-overview
        title: 增强概述
        template: |
          **增强类型:** {{enhancement_type}}
          **范围:** {{enhancement_scope}}
          **集成影响:** {{integration_impact_level}}
      - id: integration-approach
        title: 集成方法
        template: |
          **代码集成策略:** {{code_integration_approach}}
          **数据库集成:** {{database_integration_approach}}
          **API 集成:** {{api_integration_approach}}
          **UI 集成:** {{ui_integration_approach}}
      - id: compatibility-requirements
        title: 兼容性要求
        template: |
          - **现有 API 兼容性:** {{api_compatibility}}
          - **数据库 Schema 兼容性:** {{db_compatibility}}
          - **UI/UX 一致性:** {{ui_compatibility}}
          - **性能影响:** {{performance_constraints}}

  - id: tech-stack
    title: 技术栈
    instruction: |
      Ensure new components align with existing technology choices:

      1. Use existing technology stack as the foundation
      2. Only introduce new technologies if absolutely necessary
      3. Justify any new additions with clear rationale
      4. Ensure version compatibility with existing dependencies
    elicit: true
    sections:
      - id: existing-stack
        title: 现有技术栈
        type: table
        columns: [类别, 当前技术, 版本, 增强中的使用, 备注]
        instruction: Document the current stack that must be maintained or integrated with
      - id: new-tech-additions
        title: 新增技术
        condition: Enhancement requires new technologies
        type: table
        columns: [技术, 版本, 用途, 理由, 集成方式]
        instruction: Only include if new technologies are required for the enhancement

  - id: data-models
    title: 数据模型与 Schema 变更
    instruction: |
      Define new data models and how they integrate with existing schema:

      1. Identify new entities required for the enhancement
      2. Define relationships with existing data models
      3. Plan database schema changes (additions, modifications)
      4. Ensure backward compatibility
    elicit: true
    sections:
      - id: new-models
        title: 新数据模型
        repeatable: true
        sections:
          - id: model
            title: "{{model_name}}"
            template: |
              **用途:** {{model_purpose}}
              **集成:** {{integration_with_existing}}

              **关键属性:**
              - {{attribute_1}}: {{type_1}} - {{description_1}}
              - {{attribute_2}}: {{type_2}} - {{description_2}}

              **关系:**
              - **与现有模型:** {{existing_relationships}}
              - **与新模型:** {{new_relationships}}
      - id: schema-integration
        title: Schema 集成策略
        template: |
          **所需数据库变更:**
          - **新增表:** {{new_tables_list}}
          - **修改表:** {{modified_tables_list}}
          - **新增索引:** {{new_indexes_list}}
          - **迁移策略:** {{migration_approach}}

          **向后兼容:**
          - {{compatibility_measure_1}}
          - {{compatibility_measure_2}}

  - id: component-architecture
    title: 组件架构
    instruction: |
      Define new components and their integration with existing architecture:

      1. Identify new components required for the enhancement
      2. Define interfaces with existing components
      3. Establish clear boundaries and responsibilities
      4. Plan integration points and data flow

      MANDATORY VALIDATION: Before presenting component architecture, confirm: "The new components I'm proposing follow the existing architectural patterns I identified in your codebase: [specific patterns]. The integration interfaces respect your current component structure and communication patterns. Does this match your project's reality?"
    elicit: true
    sections:
      - id: new-components
        title: 新组件
        repeatable: true
        sections:
          - id: component
            title: "{{component_name}}"
            template: |
              **职责:** {{component_description}}
              **集成点:** {{integration_points}}

              **关键接口:**
              - {{interface_1}}
              - {{interface_2}}

              **依赖:**
              - **现有组件:** {{existing_dependencies}}
              - **新组件:** {{new_dependencies}}

              **技术栈:** {{component_tech_details}}
      - id: interaction-diagram
        title: 组件交互图
        type: mermaid
        mermaid_type: graph
        instruction: Create Mermaid diagram showing how new components interact with existing ones

  - id: api-design
    title: API 设计与集成
    condition: Enhancement requires API changes
    instruction: |
      Define new API endpoints and integration with existing APIs:

      1. Plan new API endpoints required for the enhancement
      2. Ensure consistency with existing API patterns
      3. Define authentication and authorization integration
      4. Plan versioning strategy if needed
    elicit: true
    sections:
      - id: api-strategy
        title: API 集成策略
        template: |
          **API 集成策略:** {{api_integration_strategy}}
          **认证:** {{auth_integration}}
          **版本控制:** {{versioning_approach}}
      - id: new-endpoints
        title: 新 API 端点
        repeatable: true
        sections:
          - id: endpoint
            title: "{{endpoint_name}}"
            template: |
              - **方法:** {{http_method}}
              - **端点:** {{endpoint_path}}
              - **用途:** {{endpoint_purpose}}
              - **集成:** {{integration_with_existing}}
            sections:
              - id: request
                title: 请求
                type: code
                language: json
                template: "{{request_schema}}"
              - id: response
                title: 响应
                type: code
                language: json
                template: "{{response_schema}}"

  - id: external-api-integration
    title: 外部 API 集成
    condition: Enhancement requires new external APIs
    instruction: Document new external API integrations required for the enhancement
    repeatable: true
    sections:
      - id: external-api
        title: "{{api_name}} API"
        template: |
          - **用途:** {{api_purpose}}
          - **文档:** {{api_docs_url}}
          - **基础 URL:** {{api_base_url}}
          - **认证:** {{auth_method}}
          - **集成方式:** {{integration_approach}}

          **使用的关键端点:**
          - `{{method}} {{endpoint_path}}` - {{endpoint_purpose}}

          **错误处理:** {{error_handling_strategy}}

  - id: source-tree
    title: 源码目录
    instruction: |
      Define how new code will integrate with existing project structure:

      1. Follow existing project organization patterns
      2. Identify where new files/folders will be placed
      3. Ensure consistency with existing naming conventions
      4. Plan for minimal disruption to existing structure
    elicit: true
    sections:
      - id: existing-structure
        title: 现有项目结构
        type: code
        language: plaintext
        instruction: Document relevant parts of current structure
        template: "{{existing_structure_relevant_parts}}"
      - id: new-file-organization
        title: 新文件组织
        type: code
        language: plaintext
        instruction: Show only new additions to existing structure
        template: |
          {{project-root}}/
          ├── {{existing_structure_context}}
          │   ├── {{new_folder_1}}/           # {{purpose_1}}
          │   │   ├── {{new_file_1}}
          │   │   └── {{new_file_2}}
          │   ├── {{existing_folder}}/        # 现有文件夹带新增内容
          │   │   ├── {{existing_file}}       # 现有文件
          │   │   └── {{new_file_3}}          # 新增内容
          │   └── {{new_folder_2}}/           # {{purpose_2}}
      - id: integration-guidelines
        title: 集成指南
        template: |
          - **文件命名:** {{file_naming_consistency}}
          - **文件夹组织:** {{folder_organization_approach}}
          - **导入/导出模式:** {{import_export_consistency}}

  - id: infrastructure-deployment
    title: 基础设施与部署集成
    instruction: |
      Define how the enhancement will be deployed alongside existing infrastructure:

      1. Use existing deployment pipeline and infrastructure
      2. Identify any infrastructure changes needed
      3. Plan deployment strategy to minimize risk
      4. Define rollback procedures
    elicit: true
    sections:
      - id: existing-infrastructure
        title: 现有基础设施
        template: |
          **当前部署:** {{existing_deployment_summary}}
          **基础设施工具:** {{existing_infrastructure_tools}}
          **环境:** {{existing_environments}}
      - id: enhancement-deployment
        title: 增强部署策略
        template: |
          **部署方式:** {{deployment_approach}}
          **基础设施变更:** {{infrastructure_changes}}
          **流水线集成:** {{pipeline_integration}}
      - id: rollback-strategy
        title: 回滚策略
        template: |
          **回滚方式:** {{rollback_method}}
          **风险缓解:** {{risk_mitigation}}
          **监控:** {{monitoring_approach}}

  - id: coding-standards
    title: 编码规范
    instruction: |
      Define IMPROVED coding standards for the enhancement:

      CRITICAL: This section defines standards for NEW code. You can and SHOULD improve upon existing practices documented in docs/existing-system-analysis.md.

      1. Review existing coding standards from docs/existing-system-analysis.md "Coding Standards" section
      2. Identify weaknesses or areas for improvement (check "Gaps and Recommendations" section)
      3. Define IMPROVED standards for the enhancement (better than existing if current practices are poor)
      4. Ensure compatibility where necessary, but prioritize code quality for new development
      5. These standards will be used by Dev agents when implementing stories

      Example: If existing code has poor test coverage, define higher coverage requirements for new code.
    elicit: true
    sections:
      - id: existing-standards
        title: 现有规范（来自当前系统）
        instruction: Extract from docs/existing-system-analysis.md "Coding Standards" section
        template: |
          **代码风格:** {{existing_code_style}}
          **Linting 规则:** {{existing_linting}}
          **测试模式:** {{existing_test_patterns}}
          **文档风格:** {{existing_doc_style}}
      - id: enhancement-standards
        title: 增强的改进规范
        instruction: Define BETTER standards for new code (this is what Dev will follow)
        repeatable: true
        template: "- **{{standard_name}}:** {{standard_description}}（改进点: {{why_better_than_existing}}）"
      - id: integration-rules
        title: 关键集成规则
        template: |
          - **现有 API 兼容性:** {{api_compatibility_rule}}
          - **数据库集成:** {{db_integration_rule}}
          - **错误处理:** {{error_handling_integration}}
          - **日志一致性:** {{logging_consistency}}

  - id: testing-strategy
    title: 测试策略
    instruction: |
      Define testing approach for the enhancement:

      1. Integrate with existing test suite
      2. Ensure existing functionality remains intact
      3. Plan for testing new features
      4. Define integration testing approach
    elicit: true
    sections:
      - id: existing-test-integration
        title: 与现有测试集成
        template: |
          **现有测试框架:** {{existing_test_framework}}
          **测试组织:** {{existing_test_organization}}
          **覆盖率要求:** {{existing_coverage_requirements}}
      - id: new-testing
        title: 新测试要求
        sections:
          - id: unit-tests
            title: 新组件的单元测试
            template: |
              - **框架:** {{test_framework}}
              - **位置:** {{test_location}}
              - **覆盖率目标:** {{coverage_target}}
              - **与现有测试的集成:** {{test_integration}}
          - id: integration-tests
            title: 集成测试
            template: |
              - **范围:** {{integration_test_scope}}
              - **现有系统验证:** {{existing_system_verification}}
              - **新功能测试:** {{new_feature_testing}}
          - id: regression-tests
            title: 回归测试
            template: |
              - **现有功能验证:** {{regression_test_approach}}
              - **自动化回归套件:** {{automated_regression}}
              - **手动测试要求:** {{manual_testing_requirements}}

  - id: security-integration
    title: 安全集成
    instruction: |
      Ensure security consistency with existing system:

      1. Follow existing security patterns and tools
      2. Ensure new features don't introduce vulnerabilities
      3. Maintain existing security posture
      4. Define security testing for new components
    elicit: true
    sections:
      - id: existing-security
        title: 现有安全措施
        template: |
          **认证:** {{existing_auth}}
          **授权:** {{existing_authz}}
          **数据保护:** {{existing_data_protection}}
          **安全工具:** {{existing_security_tools}}
      - id: enhancement-security
        title: 增强安全要求
        template: |
          **新增安全措施:** {{new_security_measures}}
          **集成点:** {{security_integration_points}}
          **合规要求:** {{compliance_requirements}}
      - id: security-testing
        title: 安全测试
        template: |
          **现有安全测试:** {{existing_security_tests}}
          **新增安全测试要求:** {{new_security_tests}}
          **渗透测试:** {{pentest_requirements}}

  - id: checklist-results
    title: 检查清单结果报告
    instruction: Execute the architect-checklist and populate results here, focusing on brownfield-specific validation

  - id: next-steps
    title: 下一步
    instruction: |
      After completing the brownfield architecture:

      1. Review integration points with existing system
      2. Begin story implementation with Dev agent
      3. Set up deployment pipeline integration
      4. Plan rollback and monitoring procedures
    sections:
      - id: story-manager-handoff
        title: Story Manager 交接
        instruction: |
          Create a brief prompt for Story Manager to work with this brownfield enhancement. Include:
          - Reference to this architecture document
          - Key integration requirements validated with user
          - Existing system constraints based on actual project analysis
          - First story to implement with clear integration checkpoints
          - Emphasis on maintaining existing system integrity throughout implementation
      - id: developer-handoff
        title: 开发者交接
        instruction: |
          Create a brief prompt for developers starting implementation. Include:
          - Reference to this architecture and existing coding standards analyzed from actual project
          - Integration requirements with existing codebase validated with user
          - Key technical decisions based on real project constraints
          - Existing system compatibility requirements with specific verification steps
          - Clear sequencing of implementation to minimize risk to existing functionality
