  # API Contracts

  **Version**: {{version}}
  **Last Updated**: {{date}}
  **Status**: {{status}}

  ## 1. Overview

  This document defines the API contracts between backend and frontend/mobile clients.

  **Principles**:
  - RESTful design
  - JSON request/response
  - JWT authentication
  - Versioned APIs (v1, v2)

  ## 2. Authentication APIs

  ### POST /api/auth/login

  **Description**: User login with email and password.

  **Request**:
  ```json
  {
    "email": "user@example.com",
    "password": "SecurePass123"
  }
  ```

  **Request Schema**:
  ```yaml
  type: object
  required: [email, password]
  properties:
    email:
      type: string
      format: email
      example: user@example.com
    password:
      type: string
      minLength: 8
      example: SecurePass123
  ```

  **Response (200 OK)**:
  ```json
  {
    "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
    "user": {
      "id": "uuid-here",
      "email": "user@example.com",
      "name": "John Doe",
      "created_at": "2025-01-14T10:00:00Z"
    }
  }
  ```

  **Response Schema**:
  ```yaml
  type: object
  properties:
    token:
      type: string
      description: JWT access token
    user:
      $ref: '#/components/schemas/User'
  ```

  **Error Responses**:

  - **401 Unauthorized**:
    ```json
    {
      "error": "Invalid credentials",
      "code": "AUTH_INVALID_CREDENTIALS"
    }
    ```

  - **400 Bad Request**:
    ```json
    {
      "error": "Validation failed",
      "code": "VALIDATION_ERROR",
      "details": {
        "email": "Invalid email format"
      }
    }
    ```

  **Security**:
  - Rate limiting: 5 requests per minute per IP
  - Password must be hashed with bcrypt (backend)
  - HTTPS only in production

  **Frontend Implementation Notes**:
  - Store token in localStorage (Web) or Keychain (iOS) or SharedPreferences (Android)
  - Include token in Authorization header for authenticated requests: `Authorization: Bearer <token>`

  **Backend Implementation Notes**:
  - Validate email format before database query
  - Use constant-time comparison for password verification
  - Return 401 for both invalid email and invalid password (prevent user enumeration)

  ---

  ### POST /api/auth/register

  **Description**: User registration with email and password.

  **Request**:
  ```json
  {
    "email": "user@example.com",
    "password": "SecurePass123",
    "name": "John Doe"
  }
  ```

  **Request Schema**:
  ```yaml
  type: object
  required: [email, password, name]
  properties:
    email:
      type: string
      format: email
      example: user@example.com
    password:
      type: string
      minLength: 8
      example: SecurePass123
    name:
      type: string
      minLength: 2
      example: John Doe
  ```

  **Response (201 Created)**:
  ```json
  {
    "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
    "user": {
      "id": "uuid-here",
      "email": "user@example.com",
      "name": "John Doe",
      "created_at": "2025-01-14T10:00:00Z"
    }
  }
  ```

  **Error Responses**:

  - **409 Conflict**:
    ```json
    {
      "error": "Email already exists",
      "code": "EMAIL_ALREADY_EXISTS"
    }
    ```

  - **400 Bad Request**:
    ```json
    {
      "error": "Validation failed",
      "code": "VALIDATION_ERROR",
      "details": {
        "password": "Password must be at least 8 characters"
      }
    }
    ```

  **Security**:
  - Rate limiting: 3 registrations per hour per IP
  - Email verification required (send verification email)
  - Password strength requirements enforced

  ---

  ### POST /api/auth/logout

  **Description**: User logout (invalidate JWT token).

  **Request**:
  ```json
  {}
  ```

  **Headers**:
  - `Authorization: Bearer <token>`

  **Response (200 OK)**:
  ```json
  {
    "message": "Logged out successfully"
  }
  ```

  **Error Responses**:

  - **401 Unauthorized**:
    ```json
    {
      "error": "Invalid or expired token",
      "code": "AUTH_TOKEN_INVALID"
    }
    ```

  ---

  ## 3. User Management APIs

  ### GET /api/users/:id

  **Description**: Get user profile by ID.

  **Parameters**:
  - `id` (path, required): User UUID

  **Headers**:
  - `Authorization: Bearer <token>`

  **Response (200 OK)**:
  ```json
  {
    "id": "uuid-here",
    "email": "user@example.com",
    "name": "John Doe",
    "created_at": "2025-01-14T10:00:00Z",
    "updated_at": "2025-01-14T10:00:00Z"
  }
  ```

  **Response Schema**:
  ```yaml
  $ref: '#/components/schemas/User'
  ```

  **Error Responses**:

  - **404 Not Found**:
    ```json
    {
      "error": "User not found",
      "code": "USER_NOT_FOUND"
    }
    ```

  - **401 Unauthorized**:
    ```json
    {
      "error": "Invalid or expired token",
      "code": "AUTH_TOKEN_INVALID"
    }
    ```

  **Security**:
  - Authentication required
  - Users can only access their own profile (unless admin)

  ---

  ### PUT /api/users/:id

  **Description**: Update user profile.

  **Parameters**:
  - `id` (path, required): User UUID

  **Headers**:
  - `Authorization: Bearer <token>`

  **Request**:
  ```json
  {
    "name": "John Smith",
    "email": "newemail@example.com"
  }
  ```

  **Request Schema**:
  ```yaml
  type: object
  properties:
    name:
      type: string
      minLength: 2
    email:
      type: string
      format: email
  ```

  **Response (200 OK)**:
  ```json
  {
    "id": "uuid-here",
    "email": "newemail@example.com",
    "name": "John Smith",
    "created_at": "2025-01-14T10:00:00Z",
    "updated_at": "2025-01-14T11:00:00Z"
  }
  ```

  **Error Responses**:

  - **409 Conflict**:
    ```json
    {
      "error": "Email already exists",
      "code": "EMAIL_ALREADY_EXISTS"
    }
    ```

  - **403 Forbidden**:
    ```json
    {
      "error": "Cannot update other user's profile",
      "code": "FORBIDDEN"
    }
    ```

  **Security**:
  - Authentication required
  - Users can only update their own profile (unless admin)
  - Email change requires verification

  ---

  ## 4. Components Schemas

  ### User

  ```yaml
  User:
    type: object
    properties:
      id:
        type: string
        format: uuid
        description: Unique user identifier
      email:
        type: string
        format: email
        description: User email address
      name:
        type: string
        description: User full name
      created_at:
        type: string
        format: date-time
        description: Account creation timestamp
      updated_at:
        type: string
        format: date-time
        description: Last update timestamp
  ```

  ---

  ## 5. Error Codes Reference

  | Code | HTTP Status | Description |
  |------|-------------|-------------|
  | AUTH_INVALID_CREDENTIALS | 401 | Invalid email or password |
  | AUTH_TOKEN_INVALID | 401 | Invalid or expired JWT token |
  | AUTH_TOKEN_EXPIRED | 401 | JWT token has expired |
  | EMAIL_ALREADY_EXISTS | 409 | Email address already registered |
  | USER_NOT_FOUND | 404 | User with given ID not found |
  | VALIDATION_ERROR | 400 | Request validation failed |
  | FORBIDDEN | 403 | Operation not permitted |
  | INTERNAL_ERROR | 500 | Internal server error |

  ---

  ## 6. Common Headers

  ### Request Headers

  - `Authorization: Bearer <token>` - JWT authentication token (required for protected endpoints)
  - `Content-Type: application/json` - Request body format
  - `Accept: application/json` - Expected response format

  ### Response Headers

  - `Content-Type: application/json` - Response body format
  - `X-Request-ID: <uuid>` - Unique request identifier for tracking
  - `X-RateLimit-Limit: <number>` - Rate limit maximum requests
  - `X-RateLimit-Remaining: <number>` - Rate limit remaining requests
  - `X-RateLimit-Reset: <timestamp>` - Rate limit reset time

  ---

  ## 7. Pagination

  For list endpoints (if applicable):

  **Query Parameters**:
  - `page` (optional, default: 1): Page number
  - `limit` (optional, default: 20, max: 100): Items per page

  **Response Format**:
  ```json
  {
    "data": [...],
    "pagination": {
      "page": 1,
      "limit": 20,
      "total": 100,
      "totalPages": 5
    }
  }
  ```

