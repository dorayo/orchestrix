template:
  id: frontend-spec-template-v2
  name: UI/UX 规格说明书
  version: 2.0
  output:
    format: markdown
    filename: docs/front-end-spec.md
    title: "{{project_name}} UI/UX 规格说明书"

workflow:
  mode: draft-first
  elicitation: advanced-elicitation

sections:
  - id: introduction
    title: 引言
    instruction: |
      Review provided documents including Project Brief, PRD, and any user research to gather context. Focus on understanding user needs, pain points, and desired outcomes before beginning the specification.

      Establish the document's purpose and scope. Keep the content below but ensure project name is properly substituted.
    content: |
      本文档定义了 {{project_name}} 用户界面的用户体验目标、信息架构、用户流程和视觉设计规格。它是视觉设计和前端开发的基础，确保提供一致且以用户为中心的体验。
    sections:
      - id: ux-goals-principles
        title: 总体 UX 目标与原则
        instruction: |
          Work with the user to establish and document the following. If not already defined, facilitate a discussion to determine:

          1. Target User Personas - elicit details or confirm existing ones from PRD
          2. Key Usability Goals - understand what success looks like for users
          3. Core Design Principles - establish 3-5 guiding principles
        elicit: true
        sections:
          - id: user-personas
            title: 目标用户画像
            template: "{{persona_descriptions}}"
            examples:
              - "**专业用户:** 需要高级功能和高效率的技术专业人员"
              - "**普通用户:** 偶尔使用的用户，优先考虑易用性和清晰的引导"
              - "**管理员:** 需要控制和监督能力的系统管理者"
          - id: usability-goals
            title: 可用性目标
            template: "{{usability_goals}}"
            examples:
              - "易学性: 新用户可在 5 分钟内完成核心任务"
              - "使用效率: 专业用户可以最少点击完成常用任务"
              - "防错设计: 对破坏性操作提供清晰的验证和确认"
              - "可记忆性: 不常使用的用户返回后无需重新学习"
          - id: design-principles
            title: 设计原则
            template: "{{design_principles}}"
            type: numbered-list
            examples:
              - "**清晰优于花哨** - 优先清晰的沟通而非美学创新"
              - "**渐进式披露** - 只在需要时展示所需内容"
              - "**一致的模式** - 全应用使用熟悉的 UI 模式"
              - "**即时反馈** - 每个操作都应有清晰、即时的响应"
              - "**默认无障碍** - 从一开始就为所有用户设计"
      - id: changelog
        title: 变更日志
        type: table
        columns: [日期, 版本, 描述, 作者]
        instruction: Track document versions and changes

  - id: information-architecture
    title: 信息架构 (IA)
    instruction: |
      Collaborate with the user to create a comprehensive information architecture:

      1. Build a Site Map or Screen Inventory showing all major areas
      2. Define the Navigation Structure (primary, secondary, breadcrumbs)
      3. Use Mermaid diagrams for visual representation
      4. Consider user mental models and expected groupings
    elicit: true
    sections:
      - id: sitemap
        title: 站点地图 / 页面清单
        type: mermaid
        mermaid_type: graph
        template: "{{sitemap_diagram}}"
        examples:
          - |
            graph TD
                A[首页] --> B[控制台]
                A --> C[产品]
                A --> D[账户]
                B --> B1[数据分析]
                B --> B2[最近活动]
                C --> C1[浏览]
                C --> C2[搜索]
                C --> C3[产品详情]
                D --> D1[个人资料]
                D --> D2[设置]
                D --> D3[账单]
      - id: navigation-structure
        title: 导航结构
        template: |
          **主导航:** {{primary_nav_description}}

          **次级导航:** {{secondary_nav_description}}

          **面包屑策略:** {{breadcrumb_strategy}}

  - id: user-flows
    title: 用户流程
    instruction: |
      For each critical user task identified in the PRD:

      1. Define the user's goal clearly
      2. Map out all steps including decision points
      3. Consider edge cases and error states
      4. Use Mermaid flow diagrams for clarity
      5. Link to external tools (Figma/Miro) if detailed flows exist there

      Create subsections for each major flow.
    elicit: true
    repeatable: true
    sections:
      - id: flow
        title: "{{flow_name}}"
        template: |
          **用户目标:** {{flow_goal}}

          **入口点:** {{entry_points}}

          **成功标准:** {{success_criteria}}
        sections:
          - id: flow-diagram
            title: 流程图
            type: mermaid
            mermaid_type: graph
            template: "{{flow_diagram}}"
          - id: edge-cases
            title: "边界情况与错误处理:"
            type: bullet-list
            template: "- {{edge_case}}"
          - id: notes
            template: "**备注:** {{flow_notes}}"

  - id: wireframes-mockups
    title: 线框图与原型
    instruction: |
      Clarify where detailed visual designs will be created (Figma, Sketch, etc.) and how to reference them. If low-fidelity wireframes are needed, offer to help conceptualize layouts for key screens.
    elicit: true
    sections:
      - id: design-files
        template: "**主设计文件:** {{design_tool_link}}"
      - id: key-screen-layouts
        title: 关键页面布局
        repeatable: true
        sections:
          - id: screen
            title: "{{screen_name}}"
            template: |
              **用途:** {{screen_purpose}}

              **关键元素:**
              - {{element_1}}
              - {{element_2}}
              - {{element_3}}

              **交互说明:** {{interaction_notes}}

              **设计文件引用:** {{specific_frame_link}}

  - id: component-library
    title: 组件库 / 设计系统
    instruction: |
      Discuss whether to use an existing design system or create a new one. If creating new, identify foundational components and their key states. Note that detailed technical specs belong in front-end-architecture.
    elicit: true
    sections:
      - id: design-system-approach
        template: "**设计系统方案:** {{design_system_approach}}"
      - id: core-components
        title: 核心组件
        repeatable: true
        sections:
          - id: component
            title: "{{component_name}}"
            template: |
              **用途:** {{component_purpose}}

              **变体:** {{component_variants}}

              **状态:** {{component_states}}

              **使用指南:** {{usage_guidelines}}

  - id: branding-style
    title: 品牌与样式指南
    instruction: Link to existing style guide or define key brand elements. Ensure consistency with company brand guidelines if they exist.
    elicit: true
    sections:
      - id: visual-identity
        title: 视觉识别
        template: "**品牌指南:** {{brand_guidelines_link}}"
      - id: color-palette
        title: 色彩体系
        type: table
        columns: ["颜色类型", "十六进制值", "用途"]
        rows:
          - ["主色", "{{primary_color}}", "{{primary_usage}}"]
          - ["辅助色", "{{secondary_color}}", "{{secondary_usage}}"]
          - ["强调色", "{{accent_color}}", "{{accent_usage}}"]
          - ["成功", "{{success_color}}", "正面反馈、确认"]
          - ["警告", "{{warning_color}}", "提醒、重要通知"]
          - ["错误", "{{error_color}}", "错误、破坏性操作"]
          - ["中性", "{{neutral_colors}}", "文本、边框、背景"]
      - id: typography
        title: 字体排版
        sections:
          - id: font-families
            title: 字体
            template: |
              - **主字体:** {{primary_font}}
              - **辅助字体:** {{secondary_font}}
              - **等宽字体:** {{mono_font}}
          - id: type-scale
            title: 字号体系
            type: table
            columns: ["元素", "字号", "字重", "行高"]
            rows:
              - ["H1", "{{h1_size}}", "{{h1_weight}}", "{{h1_line}}"]
              - ["H2", "{{h2_size}}", "{{h2_weight}}", "{{h2_line}}"]
              - ["H3", "{{h3_size}}", "{{h3_weight}}", "{{h3_line}}"]
              - ["正文", "{{body_size}}", "{{body_weight}}", "{{body_line}}"]
              - ["小字", "{{small_size}}", "{{small_weight}}", "{{small_line}}"]
      - id: iconography
        title: 图标
        template: |
          **图标库:** {{icon_library}}

          **使用指南:** {{icon_guidelines}}
      - id: spacing-layout
        title: 间距与布局
        template: |
          **网格系统:** {{grid_system}}

          **间距体系:** {{spacing_scale}}

  - id: accessibility
    title: 无障碍要求
    instruction: Define specific accessibility requirements based on target compliance level and user needs. Be comprehensive but practical.
    elicit: true
    sections:
      - id: compliance-target
        title: 合规目标
        template: "**标准:** {{compliance_standard}}"
      - id: key-requirements
        title: 关键要求
        template: |
          **视觉:**
          - 颜色对比度: {{contrast_requirements}}
          - 焦点指示器: {{focus_requirements}}
          - 文字大小: {{text_requirements}}

          **交互:**
          - 键盘导航: {{keyboard_requirements}}
          - 屏幕阅读器支持: {{screen_reader_requirements}}
          - 触控目标: {{touch_requirements}}

          **内容:**
          - 替代文本: {{alt_text_requirements}}
          - 标题结构: {{heading_requirements}}
          - 表单标签: {{form_requirements}}
      - id: testing-strategy
        title: 测试策略
        template: "{{accessibility_testing}}"

  - id: responsiveness
    title: 响应式策略
    instruction: Define breakpoints and adaptation strategies for different device sizes. Consider both technical constraints and user contexts.
    elicit: true
    sections:
      - id: breakpoints
        title: 断点
        type: table
        columns: ["断点", "最小宽度", "最大宽度", "目标设备"]
        rows:
          - ["移动端", "{{mobile_min}}", "{{mobile_max}}", "{{mobile_devices}}"]
          - ["平板", "{{tablet_min}}", "{{tablet_max}}", "{{tablet_devices}}"]
          - ["桌面端", "{{desktop_min}}", "{{desktop_max}}", "{{desktop_devices}}"]
          - ["宽屏", "{{wide_min}}", "-", "{{wide_devices}}"]
      - id: adaptation-patterns
        title: 适配模式
        template: |
          **布局变化:** {{layout_adaptations}}

          **导航变化:** {{nav_adaptations}}

          **内容优先级:** {{content_adaptations}}

          **交互变化:** {{interaction_adaptations}}

  - id: animation
    title: 动效与微交互
    instruction: Define motion design principles and key interactions. Keep performance and accessibility in mind.
    elicit: true
    sections:
      - id: motion-principles
        title: 动效原则
        template: "{{motion_principles}}"
      - id: key-animations
        title: 关键动效
        repeatable: true
        template: "- **{{animation_name}}:** {{animation_description}} (时长: {{duration}}, 缓动: {{easing}})"

  - id: performance
    title: 性能考量
    instruction: Define performance goals and strategies that impact UX design decisions.
    sections:
      - id: performance-goals
        title: 性能目标
        template: |
          - **页面加载:** {{load_time_goal}}
          - **交互响应:** {{interaction_goal}}
          - **动画帧率:** {{animation_goal}}
      - id: design-strategies
        title: 设计策略
        template: "{{performance_strategies}}"

  - id: next-steps
    title: 下一步
    instruction: |
      After completing the UI/UX specification:

      1. Recommend review with stakeholders
      2. Suggest creating/updating visual designs in design tool
      3. Prepare for handoff to Design Architect for frontend architecture
      4. Note any open questions or decisions needed
    sections:
      - id: immediate-actions
        title: 立即行动项
        type: numbered-list
        template: "{{action}}"
      - id: design-handoff-checklist
        title: 设计交接清单
        type: checklist
        items:
          - "所有用户流程已记录"
          - "组件清单已完成"
          - "无障碍要求已定义"
          - "响应式策略已明确"
          - "品牌指南已整合"
          - "性能目标已确定"

  - id: checklist-results
    title: 检查清单结果
    instruction: If a UI/UX checklist exists, run it against this document and report results here.
