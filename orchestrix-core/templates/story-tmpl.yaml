template:
  id: story-template-v2
  name: Story Document
  version: 2.0
  output:
    format: markdown
    filename: docs/stories/{{epic_num}}.{{story_num}}.{{story_title_short}}.md
    title: "Story {{epic_num}}.{{story_num}}: {{story_title_short}}"

workflow:
  mode: interactive
  elicitation: advanced-elicitation

agent_config:
  editable_sections: 
    - Status
    - Story
    - Acceptance Criteria
    - Tasks / Subtasks
    - Dev Notes
    - Testing
    - Change Log

sections:
  - id: status
    title: Status
    type: choice
    choices: [Draft, Approved, InProgress, FrontendReview, BackendInProgress, Review, Done]
    instruction: Select the current status of the story
    owner: scrum-master
    editors: [scrum-master, dev-agent]
    
  - id: story
    title: Story
    type: template-text
    template: |
      **As a** {{role}},
      **I want** {{action}},
      **so that** {{benefit}}
    instruction: Define the user story using the standard format with role, action, and benefit
    elicit: true
    owner: scrum-master
    editors: [scrum-master, ux-expert]
    
  - id: acceptance-criteria
    title: Acceptance Criteria
    type: numbered-list
    instruction: Copy the acceptance criteria numbered list from the epic file
    elicit: true
    owner: scrum-master
    editors: [scrum-master, ux-expert]
    
  - id: tasks-subtasks
    title: Tasks / Subtasks
    type: bullet-list
    instruction: |
      Break down the story into specific tasks and subtasks needed for implementation.
      
      **For Frontend-First Strategy (when frontendFirstStrategy: true):**
      - Structure tasks in phases: Frontend → User Confirmation → Backend → Integration
      - Include specific user confirmation checkpoint after frontend completion
      - Reference applicable acceptance criteria numbers where relevant.
      
      **For Traditional Stories:**
      - Use standard task breakdown approach
    template: |
      **Phase 1: Frontend Implementation**
      - [ ] Task 1: Build UI components (AC: # if applicable)
        - [ ] Create component structure
        - [ ] Implement responsive design
        - [ ] Add mock data integration
      - [ ] Task 2: Implement user interactions (AC: # if applicable)
        - [ ] Handle user input
        - [ ] Add form validation
        - [ ] Implement navigation flows
      
      **Phase 1 Checkpoint: User Confirmation Required**
      - [ ] **USER REVIEW**: Present frontend to user for confirmation
        - [ ] Verify UI/UX matches requirements
        - [ ] Confirm user flows work as expected
        - [ ] Get approval before proceeding to backend
      
      **Phase 2: Backend Implementation (After User Approval)**
      - [ ] Task 3: Implement API endpoints (AC: # if applicable)
        - [ ] Create data models
        - [ ] Build REST/GraphQL APIs
        - [ ] Add authentication/authorization
      
      **Phase 3: Integration & Testing**
      - [ ] Task 4: Connect frontend to real APIs (AC: # if applicable)
        - [ ] Replace mock data with real API calls
        - [ ] Handle error states
        - [ ] Add loading states
      - [ ] Task 5: End-to-end testing (AC: # if applicable)
        - [ ] Test complete user workflows
        - [ ] Verify all acceptance criteria
    elicit: true
    owner: scrum-master
    editors: [scrum-master, dev-agent, ux-expert]
    
  - id: dev-notes
    title: Dev Notes
    instruction: |
      Populate relevant information, only what was pulled from actual artifacts from docs folder, relevant to this story:
      - Do not invent information
      - If known add Relevant Source Tree info that relates to this story
      - If there were important notes from previous story that are relevant to this one, include them here
      - MANDATORY: Include Technical Preferences Summary section with key technical choices and constraints from architecture docs
      - Put enough information in this section so that the dev agent should NEVER need to read the architecture documents, these notes along with the tasks and subtasks must give the Dev Agent the complete context it needs to comprehend with the least amount of overhead the information to complete the story, meeting all AC and completing all tasks+subtasks
    elicit: true
    owner: scrum-master
    editors: [scrum-master]
    sections:
      - id: technical-preferences-summary
        title: Technical Preferences Summary
        instruction: |
          Extract and summarize key technical preferences and constraints that apply to this story:
          - Technology stack choices and version requirements
          - Architecture patterns and conventions to follow
          - Development practices and coding standards
          - Library/framework preferences and restrictions
          - Performance, security, or integration constraints
          - Source all information with references: [Source: architecture/{filename}.md#{section}]
        elicit: true
        owner: scrum-master
        editors: [scrum-master]
      - id: testing-standards
        title: Testing
        instruction: |
          List Relevant Testing Standards from Architecture the Developer needs to conform to:
          - Test file location
          - Test standards
          - Testing frameworks and patterns to use
          - Any specific testing requirements for this story
          
          CRITICAL - Test Integrity Rules:
          - Tests represent requirements and are AUTHORITATIVE - they define what "correct" means
          - NEVER modify test expectations, assertions, or acceptance criteria to make tests pass
          - If tests fail, fix the IMPLEMENTATION, not the tests
          - Distinguish between "requirement tests" (immutable business logic) and "implementation tests" (adjustable technical details)
          - Any test modifications require explicit business justification and approval
          - Tests are the executable expression of requirements and must be preserved
        elicit: true
        owner: scrum-master
        editors: [scrum-master]
        
  - id: change-log
    title: Change Log
    type: table
    columns: [Date, Version, Description, Author]
    instruction: Track changes made to this story document
    owner: scrum-master
    editors: [scrum-master, dev-agent, qa-agent, ux-expert]
    
  - id: dev-agent-record
    title: Dev Agent Record
    instruction: This section is populated by the development agent during implementation
    owner: dev-agent
    editors: [dev-agent]
    sections:
      - id: agent-model
        title: Agent Model Used
        template: "{{agent_model_name_version}}"
        instruction: Record the specific AI agent model and version used for development
        owner: dev-agent
        editors: [dev-agent]
        
      - id: debug-log-references
        title: Debug Log References
        instruction: Reference any debug logs or traces generated during development
        owner: dev-agent
        editors: [dev-agent]
        
      - id: completion-notes
        title: Completion Notes List
        instruction: Notes about the completion of tasks and any issues encountered
        owner: dev-agent
        editors: [dev-agent]
        
      - id: file-list
        title: File List
        instruction: List all files created, modified, or affected during story implementation
        owner: dev-agent
        editors: [dev-agent]
        
  - id: qa-results
    title: QA Results
    instruction: Results from QA Agent QA review of the completed story implementation
    owner: qa-agent
    editors: [qa-agent]