template:
  id: brownfield-prd-template-v2
  name: Brownfield Enhancement PRD
  version: 2.0
  output:
    format: markdown
    filename: docs/prd.md
    title: "{{project_name}} Brownfield Enhancement PRD"

workflow:
  mode: interactive
  elicitation: advanced-elicitation

sections:
  - id: intro-analysis
    title: Intro Project Analysis and Context
    instruction: |
      IMPORTANT - SCOPE AND PREREQUISITES:

      This PRD is for SIGNIFICANT enhancements to existing projects that require comprehensive planning and multiple stories. Before proceeding:

      1. **Assess Enhancement Complexity**: If this is a simple feature addition or bug fix that could be completed in 1-2 focused development sessions, STOP and recommend: "For simpler changes, consider using the brownfield-create-epic or brownfield-create-story task with the Product Owner instead. This full PRD process is designed for substantial enhancements that require architectural planning and multiple coordinated stories."

      2. **REQUIRED PREREQUISITE - Existing System Analysis**:
         - **Multi-Repo Detection**: Check if core-config.yaml contains `multi_repo:` key with `mode: multi-repo`
           * If YES: Multi-repository mode → **MUST have**: docs/existing-system-integration.md (created via @architect *aggregate-system-analysis)
           * If NO: Single-repository mode → **MUST have**: docs/existing-system-analysis.md (created via @architect *document-project)
         - **Why required**: This PRD defines ENHANCEMENTS to the existing system. You need to understand the current state first.
         - **If missing**:
           * Multi-repo: HALT and instruct: "Please run '@architect *aggregate-system-analysis' first to create docs/existing-system-integration.md. This aggregates analysis from all implementation repositories."
           * Single-repo: HALT and instruct: "Please run '@architect *document-project' first to create docs/existing-system-analysis.md. This provides the necessary context about the existing system before defining enhancements."

      3. **Project Context Validation**:
         - **Auto-detect mode**: Check core-config.yaml for `project.mode` and `multi_repo` configuration
         - **Load and review**:
           * Multi-repo mode: docs/existing-system-integration.md (aggregated analysis)
           * Single-repo mode: docs/existing-system-analysis.md (repository analysis)
         - Verify understanding of current tech stack, architecture, and constraints
         - If IDE access available, validate analysis against actual codebase

      4. **Deep Assessment Requirement**: You MUST thoroughly understand the existing project (from analysis document) before making ANY enhancement suggestions. Every recommendation must consider existing constraints and patterns.

      Gather comprehensive information about the existing project. This section must be completed before proceeding with requirements.

      CRITICAL: Throughout this process, explicitly reference findings from the analysis document. For every enhancement suggestion, explain: "Based on the existing system analysis showing [constraint/pattern], I recommend [enhancement] because [rationale]. Does this align with your goals?"

      Do not proceed with any recommendations until the user has validated your understanding of the existing system.
    sections:
      - id: existing-project-overview
        title: Existing Project Overview
        instruction: Check if document-project analysis was already performed. If yes, reference that output instead of re-analyzing.
        sections:
          - id: analysis-source
            title: Analysis Source
            instruction: |
              Reference the existing system analysis document (auto-detected):
              - Primary source:
                * Multi-repo mode: docs/existing-system-integration.md (aggregated from all repos)
                * Single-repo mode: docs/existing-system-analysis.md (current repository)
              - Supplementary: IDE-based validation (if available)
              - Additional context: User-provided information

              Auto-detect by checking core-config.yaml for `project.mode` value.
          - id: current-state
            title: Current Project State
            instruction: |
              Extract summary from analysis document (auto-detected):
              - **Multi-repo mode**: Extract from docs/existing-system-integration.md
                * Reference "Repository Topology" section
                * Note "Cross-Repository API Contracts"
                * Highlight "Technical Debt (System-Level)" section
              - **Single-repo mode**: Extract from docs/existing-system-analysis.md
                * Reference "High Level Architecture" and "Technical Summary" sections
                * Note key technologies from "Tech Stack" section
                * Highlight constraints from "Technical Debt and Known Issues" section
              - Brief description of what the project currently does and its primary purpose
      - id: documentation-analysis
        title: Available Documentation Analysis
        instruction: |
          Review analysis document (REQUIRED prerequisite, auto-detected):
          - **Multi-repo mode**: docs/existing-system-integration.md
            * Note: "Using aggregated system integration analysis"
            * Reference: Repository Topology, API Contracts, Integration Patterns
          - **Single-repo mode**: docs/existing-system-analysis.md
            * Note: "Using existing system analysis"
            * Reference: Tech Stack, Source Tree, Coding Standards, Technical Debt

          Additionally check for other existing documentation in the project:
        sections:
          - id: available-docs
            title: Available Documentation
            type: checklist
            items:
              - Tech Stack Documentation [[LLM: Check ✓ from existing-system-analysis.md]]
              - Source Tree/Architecture [[LLM: Check ✓ from existing-system-analysis.md]]
              - Coding Standards [[LLM: Check ✓ from existing-system-analysis.md]]
              - API Documentation [[LLM: Check ✓ if present in existing-system-analysis.md]]
              - External API Documentation [[LLM: Check ✓ if present in existing-system-analysis.md]]
              - UX/UI Guidelines [[LLM: May not be in existing-system-analysis.md]]
              - Technical Debt Documentation [[LLM: Check ✓ from existing-system-analysis.md]]
              - "Other: {{other_docs}}"
            instruction: |
              Using existing system analysis from docs/existing-system-analysis.md as primary source.
              Mark items as available (✓) if covered in existing-system-analysis.md.
      - id: enhancement-scope
        title: Enhancement Scope Definition
        instruction: Work with user to clearly define what type of enhancement this is. This is critical for scoping and approach.
        sections:
          - id: enhancement-type
            title: Enhancement Type
            type: checklist
            instruction: Determine with user which applies
            items:
              - New Feature Addition
              - Major Feature Modification
              - Integration with New Systems
              - Performance/Scalability Improvements
              - UI/UX Overhaul
              - Technology Stack Upgrade
              - Bug Fix and Stability Improvements
              - "Other: {{other_type}}"
          - id: enhancement-description
            title: Enhancement Description
            instruction: 2-3 sentences describing what the user wants to add or change
          - id: impact-assessment
            title: Impact Assessment
            type: checklist
            instruction: Assess the scope of impact on existing codebase
            items:
              - Minimal Impact (isolated additions)
              - Moderate Impact (some existing code changes)
              - Significant Impact (substantial existing code changes)
              - Major Impact (architectural changes required)
      - id: goals-context
        title: Goals and Background Context
        sections:
          - id: goals
            title: Goals
            type: bullet-list
            instruction: Bullet list of 1-line desired outcomes this enhancement will deliver if successful
          - id: background
            title: Background Context
            type: paragraphs
            instruction: 1-2 short paragraphs explaining why this enhancement is needed, what problem it solves, and how it fits with the existing project
      - id: changelog
        title: Change Log
        type: table
        columns: [Change, Date, Version, Description, Author]

  - id: requirements
    title: Requirements
    instruction: |
      Draft functional and non-functional requirements based on your validated understanding of the existing project. Before presenting requirements, confirm: "These requirements are based on my understanding of your existing system. Please review carefully and confirm they align with your project's reality."
    elicit: true
    sections:
      - id: functional
        title: Functional
        type: numbered-list
        prefix: FR
        instruction: Each Requirement will be a bullet markdown with identifier starting with FR
        examples:
          - "FR1: The existing Todo List will integrate with the new AI duplicate detection service without breaking current functionality."
      - id: non-functional
        title: Non Functional
        type: numbered-list
        prefix: NFR
        instruction: Each Requirement will be a bullet markdown with identifier starting with NFR. Include constraints from existing system
        examples:
          - "NFR1: Enhancement must maintain existing performance characteristics and not exceed current memory usage by more than 20%."
      - id: compatibility
        title: Compatibility Requirements
        instruction: Critical for brownfield - what must remain compatible
        type: numbered-list
        prefix: CR
        template: "{{requirement}}: {{description}}"
        items:
          - id: cr1
            template: "CR1: {{existing_api_compatibility}}"
          - id: cr2
            template: "CR2: {{database_schema_compatibility}}"
          - id: cr3
            template: "CR3: {{ui_ux_consistency}}"
          - id: cr4
            template: "CR4: {{integration_compatibility}}"

  - id: ui-enhancement-goals
    title: User Interface Enhancement Goals
    condition: Enhancement includes UI changes
    instruction: For UI changes, capture how they will integrate with existing UI patterns and design systems
    sections:
      - id: existing-ui-integration
        title: Integration with Existing UI
        instruction: Describe how new UI elements will fit with existing design patterns, style guides, and component libraries
      - id: modified-screens
        title: Modified/New Screens and Views
        instruction: List only the screens/views that will be modified or added
      - id: ui-consistency
        title: UI Consistency Requirements
        instruction: Specific requirements for maintaining visual and interaction consistency with existing application

  - id: technical-constraints
    title: Technical Constraints and Integration Requirements
    instruction: This section replaces separate architecture documentation. Gather detailed technical constraints from existing project analysis.
    sections:
      - id: existing-tech-stack
        title: Existing Technology Stack
        instruction: |
          If document-project output available:
          - Extract from "Actual Tech Stack" table in High Level Architecture section
          - Include version numbers and any noted constraints
          
          Otherwise, document the current technology stack:
        template: |
          **Languages**: {{languages}}
          **Frameworks**: {{frameworks}}
          **Database**: {{database}}
          **Infrastructure**: {{infrastructure}}
          **External Dependencies**: {{external_dependencies}}
      - id: integration-approach
        title: Integration Approach
        instruction: Define how the enhancement will integrate with existing architecture
        template: |
          **Database Integration Strategy**: {{database_integration}}
          **API Integration Strategy**: {{api_integration}}
          **Frontend Integration Strategy**: {{frontend_integration}}
          **Testing Integration Strategy**: {{testing_integration}}
      - id: code-organization
        title: Code Organization and Standards
        instruction: Based on existing project analysis, define how new code will fit existing patterns
        template: |
          **File Structure Approach**: {{file_structure}}
          **Naming Conventions**: {{naming_conventions}}
          **Coding Standards**: {{coding_standards}}
          **Documentation Standards**: {{documentation_standards}}
      - id: deployment-operations
        title: Deployment and Operations
        instruction: How the enhancement fits existing deployment pipeline
        template: |
          **Build Process Integration**: {{build_integration}}
          **Deployment Strategy**: {{deployment_strategy}}
          **Monitoring and Logging**: {{monitoring_logging}}
          **Configuration Management**: {{config_management}}
      - id: risk-assessment
        title: Risk Assessment and Mitigation
        instruction: |
          If document-project output available:
          - Reference "Technical Debt and Known Issues" section
          - Include "Workarounds and Gotchas" that might impact enhancement
          - Note any identified constraints from "Critical Technical Debt"
          
          Build risk assessment incorporating existing known issues:
        template: |
          **Technical Risks**: {{technical_risks}}
          **Integration Risks**: {{integration_risks}}
          **Deployment Risks**: {{deployment_risks}}
          **Mitigation Strategies**: {{mitigation_strategies}}

  - id: epic-structure
    title: Epic and Story Structure
    instruction: |
      For brownfield projects, favor a single comprehensive epic unless the user is clearly requesting multiple unrelated enhancements. Before presenting the epic structure, confirm: "Based on my analysis of your existing project, I believe this enhancement should be structured as [single epic/multiple epics] because [rationale based on actual project analysis]. Does this align with your understanding of the work required?"
    elicit: true
    sections:
      - id: epic-approach
        title: Epic Approach
        instruction: Explain the rationale for epic structure - typically single epic for brownfield unless multiple unrelated features
        template: "**Epic Structure Decision**: {{epic_decision}} with rationale"

  - id: epic-details
    title: "Epic 1: {{enhancement_title}}"
    instruction: |
      Comprehensive epic that delivers the brownfield enhancement while maintaining existing functionality
      
      CRITICAL STORY SEQUENCING FOR BROWNFIELD:
      - Stories must ensure existing functionality remains intact
      - Each story should include verification that existing features still work
      - Stories should be sequenced to minimize risk to existing system
      - Include rollback considerations for each story
      - Focus on incremental integration rather than big-bang changes
      - Size stories for AI agent execution in existing codebase context
      - MANDATORY: Present the complete story sequence and ask: "This story sequence is designed to minimize risk to your existing system. Does this order make sense given your project's architecture and constraints?"
      - Stories must be logically sequential with clear dependencies identified
      - Each story must deliver value while maintaining system integrity
    template: |
      **Epic Goal**: {{epic_goal}}
      
      **Integration Requirements**: {{integration_requirements}}
    sections:
      - id: story
        title: "Story 1.{{story_number}} {{story_title}}"
        repeatable: true
        template: |
          As a {{user_type}},
          I want {{action}},
          so that {{benefit}}.
        sections:
          - id: acceptance-criteria
            title: Acceptance Criteria
            type: numbered-list
            instruction: Define criteria that include both new functionality and existing system integrity
            item_template: "{{criterion_number}}: {{criteria}}"
          - id: integration-verification
            title: Integration Verification
            instruction: Specific verification steps to ensure existing functionality remains intact
            type: numbered-list
            prefix: IV
            items:
              - template: "IV1: {{existing_functionality_verification}}"
              - template: "IV2: {{integration_point_verification}}"
              - template: "IV3: {{performance_impact_verification}}"

  - id: epic-planning
    title: Epic Planning
    instruction: |
      ⚠️  CRITICAL SECTION - This section will be used for story creation across all repositories.

      This section consolidates all epic and story definitions into structured YAML format.
      During PO *shard, this PRD will be split into docs/prd/*.md using md-tree,
      and the YAML blocks below will be preserved in the sharded files for SM agents to read.

      For EACH epic defined in the "Epic Details" section above, create a corresponding
      YAML block below using this exact format:

      ## Epic {{N}}: {{Epic Title from Epic Details}}

      **Epic Summary:** {{2-3 sentence summary from epic details}}

      **Target Repositories:** {{List applicable repository types: backend, frontend, ios, android, mobile}}

      **Integration Notes:** {{Brief note on how this epic integrates with existing system}}

      ```yaml
      epic_id: {{N}}
      title: "{{Epic Title}}"
      description: |
        {{Epic goal and integration requirements from epic details section}}

      stories:
        - id: "{{N}}.1"
          title: "{{Story title from Epic Details}}"
          repository_type: {{backend|frontend|ios|android|flutter|react-native|monolith}}
          acceptance_criteria_summary: |
            {{Consolidate all ACs from Epic Details into paragraph form, including integration verification}}
          estimated_complexity: {{low|medium|high}}
          priority: {{P0|P1|P2}}
          provides_apis: []  # For backend stories: list of "METHOD /path"
          consumes_apis: []  # For frontend/mobile stories: list of "METHOD /path"
          cross_repo_dependencies: []  # List of "Story ID - Description" if any

        - id: "{{N}}.2"
          title: "{{Next story title}}"
          repository_type: {{backend|frontend|ios|android|flutter|react-native|monolith}}
          acceptance_criteria_summary: |
            {{Consolidate ACs including integration verification}}
          estimated_complexity: {{low|medium|high}}
          priority: {{P0|P1|P2}}
          provides_apis: []
          consumes_apis: []
          cross_repo_dependencies: []
      ```

      IMPORTANT INSTRUCTIONS FOR BROWNFIELD:

      1. **One YAML block per epic** - Do not combine multiple epics in one YAML block
      2. **repository_type is MANDATORY** - This field determines which implementation repo gets each story
      3. **Maintain epic/story IDs** - Must match the IDs from Epic Details section
      4. **Include Integration Verification** - Brownfield stories must verify existing functionality remains intact
      5. **APIs tracking**:
         - Backend stories MUST list APIs they provide in provides_apis
         - Frontend/mobile stories MUST list APIs they consume in consumes_apis
         - Include both new APIs and modified existing APIs
         - Use format: "METHOD /path" (e.g., "POST /api/users", "GET /api/users/:id")
      6. **Cross-repo dependencies**:
         - If a story depends on another story (possibly in different repo), list in cross_repo_dependencies
         - Format: "Story ID - Brief description" (e.g., "1.2 - Backend enhancement must be deployed")
      7. **Acceptance criteria consolidation**:
         - Convert numbered AC list AND Integration Verification points into flowing paragraph form
         - Ensure both new functionality and existing system integrity are captured
      8. **For monolith projects**: Use repository_type: monolith for all stories

      EXAMPLE (Brownfield multi-repo enhancement):

      ## Epic 1: AI-Powered Search Enhancement

      **Epic Summary:** Add AI-powered semantic search to existing search functionality while maintaining backward compatibility with current keyword-based search.

      **Target Repositories:** backend, frontend

      **Integration Notes:** Enhances existing search service without breaking current search API contracts. Frontend will gracefully upgrade to AI search while keeping fallback to keyword search.

      ```yaml
      epic_id: 1
      title: "AI-Powered Search Enhancement"
      description: |
        Enhance existing search functionality with AI-powered semantic search capabilities.
        Backend will add new AI search endpoints while maintaining existing search API.
        Frontend will integrate AI search UI while preserving current search experience.

      stories:
        - id: "1.1"
          title: "Backend - AI Search Service Integration"
          repository_type: backend
          acceptance_criteria_summary: |
            New AI search endpoint returns semantically relevant results using vector embeddings.
            Existing keyword search endpoint continues to work unchanged. New endpoint follows
            existing API conventions (pagination, filtering, sorting). Performance metrics show
            AI search responds within 500ms for typical queries. Existing search tests still pass.
            New integration tests cover AI search functionality.
          estimated_complexity: high
          priority: P0
          provides_apis:
            - "POST /api/search/ai"
            - "GET /api/search/ai/suggestions"
          consumes_apis:
            - "POST /external/openai/embeddings"
          cross_repo_dependencies: []

        - id: "1.2"
          title: "Frontend - AI Search UI Component"
          repository_type: frontend
          acceptance_criteria_summary: |
            Search bar shows "AI Search" toggle option. When enabled, uses AI search endpoint.
            When disabled, uses existing keyword search (backward compatible). Search results
            display is enhanced to show relevance scores. Existing search functionality remains
            unchanged when AI toggle is off. UI components follow existing design system.
            Accessibility standards (WCAG AA) maintained. Loading states and error handling
            match existing patterns.
          estimated_complexity: medium
          priority: P0
          provides_apis: []
          consumes_apis:
            - "POST /api/search/ai"
            - "GET /api/search/ai/suggestions"
            - "GET /api/search"
          cross_repo_dependencies:
            - "1.1 - Backend AI search API must be complete and deployed"
      ```

      Now create YAML blocks for ALL epics defined in your Epic Details section above.