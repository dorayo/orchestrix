template:
  id: architecture-template-v2
  name: 架构设计文档
  version: 2.1
  output:
    format: markdown
    filename: docs/architecture.md
    title: "{{project_name}} 架构设计文档"

workflow:
  mode: interactive
  elicitation: advanced-elicitation

sections:
  - id: introduction
    title: 引言
    instruction: |
      If available, review any provided relevant documents to gather all relevant context before beginning. If at a minimum you cannot locate docs/prd.md ask the user what docs will provide the basis for the architecture.
    sections:
      - id: intro-content
        content: |
          本文档概述了 {{project_name}} 的整体项目架构，包括后端系统、共享服务以及非 UI 相关的关注点。其主要目标是作为 AI 驱动开发的架构蓝图，确保对所选模式和技术的一致性和遵循。

          **与前端架构的关系:**
          如果项目包含重要的用户界面，将有单独的前端架构文档详细说明前端设计，并且必须与本文档结合使用。本文档中记录的核心技术栈选择（见"技术栈"）对整个项目具有决定性，包括所有前端组件。

  - id: system-architecture-context
    title: 系统架构上下文（仅限实现仓库）
    condition: project.mode == 'multi-repo' and multi_repo.role in [backend, frontend, ios, android, mobile]
    instruction: |
      **FOR IMPLEMENTATION REPOSITORIES ONLY** (backend, frontend, ios, android, mobile):

      This detailed architecture document MUST align with the system-level architecture from the Product repository.

      **Step 1: Check for System Architecture**

      ```bash
      PRODUCT_REPO_PATH=$(yq eval '.multi_repo.product_repo_path' core-config.yaml)
      SYSTEM_ARCH="$PRODUCT_REPO_PATH/docs/architecture/system-architecture.md"

      if [ -f "$SYSTEM_ARCH" ]; then
        echo "✅ System architecture found at $SYSTEM_ARCH"
      else
        echo "⚠️ System architecture not found - proceeding without system-level constraints"
        echo "Recommendation: Create system-architecture.md in Product repo first"
      fi
      ```

      **Step 2: Load and Analyze System Architecture** (if it exists)

      Read the system-architecture.md file and extract:

      **For Backend Repositories**:
      - Repository role and responsibilities
      - API Contracts Summary - which APIs THIS backend must implement
      - Authentication mechanism (JWT, session, OAuth)
      - Data format standards (JSON structure, date format, pagination style)
      - Error handling standard (error response format, HTTP status codes)
      - Performance requirements (response SLAs, throughput targets)
      - Security requirements (encryption, secrets management)
      - Deployment architecture (platform, CI/CD)
      - Cross-cutting concerns (logging, monitoring, observability)

      **For Frontend Repositories**:
      - Repository role and responsibilities
      - API Contracts Summary - which APIs THIS frontend can consume
      - Authentication mechanism (token storage, refresh strategy)
      - Data format expectations (JSON structure, date parsing, pagination handling)
      - Error handling expectations (how to display errors from backend)
      - Performance requirements (page load time, TTI, Core Web Vitals)
      - Security requirements (XSS protection, CSRF, secure token storage)
      - Deployment architecture (platform, CI/CD)

      **Step 3: Document System Architecture Alignment**

      Present to user:
      ```
      📖 **系统架构上下文**

      已从产品仓库加载系统级架构。

      **本仓库角色** (来自 system-architecture.md):
      - 仓库名称: {{repo_name}}
      - 类型: {{repo_type}}
      - 职责: {{repo_responsibility}}

      **系统架构关键约束**:
      - 认证机制: {{auth_mechanism}}
      - API 契约: {{api_contracts_summary}}
      - 数据格式: {{data_format_standards}}
      - 错误处理: {{error_standard}}
      - 性能要求: {{performance_targets}}
      - 部署平台: {{deployment_platform}}

      本详细架构将与这些系统级决策保持一致并加以扩展。
      ```

      **Step 4: Validation Requirements**

      Throughout the architecture design, ensure:

      **For Backend**:
      - [ ] All APIs from system-architecture.md API Contracts Summary are implemented
      - [ ] Authentication mechanism matches system-architecture.md exactly
      - [ ] Data format (JSON structure, ISO 8601 dates, pagination) is consistent
      - [ ] Error response format matches system-architecture.md standard
      - [ ] Performance SLAs are documented and achievable

      **For Frontend**:
      - [ ] All API calls consume ONLY APIs defined in system-architecture.md
      - [ ] Authentication mechanism (token storage, refresh) matches system-architecture.md
      - [ ] Data format expectations match backend's format
      - [ ] Error handling displays errors per system-architecture.md standard
      - [ ] Performance targets (page load, TTI) are documented

      **CRITICAL**: If this architecture needs APIs NOT in system-architecture.md:
      1. STOP and flag this to the user
      2. Either: Update system-architecture.md to include the new APIs, OR remove the need for those APIs
      3. Resume architecture design once alignment is confirmed
    elicit: true
      - id: starter-template
        title: 起始模板或现有项目
        instruction: |
          Before proceeding further with architecture design, check if the project is based on a starter template or existing codebase:

          1. Review the PRD and brainstorming brief for any mentions of:
          - Starter templates (e.g., Create React App, Next.js, Vue CLI, Angular CLI, etc.)
          - Existing projects or codebases being used as a foundation
          - Boilerplate projects or scaffolding tools
          - Previous projects to be cloned or adapted

          2. If a starter template or existing project is mentioned:
          - Ask the user to provide access via one of these methods:
            - Link to the starter template documentation
            - Upload/attach the project files (for small projects)
            - Share a link to the project repository (GitHub, GitLab, etc.)
          - Analyze the starter/existing project to understand:
            - Pre-configured technology stack and versions
            - Project structure and organization patterns
            - Built-in scripts and tooling
            - Existing architectural patterns and conventions
            - Any limitations or constraints imposed by the starter
          - Use this analysis to inform and align your architecture decisions

          3. If no starter template is mentioned but this is a greenfield project:
          - Suggest appropriate starter templates based on the tech stack preferences
          - Explain the benefits (faster setup, best practices, community support)
          - Let the user decide whether to use one

          4. If the user confirms no starter template will be used:
          - Proceed with architecture design from scratch
          - Note that manual setup will be required for all tooling and configuration

          Document the decision here before proceeding with the architecture design. If none, just say N/A
        elicit: true
      - id: changelog
        title: 变更日志
        type: table
        columns: [日期, 版本, 描述, 作者]
        instruction: Track document versions and changes

  - id: high-level-architecture
    title: 高层架构
    instruction: |
      This section contains multiple subsections that establish the foundation of the architecture. Present all subsections together at once.
    elicit: true
    sections:
      - id: technical-summary
        title: 技术摘要
        instruction: |
          Provide a brief paragraph (3-5 sentences) overview of:
          - The system's overall architecture style
          - Key components and their relationships
          - Primary technology choices
          - Core architectural patterns being used
          - Reference back to the PRD goals and how this architecture supports them
      - id: high-level-overview
        title: 高层概述
        instruction: |
          Based on the PRD's Technical Assumptions section, describe:

          1. The main architectural style (e.g., Monolith, Microservices, Serverless, Event-Driven)
          2. Repository structure decision from PRD (Monorepo/Polyrepo)
          3. Service architecture decision from PRD
          4. Primary user interaction flow or data flow at a conceptual level
          5. Key architectural decisions and their rationale
      - id: project-diagram
        title: 高层项目架构图
        type: mermaid
        mermaid_type: graph
        instruction: |
          Create a Mermaid diagram that visualizes the high-level architecture. Consider:
          - System boundaries
          - Major components/services
          - Data flow directions
          - External integrations
          - User entry points

      - id: architectural-patterns
        title: 架构与设计模式
        instruction: |
          List the key high-level patterns that will guide the architecture. For each pattern:

          1. Present 2-3 viable options if multiple exist
          2. Provide your recommendation with clear rationale
          3. Get user confirmation before finalizing
          4. These patterns should align with the PRD's technical assumptions and project goals

          Common patterns to consider:
          - Architectural style patterns (Serverless, Event-Driven, Microservices, CQRS, Hexagonal)
          - Code organization patterns (Dependency Injection, Repository, Module, Factory)
          - Data patterns (Event Sourcing, Saga, Database per Service)
          - Communication patterns (REST, GraphQL, Message Queue, Pub/Sub)
        template: "- **{{pattern_name}}:** {{pattern_description}} - _理由:_ {{rationale}}"
        examples:
          - "**Serverless 架构:** 使用 AWS Lambda 计算 - _理由:_ 符合 PRD 对成本优化和自动扩缩容的要求"
          - "**Repository 模式:** 抽象数据访问逻辑 - _理由:_ 便于测试和未来数据库迁移"
          - "**事件驱动通信:** 使用 SNS/SQS 解耦服务 - _理由:_ 支持异步处理和系统弹性"

  - id: tech-stack
    title: 技术栈
    instruction: |
      This is the DEFINITIVE technology selection section. Work with the user to make specific choices:

      1. Review PRD technical assumptions and any preferences from {root}/data/technical-preferences.yaml or an attached technical-preferences
      2. For each category, present 2-3 viable options with pros/cons
      3. Make a clear recommendation based on project needs
      4. Get explicit user approval for each selection
      5. Document exact versions (avoid "latest" - pin specific versions)
      6. This table is the single source of truth - all other docs must reference these choices

      Key decisions to finalize - before displaying the table, ensure you are aware of or ask the user about - let the user know if they are not sure on any that you can also provide suggestions with rationale:

      - Starter templates (if any)
      - Languages and runtimes with exact versions
      - Frameworks and libraries / packages
      - Cloud provider and key services choices
      - Database and storage solutions - if unclear suggest sql or nosql or other types depending on the project and depending on cloud provider offer a suggestion
      - Development tools

      Upon render of the table, ensure the user is aware of the importance of this sections choices, should also look for gaps or disagreements with anything, ask for any clarifications if something is unclear why its in the list, and also right away elicit feedback - this statement and the options should be rendered and then prompt right all before allowing user input.
    elicit: true
    sections:
      - id: cloud-infrastructure
        title: 云基础设施
        template: |
          - **云服务商:** {{cloud_provider}}
          - **核心服务:** {{core_services_list}}
          - **部署区域:** {{regions}}
      - id: technology-stack-table
        title: 技术栈表
        type: table
        columns: [分类, 技术, 版本, 用途, 理由]
        instruction: Populate the technology stack table with all relevant technologies
        examples:
          - "| **语言** | TypeScript | 5.3.3 | 主开发语言 | 强类型、优秀工具链、团队熟悉 |"
          - "| **运行时** | Node.js | 20.11.0 | JavaScript 运行时 | LTS 版本、稳定性能、生态丰富 |"
          - "| **框架** | NestJS | 10.3.2 | 后端框架 | 企业级、良好 DI、符合团队模式 |"

  - id: data-models
    title: 数据模型
    instruction: |
      Define the core data models/entities:

      1. Review PRD requirements and identify key business entities
      2. For each model, explain its purpose and relationships
      3. Include key attributes and data types
      4. Show relationships between models
      5. Discuss design decisions with user

      Create a clear conceptual model before moving to database schema.
    elicit: true
    repeatable: true
    sections:
      - id: model
        title: "{{model_name}}"
        template: |
          **用途:** {{model_purpose}}

          **核心属性:**
          - {{attribute_1}}: {{type_1}} - {{description_1}}
          - {{attribute_2}}: {{type_2}} - {{description_2}}

          **关联关系:**
          - {{relationship_1}}
          - {{relationship_2}}

  - id: components
    title: 组件
    instruction: |
      Based on the architectural patterns, tech stack, and data models from above:

      1. Identify major logical components/services and their responsibilities
      2. Consider the repository structure (monorepo/polyrepo) from PRD
      3. Define clear boundaries and interfaces between components
      4. For each component, specify:
      - Primary responsibility
      - Key interfaces/APIs exposed
      - Dependencies on other components
      - Technology specifics based on tech stack choices

      5. Create component diagrams where helpful
    elicit: true
    sections:
      - id: component-list
        repeatable: true
        title: "{{component_name}}"
        template: |
          **职责:** {{component_description}}

          **核心接口:**
          - {{interface_1}}
          - {{interface_2}}

          **依赖项:** {{dependencies}}

          **技术栈详情:** {{component_tech_details}}
      - id: component-diagrams
        title: 组件图
        type: mermaid
        instruction: |
          Create Mermaid diagrams to visualize component relationships. Options:
          - C4 Container diagram for high-level view
          - Component diagram for detailed internal structure
          - Sequence diagrams for complex interactions
          Choose the most appropriate for clarity

  - id: external-apis
    title: 外部 API
    condition: Project requires external API integrations
    instruction: |
      For each external service integration:

      1. Identify APIs needed based on PRD requirements and component design
      2. If documentation URLs are unknown, ask user for specifics
      3. Document authentication methods and security considerations
      4. List specific endpoints that will be used
      5. Note any rate limits or usage constraints

      If no external APIs are needed, state this explicitly and skip to next section.
    elicit: true
    repeatable: true
    sections:
      - id: api
        title: "{{api_name}} API"
        template: |
          - **用途:** {{api_purpose}}
          - **文档:** {{api_docs_url}}
          - **Base URL(s):** {{api_base_url}}
          - **认证方式:** {{auth_method}}
          - **速率限制:** {{rate_limits}}

          **使用的关键端点:**
          - `{{method}} {{endpoint_path}}` - {{endpoint_purpose}}

          **集成说明:** {{integration_considerations}}

  - id: core-workflows
    title: 核心工作流
    type: mermaid
    mermaid_type: sequence
    instruction: |
      Illustrate key system workflows using sequence diagrams:

      1. Identify critical user journeys from PRD
      2. Show component interactions including external APIs
      3. Include error handling paths
      4. Document async operations
      5. Create both high-level and detailed diagrams as needed

      Focus on workflows that clarify architecture decisions or complex interactions.
    elicit: true

  - id: rest-api-spec
    title: REST API 规格
    condition: Project includes REST API
    type: code
    language: yaml
    instruction: |
      If the project includes a REST API:

      1. Create an OpenAPI 3.0 specification
      2. Include all endpoints from epics/stories
      3. Define request/response schemas based on data models
      4. Document authentication requirements
      5. Include example requests/responses

      Use YAML format for better readability. If no REST API, skip this section.
    elicit: true
    template: |
      openapi: 3.0.0
      info:
        title: {{api_title}}
        version: {{api_version}}
        description: {{api_description}}
      servers:
        - url: {{server_url}}
          description: {{server_description}}

  - id: database-schema
    title: 数据库 Schema
    instruction: |
      Transform the conceptual data models into concrete database schemas:

      1. Use the database type(s) selected in Tech Stack
      2. Create schema definitions using appropriate notation
      3. Include indexes, constraints, and relationships
      4. Consider performance and scalability
      5. For NoSQL, show document structures

      Present schema in format appropriate to database type (SQL DDL, JSON schema, etc.)
    elicit: true

  - id: source-tree
    title: 源码目录结构
    type: code
    language: plaintext
    instruction: |
      Create a project folder structure that reflects:

      1. The chosen repository structure (monorepo/polyrepo)
      2. The service architecture (monolith/microservices/serverless)
      3. The selected tech stack and languages
      4. Component organization from above
      5. Best practices for the chosen frameworks
      6. Clear separation of concerns

      Adapt the structure based on project needs. For monorepos, show service separation. For serverless, show function organization. Include language-specific conventions.
    elicit: true
    examples:
      - |
        project-root/
        ├── packages/
        │   ├── api/                    # 后端 API 服务
        │   ├── web/                    # 前端应用
        │   ├── shared/                 # 共享工具/类型
        │   └── infrastructure/         # IaC 定义
        ├── scripts/                    # Monorepo 管理脚本
        └── package.json                # 根 package.json（含 workspaces）

  - id: infrastructure-deployment
    title: 基础设施与部署
    instruction: |
      Define the deployment architecture and practices:

      1. Use IaC tool selected in Tech Stack
      2. Choose deployment strategy appropriate for the architecture
      3. Define environments and promotion flow
      4. Establish rollback procedures
      5. Consider security, monitoring, and cost optimization

      Get user input on deployment preferences and CI/CD tool choices.
    elicit: true
    sections:
      - id: infrastructure-as-code
        title: 基础设施即代码
        template: |
          - **工具:** {{iac_tool}} {{version}}
          - **位置:** `{{iac_directory}}`
          - **方法:** {{iac_approach}}
      - id: deployment-strategy
        title: 部署策略
        template: |
          - **策略:** {{deployment_strategy}}
          - **CI/CD 平台:** {{cicd_platform}}
          - **Pipeline 配置:** `{{pipeline_config_location}}`
      - id: environments
        title: 环境
        repeatable: true
        template: "- **{{env_name}}:** {{env_purpose}} - {{env_details}}"
      - id: promotion-flow
        title: 环境晋升流程
        type: code
        language: text
        template: "{{promotion_flow_diagram}}"
      - id: rollback-strategy
        title: 回滚策略
        template: |
          - **主要方法:** {{rollback_method}}
          - **触发条件:** {{rollback_triggers}}
          - **恢复时间目标:** {{rto}}

  - id: error-handling-strategy
    title: 错误处理策略
    instruction: |
      Define comprehensive error handling approach:

      1. Choose appropriate patterns for the language/framework from Tech Stack
      2. Define logging standards and tools
      3. Establish error categories and handling rules
      4. Consider observability and debugging needs
      5. Ensure security (no sensitive data in logs)

      This section guides both AI and human developers in consistent error handling.
    elicit: true
    sections:
      - id: general-approach
        title: 总体方法
        template: |
          - **错误模型:** {{error_model}}
          - **异常层次:** {{exception_structure}}
          - **错误传播:** {{propagation_rules}}
      - id: logging-standards
        title: 日志标准
        template: |
          - **库:** {{logging_library}} {{version}}
          - **格式:** {{log_format}}
          - **级别:** {{log_levels_definition}}
          - **必需上下文:**
            - 关联 ID: {{correlation_id_format}}
            - 服务上下文: {{service_context}}
            - 用户上下文: {{user_context_rules}}
      - id: error-patterns
        title: 错误处理模式
        sections:
          - id: external-api-errors
            title: 外部 API 错误
            template: |
              - **重试策略:** {{retry_strategy}}
              - **熔断器:** {{circuit_breaker_config}}
              - **超时配置:** {{timeout_settings}}
              - **错误转换:** {{error_mapping_rules}}
          - id: business-logic-errors
            title: 业务逻辑错误
            template: |
              - **自定义异常:** {{business_exception_types}}
              - **用户错误信息:** {{user_error_format}}
              - **错误码:** {{error_code_system}}
          - id: data-consistency
            title: 数据一致性
            template: |
              - **事务策略:** {{transaction_approach}}
              - **补偿逻辑:** {{compensation_patterns}}
              - **幂等性:** {{idempotency_approach}}

  - id: coding-standards
    title: 编码规范
    instruction: |
      These standards are MANDATORY for AI agents. Work with user to define ONLY the critical rules needed to prevent bad code. Explain that:

      1. This section directly controls AI developer behavior
      2. Keep it minimal - assume AI knows general best practices
      3. Focus on project-specific conventions and gotchas
      4. Overly detailed standards bloat context and slow development
      5. Standards will be extracted to separate file for dev agent use

      For each standard, get explicit user confirmation it's necessary.
    elicit: true
    sections:
      - id: core-standards
        title: 核心标准
        template: |
          - **语言与运行时:** {{languages_and_versions}}
          - **风格与 Lint:** {{linter_config}}
          - **测试组织:** {{test_file_convention}}
      - id: naming-conventions
        title: 命名规范
        type: table
        columns: [元素, 规范, 示例]
        instruction: Only include if deviating from language defaults
      - id: critical-rules
        title: 关键规则
        instruction: |
          List ONLY rules that AI might violate or project-specific requirements. Examples:
          - "Never use console.log in production code - use logger"
          - "All API responses must use ApiResponse wrapper type"
          - "Database queries must use repository pattern, never direct ORM"

          Avoid obvious rules like "use SOLID principles" or "write clean code"
        repeatable: true
        template: "- **{{rule_name}}:** {{rule_description}}"
      - id: language-specifics
        title: 语言特定指南
        condition: Critical language-specific rules needed
        instruction: Add ONLY if critical for preventing AI mistakes. Most teams don't need this section.
        sections:
          - id: language-rules
            title: "{{language_name}} 规范"
            repeatable: true
            template: "- **{{rule_topic}}:** {{rule_detail}}"

  - id: testing-strategy
    title: 测试策略与标准
    instruction: |
      Work with user to define comprehensive test strategy:

      1. Use test frameworks from Tech Stack
      2. Decide on TDD vs test-after approach
      3. Define test organization and naming
      4. Establish coverage goals
      5. Determine integration test infrastructure
      6. Plan for test data and external dependencies

      Note: Basic info goes in Coding Standards for dev agent. This detailed section is for QA agent and team reference.
    elicit: true
    sections:
      - id: testing-philosophy
        title: 测试理念
        template: |
          - **方法:** {{test_approach}}
          - **覆盖率目标:** {{coverage_targets}}
          - **测试金字塔:** {{test_distribution}}
      - id: test-types
        title: 测试类型与组织
        sections:
          - id: unit-tests
            title: 单元测试
            template: |
              - **框架:** {{unit_test_framework}} {{version}}
              - **文件命名:** {{unit_test_naming}}
              - **位置:** {{unit_test_location}}
              - **Mock 库:** {{mocking_library}}
              - **覆盖率要求:** {{unit_coverage}}

              **AI Agent 要求:**
              - 为所有公共方法生成测试
              - 覆盖边界情况和错误条件
              - 遵循 AAA 模式 (Arrange, Act, Assert)
              - Mock 所有外部依赖
          - id: integration-tests
            title: 集成测试
            template: |
              - **范围:** {{integration_scope}}
              - **位置:** {{integration_test_location}}
              - **测试基础设施:**
                - **{{dependency_name}}:** {{test_approach}} ({{test_tool}})
            examples:
              - "**数据库:** 单元测试用内存 H2，集成测试用 Testcontainers PostgreSQL"
              - "**消息队列:** 测试用嵌入式 Kafka"
              - "**外部 API:** 用 WireMock 打桩"
          - id: e2e-tests
            title: 端到端测试
            template: |
              - **框架:** {{e2e_framework}} {{version}}
              - **范围:** {{e2e_scope}}
              - **环境:** {{e2e_environment}}
              - **测试数据:** {{e2e_data_strategy}}
      - id: test-data-management
        title: 测试数据管理
        template: |
          - **策略:** {{test_data_approach}}
          - **Fixtures:** {{fixture_location}}
          - **工厂模式:** {{factory_pattern}}
          - **清理策略:** {{cleanup_strategy}}
      - id: continuous-testing
        title: 持续测试
        template: |
          - **CI 集成:** {{ci_test_stages}}
          - **性能测试:** {{perf_test_approach}}
          - **安全测试:** {{security_test_approach}}

  - id: security
    title: 安全
    instruction: |
      Define MANDATORY security requirements for AI and human developers:

      1. Focus on implementation-specific rules
      2. Reference security tools from Tech Stack
      3. Define clear patterns for common scenarios
      4. These rules directly impact code generation
      5. Work with user to ensure completeness without redundancy
    elicit: true
    sections:
      - id: input-validation
        title: 输入验证
        template: |
          - **验证库:** {{validation_library}}
          - **验证位置:** {{where_to_validate}}
          - **必需规则:**
            - 所有外部输入必须验证
            - 在 API 边界处理前验证
            - 优先使用白名单而非黑名单
      - id: auth-authorization
        title: 认证与授权
        template: |
          - **认证方式:** {{auth_implementation}}
          - **会话管理:** {{session_approach}}
          - **必需模式:**
            - {{auth_pattern_1}}
            - {{auth_pattern_2}}
      - id: secrets-management
        title: 密钥管理
        template: |
          - **开发环境:** {{dev_secrets_approach}}
          - **生产环境:** {{prod_secrets_service}}
          - **代码要求:**
            - 永不硬编码密钥
            - 仅通过配置服务访问
            - 日志和错误信息中不包含密钥
      - id: api-security
        title: API 安全
        template: |
          - **速率限制:** {{rate_limit_implementation}}
          - **CORS 策略:** {{cors_configuration}}
          - **安全头:** {{required_headers}}
          - **HTTPS 强制:** {{https_approach}}
      - id: data-protection
        title: 数据保护
        template: |
          - **静态加密:** {{encryption_at_rest}}
          - **传输加密:** {{encryption_in_transit}}
          - **PII 处理:** {{pii_rules}}
          - **日志限制:** {{what_not_to_log}}
      - id: dependency-security
        title: 依赖安全
        template: |
          - **扫描工具:** {{dependency_scanner}}
          - **更新策略:** {{update_frequency}}
          - **审批流程:** {{new_dep_process}}
      - id: security-testing
        title: 安全测试
        template: |
          - **SAST 工具:** {{static_analysis}}
          - **DAST 工具:** {{dynamic_analysis}}
          - **渗透测试:** {{pentest_schedule}}

  - id: checklist-results
    title: 检查清单结果报告
    instruction: Before running the checklist, offer to output the full architecture document. Once user confirms, execute the architect-checklist and populate results here.

  - id: next-steps
    title: 下一步
    instruction: |
      After completing the architecture:

      1. If project has UI components:
      - Use "Frontend Architecture Mode"
      - Provide this document as input

      2. For all projects:
      - Review with Product Owner
      - Begin story implementation with Dev agent
      - Set up infrastructure with DevOps agent

      3. Include specific prompts for next agents if needed
    sections:
      - id: architect-prompt
        title: Architect 提示
        condition: Project has UI components
        instruction: |
          Create a brief prompt to hand off to Architect for Frontend Architecture creation. Include:
          - Reference to this architecture document
          - Key UI requirements from PRD
          - Any frontend-specific decisions made here
          - Request for detailed frontend architecture
