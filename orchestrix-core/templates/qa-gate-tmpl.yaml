template:
  id: qa-gate-template-v2
  name: Quality Gate Decision
  version: 2.0
  description: >
    Test-based quality gate decision. Focuses on automated test results
    and E2E testing outcomes rather than static code review.
  output:
    format: yaml
    filename: qa.qaLocation/gates/{{epic_num}}.{{story_num}}-{{story_slug}}.yml
    title: "Quality Gate: {{epic_num}}.{{story_num}}"

# Required fields (keep these first)
schema: 1
story: "{{epic_num}}.{{story_num}}"
story_title: "{{story_title}}"
gate: "{{gate_status}}" # PASS|CONCERNS|FAIL|WAIVED
status_reason: "{{status_reason}}" # 1-2 sentence summary of why this gate decision
reviewer: "Quinn (Test Architect)"
updated: "{{iso_timestamp}}"

# Review round tracking (for progressive standards)
review_round: 1  # Current review round (1-3)
review_mode_type: full  # full | incremental (incremental for Round 2+)
issues_from_previous_round: 0  # Count of issues from previous round (0 if Round 1)
issues_resolved: 0  # Count of issues resolved since previous round (0 if Round 1)
improvement_percentage: 0  # Percentage improvement from previous round (0 if Round 1)

# Incremental review context (populated for Round 2+ to enable fast re-review)
incremental_context:
  # Cached from Round 1 - skip re-detection in subsequent rounds
  cached_risk_level: ""  # LOW | MEDIUM | HIGH
  cached_review_mode: ""  # automated_only | automated_plus_spot_check | full_testing
  cached_project_type: ""  # web_frontend | web_backend | cli_tool | fullstack | library

  # Failed items to re-verify in next round (empty if PASS)
  failed_acs: []  # AC IDs that failed verification, e.g., ["AC1", "AC3"]
  failed_e2e_scenarios: []  # [{scenario_name, failure_reason}]
  missing_blind_spots: []  # [{id, category, description}]
  checkbox_issues: []  # [{checkbox_text, issue_type}]

# Always present but only active when WAIVED
waiver: { active: false }

# Architecture concern escalation (for QA → Architect escalation)
architecture_concern: false  # Set to true if architecture issues detected
escalation_reason: ""  # Describe architecture concern if escalating to Architect

# Issues (if any) - Use fixed severity: low | medium | high
top_issues: []

# Test execution results (new in v2)
test_results:
  automated:
    executed: true
    passed: true
    total: 0
    passed_count: 0
    failed_count: 0
    skipped_count: 0
    pass_rate: 100
    coverage_percentage: 0
    failed_tests: []  # [{name, file, error}]
  e2e:
    executed: true  # false if skipped (automated_only mode)
    passed: true
    skipped: false
    skip_reason: ""  # "Review mode is automated_only" if skipped
    scenarios_tested: 0
    scenarios_passed: 0
    scenarios_failed: 0
    console_errors_found: false
    network_errors_found: false

# Evidence collected during testing (new in v2)
evidence:
  directory: ""  # docs/qa/evidence/{story_id}/
  issues:
    - issue_id: ""
      screenshots: []  # [{path, description}]
      logs: []  # [{path, type}]
      reproduction_steps: ""

# Risk assessment (new in v2)
risk_assessment:
  risk_level: MEDIUM  # LOW | MEDIUM | HIGH
  review_mode: automated_plus_spot_check  # automated_only | automated_plus_spot_check | full_testing
  complexity_count: 0
  security_sensitive: false
  dev_gate_score: 95

# Risk summary (from risk-profile task if run)
risk_summary:
  totals: { critical: 0, high: 0, medium: 0, low: 0 }
  recommendations:
    must_fix: []
    monitor: []

# Examples section using block scalars for clarity
examples:
  # Test-based examples (v2)
  low_risk_pass: |
    # Low risk story - automated tests only, all pass
    gate: PASS
    status_reason: "All automated tests passed. E2E skipped per low-risk review mode."
    risk_assessment:
      risk_level: LOW
      review_mode: automated_only
      complexity_count: 1
      security_sensitive: false
      dev_gate_score: 98
    test_results:
      automated:
        executed: true
        passed: true
        total: 45
        passed_count: 45
        failed_count: 0
        skipped_count: 0
        pass_rate: 100
        coverage_percentage: 87
      e2e:
        executed: false
        skipped: true
        skip_reason: "Review mode is automated_only"

  full_testing_pass: |
    # High risk story - full testing, all pass
    gate: PASS
    status_reason: "All automated and E2E tests passed with no runtime errors."
    risk_assessment:
      risk_level: HIGH
      review_mode: full_testing
      complexity_count: 5
      security_sensitive: true
      dev_gate_score: 96
    test_results:
      automated:
        executed: true
        passed: true
        total: 120
        passed_count: 120
        failed_count: 0
        skipped_count: 2
        pass_rate: 100
        coverage_percentage: 92
      e2e:
        executed: true
        passed: true
        scenarios_tested: 8
        scenarios_passed: 8
        scenarios_failed: 0
        console_errors_found: false
        network_errors_found: false

  automated_tests_fail: |
    # Automated tests failed
    gate: FAIL
    status_reason: "Automated tests failed. Dev must fix failing tests before re-review."
    test_results:
      automated:
        executed: true
        passed: false
        total: 45
        passed_count: 42
        failed_count: 3
        skipped_count: 0
        pass_rate: 93.3
        failed_tests:
          - name: "LoginForm > should validate email"
            file: "src/components/LoginForm.test.tsx"
            error: "Expected element to have text 'Invalid email'"
    top_issues:
      - id: "TEST-001"
        severity: high
        finding: "3 automated tests failing in LoginForm component"
        suggested_action: "Fix form validation logic to match expected behavior"

  e2e_issues_found: |
    # E2E testing found issues
    gate: CONCERNS
    status_reason: "E2E testing found issues but no critical blockers. Targeted fixes needed."
    test_results:
      automated:
        executed: true
        passed: true
        total: 45
        passed_count: 45
        failed_count: 0
      e2e:
        executed: true
        passed: false
        scenarios_tested: 5
        scenarios_passed: 3
        scenarios_failed: 2
        console_errors_found: true
        network_errors_found: false
    evidence:
      directory: "docs/qa/evidence/1.3/"
      issues:
        - issue_id: "E2E-001"
          screenshots:
            - path: "screenshots/1.3-login-error.png"
              description: "Login button unresponsive after validation"
          reproduction_steps: |
            1. Navigate to /login
            2. Enter invalid email
            3. Correct email format
            4. Click login - button stays disabled
    top_issues:
      - id: "E2E-001"
        severity: high
        finding: "Login button unresponsive after form validation error"
        suggested_action: "Fix form state reset after validation"
      - id: "E2E-002"
        severity: medium
        finding: "Console error on dashboard load"
        suggested_action: "Handle undefined data case in dashboard"

  # Legacy examples (still valid)
  when_waived: |
    waiver:
      active: true
      reason: "Accepted for MVP release - will address in next sprint"
      approved_by: "Product Owner"

  with_architecture_concern: |
    # When QA detects architecture issues requiring Architect review
    architecture_concern: true
    escalation_reason: "Potential performance bottleneck in data access layer - N+1 query pattern detected that could impact scalability"
    gate: CONCERNS
    status_reason: "Architecture concern requires Architect review before proceeding"
    top_issues:
      - id: "ARCH-001"
        severity: high
        finding: "N+1 query pattern in user data fetching"
        suggested_action: "Architect to review and recommend optimization strategy"

# ============ Optional Extended Fields ============
# Uncomment and use if your team wants more detail

optional_fields_examples:
  quality_and_expiry: |
    quality_score: 75  # 0-100 (optional scoring)
    expires: "2025-01-26T00:00:00Z"  # Optional gate freshness window

  evidence: |
    evidence:
      tests_reviewed: 15
      risks_identified: 3
      trace:
        ac_covered: [1, 2, 3]  # AC numbers with test coverage
        ac_gaps: [4]  # AC numbers lacking coverage

  nfr_validation: |
    nfr_validation:
      security: { status: CONCERNS, notes: "Rate limiting missing" }
      performance: { status: PASS, notes: "" }
      reliability: { status: PASS, notes: "" }
      maintainability: { status: PASS, notes: "" }

  history: |
    history:  # Append-only audit trail
      - at: "2025-01-12T10:00:00Z"
        gate: FAIL
        note: "Initial review - missing tests"
      - at: "2025-01-12T15:00:00Z"  
        gate: CONCERNS
        note: "Tests added but rate limiting still missing"

  risk_summary: |
    risk_summary:  # From risk-profile task
      totals:
        critical: 0
        high: 0
        medium: 0
        low: 0
      # 'highest' is emitted only when risks exist
      recommendations:
        must_fix: []
        monitor: []

  recommendations: |
    recommendations:
      immediate:  # Must fix before production
        - action: "Add rate limiting to auth endpoints"
          refs: ["api/auth/login.ts:42-68"]
      future:  # Can be addressed later
        - action: "Consider caching for better performance"
          refs: ["services/data.service.ts"]