title: Orchestrix Core System
description: >
  The core agent framework for Orchestrix, providing the essential agents,
  workflows, and data for building and managing AI-driven development teams.
markdownExploder: true
project:
  name: My Project
  type: monolith
  product_repo:
    enabled: false
    path: ''
  repository_id: ''
  story_assignment:
    auto_filter: false
    assigned_stories: []

# Multi-Repository Configuration (for Product repositories only)
# Uncomment and configure when project.type is 'product-planning'
# implementation_repos:
#   - path: ../my-project-backend
#     type: backend
#   - path: ../my-project-web
#     type: frontend
#   - path: ../my-project-ios
#     type: ios              # Native iOS (Swift/SwiftUI)
#   - path: ../my-project-android
#     type: android          # Native Android (Kotlin/Java)
#   - path: ../my-project-mobile
#     type: mobile           # Cross-platform (Flutter/React Native)
prd:
  prdFile: docs/prd.md
  prdSharded: true
  prdShardedLocation: docs/prd
  epicFilePattern: epic-{n}*.md
architecture:
  architectureFile: docs/architecture.md
  architectureSharded: true
  architectureShardedLocation: docs/architecture
  storyReviewsLocation: docs/architecture/story-reviews
customTechnicalDocuments: null
devLoadAlwaysFiles:
  - docs/architecture/coding-standards.md
  - docs/architecture/tech-stack.md
  - docs/architecture/source-tree.md
devDebugLog: .ai/debug-log.md
devStoryLocation: docs/stories
verticalSliceStrategy: true
dev:
  devLogLocation: docs/dev/logs
  devLogEnabled: true
architect:
  storyReviewsLocation: docs/architecture/story-reviews
qa:
  qaLocation: docs/qa
  qaReviewsLocation: docs/qa/reviews
  testDesignThresholds:
    simple:
      maxComplexity: 0
      minQualityScore: 8.5
      securitySensitive: false
      tasks: []
    standard:
      maxComplexity: 2
      minQualityScore: 7
      tasks:
        - test-design
    comprehensive:
      minComplexity: 3
      securitySensitive: true
      tasks:
        - test-design
        - risk-profile
slashPrefix: Orchestrix
version: 8.1.1
