# Dev Decision: Self-Review Result
decision_type: dev-self-review-decision

description: >
  Determine if Dev implementation is ready for QA review based on self-review results.
  Uses multiple quality gates with mandatory thresholds.

inputs:
  - name: implementation_gate_score
    type: number
    required: true
    description: "Overall score from dev-implementation-gate.md (0-100)"
  - name: architecture_compliance
    type: string
    required: true
    enum: [PASS, FAIL]
    description: "Result from gate_result.sections['Architecture Compliance']"
  - name: api_contract_compliance
    type: string
    required: true
    enum: [PASS, FAIL, N_A]
    description: "Result from gate_result.sections['API Contract Compliance']"
  - name: test_integrity
    type: string
    required: true
    enum: [PASS, FAIL]
    description: "Result from gate_result.sections['Test Integrity']"
  - name: critical_issues
    type: number
    required: true
    description: "Total critical issues from gate_result.total_critical_issues"
  - name: implementation_round
    type: number
    required: true
    description: "Current implementation round number"
  - name: previous_round_issues
    type: array
    required: false
    description: "Issue types from previous rounds (if round > 1)"

rules:
  # PASS: All gates passed, ready for QA
  - condition: "implementation_gate_score >= 95 AND architecture_compliance == 'PASS' AND (api_contract_compliance == 'PASS' OR api_contract_compliance == 'N_A') AND test_integrity == 'PASS' AND critical_issues == 0"
    result: PASS
    reasoning: "All quality gates passed - implementation ready for QA review"
    next_status: InProgress
    next_action: "proceed_to_review_transition"
    metadata:
      quality_level: "high"
      ready_for_qa: true

  # ESCALATE: Recurring issues after multiple rounds (highest priority)
  - condition: "implementation_round >= 3 AND previous_round_issues != null AND previous_round_issues.length > 0"
    result: ESCALATE
    reasoning: "Multiple implementation rounds with recurring issues - architectural review needed"
    next_status: Escalated
    next_action: "escalate_to_architect"
    metadata:
      quality_level: "stalled"
      escalation_reason: "recurring_issues"
      round: "{{implementation_round}}"

  # FAIL: Any gate below threshold (consolidated conditions)
  - condition: "implementation_gate_score < 95 OR architecture_compliance == 'FAIL' OR api_contract_compliance == 'FAIL' OR test_integrity == 'FAIL' OR critical_issues > 0"
    result: FAIL
    reasoning: "One or more quality gates did not meet requirements"
    next_status: InProgress
    next_action: "fix_blocking_issues"
    metadata:
      quality_level: "insufficient"
      blocking_gates:
        - gate: "implementation_gate"
          condition: "implementation_gate_score < 95"
          required: 95
          actual: "{{implementation_gate_score}}"
        - gate: "architecture_compliance"
          condition: "architecture_compliance == 'FAIL'"
          severity: "critical"
        - gate: "api_contract_compliance"
          condition: "api_contract_compliance == 'FAIL'"
          severity: "critical"
        - gate: "test_integrity"
          condition: "test_integrity == 'FAIL'"
          severity: "critical"
          violation_type: "test_weakening"
        - gate: "critical_issues"
          condition: "critical_issues > 0"
          issue_count: "{{critical_issues}}"

output:
  result:
    type: enum
    values: [PASS, FAIL, ESCALATE]
  reasoning:
    type: string
  next_status:
    type: string
  next_action:
    type: string
  metadata:
    type: object
    properties:
      quality_level: {type: string}
      ready_for_qa: {type: boolean}
      blocking_gates: {type: array}
      escalation_reason: {type: string}

metadata:
  version: "2.1.0"
  last_updated: "2025-11-22"
  owner: "Dev Agent"
  related_requirements: ["Priority-1-Improvements", "Dev-Quality-Gates"]
  changelog:
    - version: "2.1.0"
      date: "2025-11-22"
      changes: "Removed dod_score input - DoD covered by gate_result Section 9 (Documentation)"
    - version: "2.0.0"
      date: "2025-01-22"
      changes: "Consolidated 6 FAIL conditions into 1 unified condition"
  usage_context: >
    Called by dev-self-review.md after executing dev-implementation-gate.md.
    All quality checks (including documentation) are in gate_result.
    PASS: Proceed to mark story as Review. FAIL: HALT with specific issues to fix.
    ESCALATE: HALT and handoff to Architect due to recurring issues.

examples:
  - input:
      implementation_gate_score: 98
      architecture_compliance: PASS
      api_contract_compliance: PASS
      test_integrity: PASS
      critical_issues: 0
      implementation_round: 1
    output:
      result: PASS
      next_status: InProgress
      next_action: proceed_to_review_transition
      metadata:
        quality_level: "high"
        ready_for_qa: true

  - input:
      implementation_gate_score: 92
      architecture_compliance: PASS
      api_contract_compliance: PASS
      test_integrity: PASS
      critical_issues: 0
      implementation_round: 1
    output:
      result: FAIL
      reasoning: "One or more quality gates did not meet requirements"
      next_action: fix_blocking_issues
      metadata:
        quality_level: "insufficient"

  - input:
      implementation_gate_score: 96
      architecture_compliance: PASS
      api_contract_compliance: PASS
      test_integrity: PASS
      critical_issues: 0
      implementation_round: 3
      previous_round_issues: ["api_mismatch", "test_coverage", "api_mismatch"]
    output:
      result: ESCALATE
      reasoning: "Multiple implementation rounds with recurring issues"
      next_status: Escalated
      next_action: escalate_to_architect
      metadata:
        quality_level: "stalled"
        escalation_reason: recurring_issues
