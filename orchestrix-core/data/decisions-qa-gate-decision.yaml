# QA Decision: Gate Decision
decision_type: qa-gate-decision

description: >
  Determine QA Gate result (PASS/FAIL/CONCERNS) based on automated test results,
  E2E testing outcomes, and task checkbox verification. Validates that checked
  boxes have matching deliverables. Focuses on real test execution rather than
  static code review. Uses progressive standards for re-reviews.

inputs:
  # Test execution results (primary inputs)
  - name: automated_tests_passed
    type: boolean
    required: true
    description: "Whether all automated tests passed (npm test)"

  - name: automated_tests_metrics
    type: object
    required: false
    properties:
      total: {type: number}
      passed: {type: number}
      failed: {type: number}
      skipped: {type: number}
      pass_rate: {type: number}

  - name: e2e_tests_passed
    type: boolean
    required: false
    description: "Whether E2E tests passed (null if skipped)"

  - name: e2e_tests_skipped
    type: boolean
    required: false
    description: "Whether E2E tests were skipped (automated_only mode)"

  - name: regression_tests_passed
    type: boolean
    required: false
    description: "Whether regression tests from previous stories passed (null if not executed)"

  - name: regression_failures_count
    type: number
    required: false
    description: "Count of regression test failures (0 if not executed or all passed)"

  - name: console_errors_found
    type: boolean
    required: false
    description: "Whether browser console errors were found during E2E"

  - name: network_errors_found
    type: boolean
    required: false
    description: "Whether network request failures were found during E2E"

  # Issue tracking (from E2E findings)
  - name: issues_by_severity
    type: object
    required: true
    properties:
      critical: {type: number}
      high: {type: number}
      medium: {type: number}
      low: {type: number}

  # Task checkbox verification (Step 4.5)
  - name: task_checkbox_completion_rate
    type: number
    required: false
    description: "Percentage of checkboxes marked complete (0-100)"

  - name: task_checkbox_consistency_rate
    type: number
    required: false
    description: "Percentage of checked boxes with matching deliverables (0-100)"

  - name: task_checkbox_unchecked_critical
    type: number
    required: false
    description: "Count of unchecked AC/test/implement checkboxes"

  - name: task_checkbox_mismatches
    type: number
    required: false
    description: "Count of checked boxes without matching deliverables"

  # Deliverable context (for E2E requirement)
  - name: has_user_facing_deliverable
    type: boolean
    required: false
    description: >
      True if story has deliverables with binding_type in [import_usage, route_mount, cli_register]
      where consumer is a user-facing file (pages/**, app/**, routes/**).
      Derived from story.deliverable_bindings[].

  - name: has_new_ui_components
    type: boolean
    required: false
    description: "True if story creates new UI components (from file_list patterns)"

  # Review context
  - name: review_round
    type: number
    required: true

  - name: review_mode
    type: enum
    values: [automated_only, automated_plus_spot_check, full_testing]
    required: false

  - name: previous_issues
    type: object
    required: false
    nullable: true
    properties:
      critical: {type: number}
      high: {type: number}
      medium: {type: number}
      low: {type: number}

rules:
  # ============================================
  # PRIMARY RULES: Based on Test Execution
  # ============================================

  # FAIL: E2E skipped but story has user-facing deliverables (NEW - prevents orphaned UI)
  - id: fail_e2e_skipped_user_facing
    priority: 0
    condition: >
      e2e_tests_skipped == true AND
      (has_user_facing_deliverable == true OR has_new_ui_components == true)
    result: FAIL
    reasoning: "E2E tests skipped but story has user-facing deliverables. E2E required to verify user reachability."
    next_status: InProgress
    next_action: "execute_e2e_tests"
    metadata:
      quality_level: "incomplete"
      expected_effort: "medium"
      failure_type: "e2e_required_for_user_facing"
      fix_guidance: "Run E2E tests to verify user can access new functionality"

  # PASS: All tests pass, no issues (automated_only mode) - ONLY for non-user-facing stories
  - id: pass_automated_only
    priority: 1
    condition: >
      automated_tests_passed == true AND
      e2e_tests_skipped == true AND
      has_user_facing_deliverable == false AND
      has_new_ui_components == false AND
      issues_by_severity.critical == 0 AND
      issues_by_severity.high == 0
    result: PASS
    reasoning: "All automated tests passed. E2E skipped (no user-facing deliverables)."
    next_status: Done
    next_action: "mark_story_complete"
    metadata:
      quality_level: "excellent"
      test_based_decision: true
      review_mode: "automated_only"

  # PASS: All tests pass, no runtime errors
  - id: pass_all_tests
    priority: 2
    condition: >
      automated_tests_passed == true AND
      (e2e_tests_passed == true OR e2e_tests_skipped == true) AND
      console_errors_found == false AND
      network_errors_found == false AND
      issues_by_severity.critical == 0 AND
      issues_by_severity.high == 0 AND
      (issues_by_severity.medium <= 1 OR review_round >= 2)
    result: PASS
    reasoning: "All automated and E2E tests passed with no runtime errors."
    next_status: Done
    next_action: "mark_story_complete"
    metadata:
      quality_level: "excellent"
      test_based_decision: true

  # PASS: Progressive standard for re-review
  - id: pass_progressive
    priority: 3
    condition: >
      review_round >= 2 AND
      automated_tests_passed == true AND
      issues_by_severity.critical == 0 AND
      issues_by_severity.high <= 1 AND
      issues_by_severity.medium <= 2
    result: PASS
    reasoning: "Re-review with acceptable issues. Progressive standard applied."
    next_status: Done
    next_action: "mark_story_complete"
    metadata:
      quality_level: "acceptable"
      progressive_standard_applied: true
      test_based_decision: true

  # ============================================
  # FAIL RULES: Critical Test Failures
  # ============================================

  # FAIL: Automated tests failed
  - id: fail_automated_tests
    priority: 10
    condition: "automated_tests_passed == false"
    result: FAIL
    reasoning: "Automated tests failed. Dev must fix failing tests before re-review."
    next_status: InProgress
    next_action: "handoff_to_dev_rework"
    metadata:
      quality_level: "poor"
      expected_effort: "high"
      test_based_decision: true
      failure_type: "automated_tests"

  # FAIL: E2E tests failed with critical issues
  - id: fail_e2e_critical
    priority: 11
    condition: >
      e2e_tests_passed == false AND
      issues_by_severity.critical >= 1
    result: FAIL
    reasoning: "E2E tests found critical issues. Core functionality broken."
    next_status: InProgress
    next_action: "handoff_to_dev_rework"
    metadata:
      quality_level: "poor"
      expected_effort: "high"
      test_based_decision: true
      failure_type: "e2e_critical"

  # FAIL: Regression tests failed (current story broke previous stories)
  - id: fail_regression
    priority: 9
    condition: >
      regression_tests_passed == false AND
      regression_failures_count >= 1
    result: FAIL
    reasoning: "Regression tests failed. Current story implementation broke previously working functionality."
    next_status: InProgress
    next_action: "handoff_to_dev_rework"
    metadata:
      quality_level: "regression_failure"
      expected_effort: "high"
      test_based_decision: true
      failure_type: "regression"
      fix_guidance: "Fix regression failures before proceeding. Check if current story's code changes conflict with previous stories."

  # FAIL: Console errors in production code
  - id: fail_console_errors
    priority: 12
    condition: >
      console_errors_found == true AND
      issues_by_severity.critical >= 1
    result: FAIL
    reasoning: "Browser console errors detected during testing. Application stability issue."
    next_status: InProgress
    next_action: "handoff_to_dev_rework"
    metadata:
      quality_level: "poor"
      expected_effort: "medium"
      test_based_decision: true
      failure_type: "console_errors"

  # FAIL: No improvement after multiple reviews
  - id: fail_no_improvement
    priority: 13
    condition: >
      review_round >= 3 AND
      previous_issues != null AND
      (issues_by_severity.critical + issues_by_severity.high) >= (previous_issues.critical + previous_issues.high)
    result: FAIL
    reasoning: "No improvement after multiple reviews. Escalating to Architect."
    next_status: Escalated
    next_action: "escalate_to_architect"
    metadata:
      quality_level: "stalled"
      escalation_reason: "no_improvement"

  # FAIL: Excessive total issues
  - id: fail_excessive_issues
    priority: 14
    condition: "(issues_by_severity.critical + issues_by_severity.high + issues_by_severity.medium) >= 10"
    result: FAIL
    reasoning: "Excessive issue count from testing. Thorough rework needed."
    next_status: InProgress
    next_action: "handoff_to_dev_rework"
    metadata:
      quality_level: "poor"
      expected_effort: "high"
      test_based_decision: true

  # ============================================
  # FAIL RULES: Task Checkbox Issues
  # ============================================

  # FAIL: Unchecked critical checkboxes (AC/test/implement)
  - id: fail_unchecked_checkboxes
    priority: 15
    condition: "task_checkbox_unchecked_critical >= 1"
    result: FAIL
    reasoning: "Story has unchecked AC/test/implementation checkboxes. Work incomplete."
    next_status: InProgress
    next_action: "handoff_to_dev_rework"
    metadata:
      quality_level: "incomplete"
      expected_effort: "medium"
      failure_type: "unchecked_checkboxes"

  # FAIL: Multiple checkbox-deliverable mismatches
  - id: fail_checkbox_mismatches
    priority: 16
    condition: "task_checkbox_mismatches >= 3"
    result: FAIL
    reasoning: "Multiple checkboxes marked complete but deliverables not found. Dev must verify work."
    next_status: InProgress
    next_action: "handoff_to_dev_rework"
    metadata:
      quality_level: "integrity_issue"
      expected_effort: "medium"
      failure_type: "checkbox_mismatch"

  # FAIL: Low checkbox consistency rate
  - id: fail_low_consistency
    priority: 17
    condition: "task_checkbox_consistency_rate < 80"
    result: FAIL
    reasoning: "Less than 80% of checked boxes have matching deliverables. Significant gaps in implementation."
    next_status: InProgress
    next_action: "handoff_to_dev_rework"
    metadata:
      quality_level: "poor"
      expected_effort: "high"
      failure_type: "low_consistency"

  # ============================================
  # CONCERNS RULES: Issues Found but Not Critical
  # ============================================

  # CONCERNS: E2E found non-critical issues
  - id: concerns_e2e_issues
    priority: 20
    condition: >
      automated_tests_passed == true AND
      (e2e_tests_passed == false OR console_errors_found == true OR network_errors_found == true) AND
      issues_by_severity.critical == 0
    result: CONCERNS
    reasoning: "E2E testing found issues but no critical blockers. Targeted fixes needed."
    next_status: InProgress
    next_action: "handoff_to_dev_fix"
    metadata:
      quality_level: "needs_improvement"
      expected_effort: "medium"
      test_based_decision: true

  # CONCERNS: Tests pass but moderate issues found
  - id: concerns_moderate_issues
    priority: 21
    condition: >
      automated_tests_passed == true AND
      issues_by_severity.critical == 0 AND
      issues_by_severity.high <= 2 AND
      issues_by_severity.medium <= 4
    result: CONCERNS
    reasoning: "Tests pass but moderate issues found during E2E. Fixes needed."
    next_status: InProgress
    next_action: "handoff_to_dev_fix"
    metadata:
      quality_level: "needs_improvement"
      expected_effort: "medium"
      test_based_decision: true

  # CONCERNS: Minor checkbox-deliverable mismatches
  - id: concerns_checkbox_minor
    priority: 22
    condition: >
      task_checkbox_unchecked_critical == 0 AND
      task_checkbox_mismatches >= 1 AND
      task_checkbox_mismatches < 3 AND
      task_checkbox_consistency_rate >= 80
    result: CONCERNS
    reasoning: "Minor checkbox-deliverable mismatches found. Dev should verify and fix."
    next_status: InProgress
    next_action: "handoff_to_dev_fix"
    metadata:
      quality_level: "needs_improvement"
      expected_effort: "low"
      failure_type: "minor_checkbox_issue"

  # CONCERNS: Default for borderline cases
  - id: concerns_default
    priority: 99
    condition: "issues_by_severity.critical == 0"
    result: CONCERNS
    reasoning: "Issues found during testing but no critical blockers."
    next_status: InProgress
    next_action: "handoff_to_dev_fix"
    metadata:
      quality_level: "needs_improvement"
      expected_effort: "medium"

output:
  gate_result:
    type: enum
    values: [PASS, FAIL, CONCERNS]
  reasoning:
    type: string
  next_status:
    type: string
  next_action:
    type: string
  metadata:
    type: object
    properties:
      quality_level: {type: string}
      expected_effort: {type: string}
      progressive_standard_applied: {type: boolean}
      rework_required: {type: boolean}
      test_based_decision: {type: boolean}
      review_mode: {type: string}
      failure_type: {type: string}

metadata:
  version: "2.1.0"
  last_updated: "2025-12-24"
  owner: "QA Agent"
  related_requirements: ["6.2", "6.4", "6.8"]
  usage_context: >
    Called by QA at end of review-story. Decision based on test execution results,
    E2E testing outcomes, and task checkbox verification. Primary factors: automated
    test pass/fail, E2E test results, console/network errors, checkbox completion
    and consistency rates. Progressive standards apply to re-reviews.
    PASS: Set Status=Done. FAIL/CONCERNS: Set Status=InProgress, handoff to Dev.

examples:
  # All tests pass, low risk mode
  - input:
      automated_tests_passed: true
      e2e_tests_skipped: true
      issues_by_severity: {critical: 0, high: 0, medium: 0, low: 0}
      review_round: 1
    output:
      gate_result: PASS
      next_status: Done
      reasoning: "All automated tests passed. E2E skipped per low-risk review mode."

  # All tests pass including E2E
  - input:
      automated_tests_passed: true
      e2e_tests_passed: true
      console_errors_found: false
      network_errors_found: false
      issues_by_severity: {critical: 0, high: 0, medium: 1, low: 2}
      review_round: 1
    output:
      gate_result: PASS
      next_status: Done
      reasoning: "All automated and E2E tests passed with no runtime errors."

  # Automated tests failed
  - input:
      automated_tests_passed: false
      issues_by_severity: {critical: 0, high: 0, medium: 0, low: 0}
      review_round: 1
    output:
      gate_result: FAIL
      next_status: InProgress
      reasoning: "Automated tests failed. Dev must fix failing tests before re-review."

  # E2E found issues but not critical
  - input:
      automated_tests_passed: true
      e2e_tests_passed: false
      console_errors_found: true
      issues_by_severity: {critical: 0, high: 1, medium: 2, low: 1}
      review_round: 1
    output:
      gate_result: CONCERNS
      next_status: InProgress
      reasoning: "E2E testing found issues but no critical blockers. Targeted fixes needed."

  # Progressive standard on re-review
  - input:
      automated_tests_passed: true
      issues_by_severity: {critical: 0, high: 1, medium: 2, low: 0}
      review_round: 2
    output:
      gate_result: PASS
      next_status: Done
      reasoning: "Re-review with acceptable issues. Progressive standard applied."

  # Unchecked checkboxes - work incomplete
  - input:
      automated_tests_passed: true
      task_checkbox_completion_rate: 80
      task_checkbox_unchecked_critical: 2
      task_checkbox_mismatches: 0
      issues_by_severity: {critical: 0, high: 0, medium: 0, low: 0}
      review_round: 1
    output:
      gate_result: FAIL
      next_status: InProgress
      reasoning: "Story has unchecked AC/test/implementation checkboxes. Work incomplete."

  # Checkbox-deliverable mismatch
  - input:
      automated_tests_passed: true
      task_checkbox_completion_rate: 100
      task_checkbox_consistency_rate: 70
      task_checkbox_unchecked_critical: 0
      task_checkbox_mismatches: 4
      issues_by_severity: {critical: 0, high: 0, medium: 0, low: 0}
      review_round: 1
    output:
      gate_result: FAIL
      next_status: InProgress
      reasoning: "Less than 80% of checked boxes have matching deliverables. Significant gaps in implementation."
