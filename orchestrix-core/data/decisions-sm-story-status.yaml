# SM Decision: Story Status
decision_type: sm-story-status

description: >
  Determine final Story status by combining Architect review result and test design level.

inputs:
  - name: architect_review_result
    type: string
    required: true
  - name: test_design_level
    type: string
    required: true

rules:
  # Architect review required → Wait for Architect
  - condition: "architect_review_result == 'REQUIRED'"
    result: AwaitingArchReview
    reasoning: "Architect review required, defer test design decision"
    next_status: AwaitingArchReview
    next_action: "handoff_to_architect"
    metadata:
      test_design_deferred: true
  
  # No Architect review + Simple test → Ready for Dev (direct Approved)
  - condition: "(architect_review_result IN ['NOT_REQUIRED', 'APPROVED']) AND test_design_level == 'Simple'"
    result: Approved
    reasoning: "No Architect review needed and Simple test design (unit only), proceed directly to Dev"
    next_status: Approved
    next_action: "handoff_to_dev"
    metadata:
      qa_test_design_skipped: true
      test_levels: ["unit"]
  
  # No Architect review + Standard/Comprehensive → QA test design
  - condition: "(architect_review_result IN ['NOT_REQUIRED', 'APPROVED']) AND test_design_level IN ['Standard', 'Comprehensive']"
    result: AwaitingTestDesign
    reasoning: "Test design level is {{test_design_level}}, QA test design needed"
    next_status: AwaitingTestDesign
    next_action: "handoff_to_qa_test_design"
    metadata:
      test_design_level: "{{test_design_level}}"
  
  # Architect requires revision
  - condition: "architect_review_result == 'REQUIRES_REVISION'"
    result: RequiresRevision
    reasoning: "Architect requires revision, SM must address feedback"
    next_status: RequiresRevision
    next_action: "sm_revise_story"
    metadata:
      test_design_deferred: true
  
  # Blocked
  - condition: "architect_review_result == 'BLOCKED'"
    result: Blocked
    reasoning: "Story quality too low, SM must improve"
    next_status: Blocked
    next_action: "sm_revise_story"
    metadata:
      quality_issue: true

output:
  story_status:
    type: enum
    values: [AwaitingArchReview, AwaitingTestDesign, Approved, RequiresRevision, Blocked]
  reasoning:
    type: string
  next_action:
    type: string
  next_status:
    type: string
  metadata:
    type: object
    properties:
      test_design_deferred: {type: boolean}
      qa_test_design_skipped: {type: boolean}
      test_design_level: {type: string}
      test_levels: {type: array}
      quality_issue: {type: boolean}

metadata:
  version: "1.1.0"
  last_updated: "2025-02-04"
  owner: "SM Agent"
  related_requirements: ["6.2", "6.4", "6.5"]
  usage_context: >
    Called by SM after Architect review and test design level decisions. Combines both
    to determine final status and next agent handoff.

examples:
  - input: {architect_review_result: "REQUIRED", test_design_level: "Standard"}
    output: {story_status: AwaitingArchReview, next_action: "handoff_to_architect"}
  - input: {architect_review_result: "NOT_REQUIRED", test_design_level: "Simple"}
    output: {story_status: Approved, next_action: "handoff_to_dev"}
  - input: {architect_review_result: "APPROVED", test_design_level: "Comprehensive"}
    output: {story_status: AwaitingTestDesign, next_action: "handoff_to_qa_test_design"}
