# Change Level Classification Decision
# Semantic classification of change descriptions to determine handling layer.

decision_type: change-level-classification

description: >
  Analyzes free-form change descriptions to determine which layer (STORY/EPIC/TECH/PRODUCT)
  should handle the change. Uses semantic indicators and explicit references to classify.

version: "1.0.0"

inputs:
  - name: change_description
    type: string
    required: true
    description: Free-form textual description of the change request

  - name: context
    type: object
    required: false
    properties:
      explicit_story_id:
        type: string
        description: Story ID if user specified one (e.g., "5.3")
      explicit_epic_id:
        type: string
        description: Epic ID if user specified one (e.g., "5")
      current_agent:
        type: string
        enum: [SM, PO, ARCHITECT, PM]
        description: Agent currently processing the request

# Semantic indicators to extract from change_description
semantic_indicators:
  story_level:
    keywords:
      - "AC unclear"
      - "acceptance criteria"
      - "task blocked"
      - "single story"
      - "this story"
      - "story implementation"
      - "clarify requirements"
      - "update task"
      - "revise story"
    patterns:
      - "story \\d+\\.\\d+"
      - "blocked on story"

  epic_level:
    keywords:
      - "multiple stories"
      - "story dependencies"
      - "epic scope"
      - "reorder stories"
      - "add story"
      - "remove story"
      - "new story needed"
      - "split story"
      - "merge stories"
      - "story sequence"
      - "cross-story"
    patterns:
      - "epic \\d+"
      - "stories \\d+\\.\\d+ and \\d+\\.\\d+"

  tech_level:
    keywords:
      - "architecture"
      - "API contract"
      - "database schema"
      - "tech stack"
      - "security vulnerability"
      - "performance issue"
      - "system design"
      - "data model"
      - "integration"
      - "infrastructure"
      - "scalability"
      - "migration"
    patterns:
      - "API \\w+"
      - "schema change"
      - "architectural"

  product_level:
    keywords:
      - "PRD"
      - "MVP scope"
      - "feature definition"
      - "requirement change"
      - "product direction"
      - "multiple epics"
      - "new feature"
      - "remove feature"
      - "scope change"
      - "business requirement"
      - "user need"
      - "market change"
    patterns:
      - "epics? \\d+ and \\d+"
      - "MVP"
      - "product roadmap"

rules:
  # Rule 1: Explicit story reference with no cross-story/tech indicators
  - name: explicit_story_scope
    condition: >
      context.explicit_story_id IS NOT NULL
      AND story_indicators_count >= epic_indicators_count
      AND tech_indicators_count == 0
      AND product_indicators_count == 0
    result:
      level: STORY
      handler: SM
      confidence: 0.9
    reasoning: "Explicit story ID provided with no cross-story or technical indicators"

  # Rule 2: Tech-level indicators present (but not product)
  - name: tech_scope
    condition: >
      tech_indicators_count > 0
      AND product_indicators_count == 0
    result:
      level: TECH
      handler: ARCHITECT
      confidence: 0.85
    reasoning: "Technical/architecture indicators detected"

  # Rule 3: Product-level indicators or multi-epic impact
  - name: product_scope
    condition: >
      product_indicators_count > 0
      OR (epic_indicators_count > 0 AND contains_multi_epic_reference)
    result:
      level: PRODUCT
      handler: PM
      confidence: 0.85
    reasoning: "Product-level or multi-epic impact detected"

  # Rule 4: Epic-level indicators or multi-story impact
  - name: epic_scope
    condition: >
      (epic_indicators_count > story_indicators_count)
      OR contains_multi_story_reference
      OR contains_epic_structure_keywords
    result:
      level: EPIC
      handler: PO
      confidence: 0.8
    reasoning: "Epic-level or multi-story impact detected"

  # Rule 5: Default to story level if explicit story ID
  - name: default_with_story_id
    condition: >
      context.explicit_story_id IS NOT NULL
    result:
      level: STORY
      handler: SM
      confidence: 0.7
    reasoning: "Story ID provided, defaulting to story scope"

  # Rule 6: Default fallback
  - name: default_fallback
    condition: "true"
    result:
      level: STORY
      handler: SM
      confidence: 0.5
    reasoning: "Unable to determine scope, defaulting to story level"

output:
  level:
    type: enum
    values: [STORY, EPIC, TECH, PRODUCT]
    description: Determined change level

  handler:
    type: enum
    values: [SM, PO, ARCHITECT, PM]
    description: Agent that should handle this change

  confidence:
    type: number
    range: [0.0, 1.0]
    description: Confidence score of classification

  reasoning:
    type: string
    description: Brief explanation of classification decision

  redirect_required:
    type: boolean
    description: True if current_agent != handler

  redirect_command:
    type: string
    description: Command to execute if redirect required

metadata:
  owner: System
  usage_context: >
    Called by any agent at the start of change handling to determine
    appropriate routing. If current agent is not the designated handler,
    outputs HANDOFF and halts processing.
