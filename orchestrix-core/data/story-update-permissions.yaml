# Story Manager (SM) - Creates and manages stories
sm_writable:
  - Story
  - Acceptance Criteria
  - Dev Notes
  - Tasks/Subtasks
  - Testing
  - Quality Assessment Metadata
  - Status
  - Change Log

# Architect - Reviews technical accuracy
architect_writable:
  - Architect Review Metadata
  - Status
  - Change Log

# Developer (Dev) - Implements stories
dev_writable:
  - Tasks/Subtasks checkboxes
  - Dev Agent Record
  - Agent Model Used
  - Dev Log Reference
  - Implementation Summary
  - File List
  - Status
  - Change Log

# QA - Reviews and validates implementation
qa_writable:
  - QA Results
  - QA Test Design Metadata
  - Status
  - Change Log
