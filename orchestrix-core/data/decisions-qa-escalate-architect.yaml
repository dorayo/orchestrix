# QA Decision: Escalate to Architect
decision_type: qa-escalate-architect

description: >
  Determine if QA should escalate architecture concerns to Architect based on 
  severity, impact, and concern type.

inputs:
  - name: concern_description
    type: string
    required: true
  - name: severity
    type: string
    required: true
    enum: [LOW, MEDIUM, HIGH, CRITICAL]
  - name: impact
    type: string
    required: true
  - name: concern_type
    type: string
    required: false
    enum: [PERFORMANCE, SECURITY, SCALABILITY, MAINTAINABILITY, DESIGN_PATTERN, DATA_INTEGRITY, INTEGRATION, OTHER]
    default: OTHER
  - name: affects_multiple_components
    type: boolean
    default: false
  - name: requires_design_change
    type: boolean
    default: false
  - name: has_workaround
    type: boolean
    default: false

rules:
  # ESCALATE: Critical or Security concerns
  - condition: "severity == 'CRITICAL' OR concern_type == 'SECURITY'"
    result: ESCALATE
    reasoning: "Critical/security issues require immediate Architect review"
    next_action: "escalate_to_architect"
    next_status: "Escalated"
    metadata:
      urgency: "immediate"
      blocks_story: true
  
  # ESCALATE: High severity with architectural impact
  - condition: "severity == 'HIGH' AND (concern_type IN ['PERFORMANCE', 'SCALABILITY', 'DATA_INTEGRITY'] OR requires_design_change OR affects_multiple_components)"
    result: ESCALATE
    reasoning: "High severity architectural concerns require Architect validation"
    next_action: "escalate_to_architect"
    next_status: "Escalated"
    metadata:
      urgency: "high"
      blocks_story: true
  
  # ESCALATE: Medium severity without workaround
  - condition: "severity == 'MEDIUM' AND (requires_design_change AND NOT has_workaround)"
    result: ESCALATE
    reasoning: "Medium severity design changes without workarounds need Architect guidance"
    next_action: "escalate_to_architect"
    next_status: "Escalated"
    metadata:
      urgency: "medium"
      blocks_story: true
  
  # DOCUMENT: Low severity or has workaround
  - condition: "severity IN ['LOW', 'MEDIUM'] AND (has_workaround OR NOT requires_design_change)"
    result: DOCUMENT
    reasoning: "Low/medium issues with workarounds can be documented for future improvement"
    next_action: "document_concern"
    next_status: "Review"
    metadata:
      urgency: "low"
      blocks_story: false
      add_to_technical_debt: true

output:
  should_escalate:
    type: boolean
  result:
    type: enum
    values: [ESCALATE, DOCUMENT]
  reasoning:
    type: string
  next_action:
    type: string
  next_status:
    type: string
  metadata:
    type: object
    properties:
      urgency: {type: string}
      blocks_story: {type: boolean}
      add_to_technical_debt: {type: boolean}

metadata:
  version: "1.0.0"
  last_updated: "2025-01-17"
  owner: "QA Agent"
  related_requirements: ["6.2", "6.4", "6.8"]
  usage_context: >
    Called by QA during review-story when discovering architectural concerns.
    ESCALATE: Set Status=Escalated, record concern in QA Results, handoff to Architect.
    DOCUMENT: Keep Status=Review, record in QA Results, add to tech debt if needed.

examples:
  - input: {severity: "CRITICAL", concern_type: "SECURITY"}
    output: {result: ESCALATE, next_status: "Escalated"}
  - input: {severity: "HIGH", concern_type: "PERFORMANCE", requires_design_change: true}
    output: {result: ESCALATE, next_status: "Escalated"}
  - input: {severity: "MEDIUM", has_workaround: true, requires_design_change: false}
    output: {result: DOCUMENT, next_status: "Review"}
  - input: {severity: "LOW", affects_multiple_components: true}
    output: {result: DOCUMENT, next_status: "Review"}
