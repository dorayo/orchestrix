# Architect Decision: Review Result
decision_type: architect-review-result

description: >
  Determine Architect review outcome (Approved/RequiresRevision/Escalated) based on
  architecture score, critical issues, and review round.

inputs:
  - name: architecture_score
    type: number
    required: true
  - name: critical_issues
    type: number
    required: true
  - name: review_round
    type: number
    required: true

rules:
  # Approved: High score + No critical issues
  - condition: "(architecture_score >= 8.5 AND critical_issues == 0) OR (architecture_score >= 7.5 AND critical_issues == 0 AND review_round >= 2)"
    result: Approved
    reasoning: "Architecture review passed with good score and no critical issues"
    next_status: Approved
    next_action: "check_test_design_level"
    metadata:
      test_design_check_needed: true

  # RequiresRevision: Good score with few critical issues
  - condition: "architecture_score >= 6.5 AND critical_issues <= 5"
    result: RequiresRevision
    reasoning: "Architecture needs improvement, SM should revise"
    next_status: RequiresRevision
    next_action: "handoff_to_sm_revise"
    metadata:
      revision_type: "standard"
      expected_effort: "medium"

  # Escalated: Low score (fundamental issues)
  - condition: "architecture_score < 6.5"
    result: Escalated
    reasoning: "Architecture score too low, fundamental design issues"
    next_status: Escalated
    next_action: "escalate_to_senior_architect"
    metadata:
      escalation_reason: "fundamental_design_issues"
      severity: "high"
  
  # Escalated: Too many critical issues
  - condition: "critical_issues > 5"
    result: Escalated
    reasoning: "Excessive critical issues indicate systemic problems"
    next_status: Escalated
    next_action: "escalate_to_technical_lead"
    metadata:
      escalation_reason: "systemic_issues"
      severity: "high"
  
  # Escalated: Persistent issues after multiple reviews
  - condition: "review_round >= 3 AND (architecture_score < 8.0 OR critical_issues >= 2)"
    result: Escalated
    reasoning: "Multiple review cycles without sufficient improvement"
    next_status: Escalated
    next_action: "escalate_to_technical_lead"
    metadata:
      escalation_reason: "persistent_quality_issues"
      review_cycles: 3

output:
  review_result:
    type: enum
    values: [Approved, RequiresRevision, Escalated]
  reasoning:
    type: string
  next_status:
    type: string
  next_action:
    type: string
  metadata:
    type: object
    properties:
      test_design_check_needed: {type: boolean}
      revision_type: {type: string}
      expected_effort: {type: string}
      escalation_reason: {type: string}
      severity: {type: string}
      review_cycles: {type: number}

metadata:
  version: "1.0.0"
  last_updated: "2025-01-17"
  owner: "Architect Agent"
  related_requirements: ["6.2", "6.4", "6.6"]
  usage_context: >
    Called by Architect at end of review-story-technical-accuracy. Approved: Check test
    design level. RequiresRevision: Handoff to SM. Escalated: Escalate to senior/lead.

examples:
  - input: {architecture_score: 9.0, critical_issues: 0, review_round: 1}
    output: {review_result: Approved, next_status: Approved}
  - input: {architecture_score: 8.0, critical_issues: 2, review_round: 1}
    output: {review_result: RequiresRevision, next_status: RequiresRevision}
  - input: {architecture_score: 6.0, critical_issues: 3, review_round: 1}
    output: {review_result: Escalated, next_status: Escalated}
