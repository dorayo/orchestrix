# Story Status Transitions
version: "1.0.0"

# Status Definitions
statuses:
  Draft:
    desc: "Story created, recommended for Architect review"
    agent: SM
    actions: ["SM validates quality", "Request Architect review"]
    to: [AwaitingArchReview, Approved, Blocked]

  Blocked:
    desc: "Quality insufficient, needs SM revision"
    agent: SM
    actions: ["SM revises", "Re-check quality"]
    to: [AwaitingArchReview, AwaitingTestDesign, Approved, Blocked]
    
  AwaitingArchReview:
    desc: "Awaiting Architect review"
    agent: Architect
    actions: ["Architect reviews"]
    to: [Approved, AwaitingTestDesign, RequiresRevision, Escalated]
  
  AwaitingTestDesign:
    desc: "Awaiting QA test design"
    agent: QA
    actions: ["QA designs tests", "QA risk profile (if req)"]
    to: [TestDesignComplete]
  
  TestDesignComplete:
    desc: "Test design done, ready for dev"
    agent: QA
    actions: ["Auto-transition to Approved"]
    to: [Approved]
    
  RequiresRevision:
    desc: "Architect found issues, needs SM revision"
    agent: SM
    actions: ["SM revises per Architect", "Re-check quality"]
    to: [AwaitingArchReview, AwaitingTestDesign, Approved, Blocked]
    
  Approved:
    desc: "Approved, dev can begin"
    agent: Dev
    actions: ["Dev implements"]
    to: [InProgress]
    
  InProgress:
    desc: "Dev implementing or fixing QA issues"
    agent: Dev
    actions: ["Dev completes", "Dev fixes"]
    to: [Review, Blocked]
    
  Review:
    desc: "Awaiting QA review"
    agent: QA
    actions: ["QA reviews and tests"]
    to: [Done, InProgress, Escalated]
    
  Done:
    desc: "Completed"
    agent: null
    actions: []
    to: []
    
  Escalated:
    desc: "Needs human/Architect intervention"
    agent: Architect
    actions: ["Architect reviews escalation", "Human decision (if needed)"]
    to: [AwaitingArchReview, Approved, Blocked, InProgress, Review]

# Transition Rules
transitions:
  # Draft transitions (new story, quality 6.0-7.9)
  Draft_to_AwaitingArchReview:
    from: Draft
    to: AwaitingArchReview
    agent: SM
    prereq:
      struct_valid: true
      tech_extract: "≥80%"
      quality_score: "6.0-7.9"
    desc: "Draft story with medium quality, needs Architect review"

  Draft_to_Approved:
    from: Draft
    to: Approved
    agent: SM
    prereq:
      struct_valid: true
      tech_extract: "≥80%"
      quality_score: "≥8.0"
      complexity: "0-1"
    desc: "Draft story with high quality, direct approval"

  Draft_to_Blocked:
    from: Draft
    to: Blocked
    agent: SM
    prereq:
      quality_low: true
    desc: "Draft story quality too low, needs revision"

  # SM transitions
  Blocked_to_AwaitingArchReview:
    from: Blocked
    to: AwaitingArchReview
    agent: SM
    prereq:
      struct_valid: true
      tech_extract: "≥80%"
      tech_score: "≥6.0"
      complexity: true
    desc: "Quality OK after revision, needs Architect"
  
  Blocked_to_AwaitingTestDesign:
    from: Blocked
    to: AwaitingTestDesign
    agent: SM
    prereq:
      struct_valid: true
      tech_extract: "≥80%"
      tech_score: "≥8.0"
      complexity: "0-1"
      test_level: "Std/Comp"
    desc: "Quality OK, low complexity, needs QA test"
  
  Blocked_to_Approved:
    from: Blocked
    to: Approved
    agent: SM
    prereq:
      struct_valid: true
      tech_extract: "≥80%"
      tech_score: "≥8.0"
      complexity: "0-1"
      decision: "Approved"
    desc: "Excellent quality, low complexity, direct approval"
  
  RequiresRevision_to_AwaitingArchReview:
    from: RequiresRevision
    to: AwaitingArchReview
    agent: SM
    prereq:
      revision_done: true
      quality_ok: true
      critical_fixed: true
      round: "<2"
    desc: "2nd round Architect review after revision"
  
  RequiresRevision_to_Approved:
    from: RequiresRevision
    to: Approved
    agent: SM
    prereq:
      revision_done: true
      critical_fixed: true
      score_improve: "≥2"
      final_score: "≥8.0"
      minor_only: true
    desc: "Auto-approval after revision"
  
  RequiresRevision_to_Blocked:
    from: RequiresRevision
    to: Blocked
    agent: SM
    prereq:
      revision_done: true
      quality_low: true
    desc: "Quality still low after revision"
  
  RequiresRevision_to_AwaitingTestDesign:
    from: RequiresRevision
    to: AwaitingTestDesign
    agent: SM
    prereq:
      revision_done: true
      quality_ok: true
      test_level: "Std/Comp"
      test_exists: false
      arch_not_needed: true
    desc: "Revision done, needs QA test (no Architect)"
  
  # Architect transitions (including Draft review)
  Draft_to_Approved_by_Architect:
    from: Draft
    to: Approved
    agent: Architect
    prereq:
      review_done: true
      score: "≥7"
      no_critical: true
      test_level: "Simple"
    desc: "Architect approves Draft story (simple test)"

  Draft_to_AwaitingTestDesign_by_Architect:
    from: Draft
    to: AwaitingTestDesign
    agent: Architect
    prereq:
      review_done: true
      score: "≥7"
      no_critical: true
      test_level: "Std/Comp"
    desc: "Architect approves Draft, needs QA test"

  Draft_to_RequiresRevision:
    from: Draft
    to: RequiresRevision
    agent: Architect
    prereq:
      review_done: true
    cond:
      score: "<7"
      or_critical: true
    desc: "Architect found issues in Draft"

  Draft_to_Escalated:
    from: Draft
    to: Escalated
    agent: Architect
    prereq:
      review_done: true
      human_needed: true
    desc: "Complex issues in Draft need human"

  AwaitingArchReview_to_Approved:
    from: AwaitingArchReview
    to: Approved
    agent: Architect
    prereq:
      review_done: true
      score: "≥7"
      no_critical: true
      test_level: "Simple"
    desc: "Architect OK, simple test (skip test design)"
  
  AwaitingArchReview_to_AwaitingTestDesign:
    from: AwaitingArchReview
    to: AwaitingTestDesign
    agent: Architect
    prereq:
      review_done: true
      score: "≥7"
      no_critical: true
      test_level: "Std/Comp"
    desc: "Architect OK, needs QA test"
  
  AwaitingArchReview_to_RequiresRevision:
    from: AwaitingArchReview
    to: RequiresRevision
    agent: Architect
    prereq:
      review_done: true
    cond:
      score: "<7"
      or_critical: true
    desc: "Architect found issues"
  
  AwaitingArchReview_to_Escalated:
    from: AwaitingArchReview
    to: Escalated
    agent: Architect
    prereq:
      review_done: true
      human_needed: true
    desc: "Complex issues need human"
  
  # QA test design transitions
  AwaitingTestDesign_to_TestDesignComplete:
    from: AwaitingTestDesign
    to: TestDesignComplete
    agent: QA
    prereq:
      test_done: true
      doc_created: true
      risk_done: "if req"
    desc: "QA test design done"
  
  TestDesignComplete_to_Approved:
    from: TestDesignComplete
    to: Approved
    agent: QA
    prereq:
      test_done: true
      doc_created: true
    desc: "Test design complete, auto-transition to Approved for Dev"
  
  # Dev transitions
  Approved_to_InProgress:
    from: Approved
    to: InProgress
    agent: Dev
    prereq:
      impl_started: true
    desc: "Dev starts"
  
  InProgress_to_Review:
    from: InProgress
    to: Review
    agent: Dev
    prereq:
      impl_done: true
      tasks_done: true
      tests_written: true
    desc: "Dev done, submit for QA"
  
  InProgress_to_Blocked:
    from: InProgress
    to: Blocked
    agent: Dev
    prereq:
      blocking: true
      type: "AC unclear"
      documented: true
    desc: "Dev blocks due to unclear AC"
  
  # QA transitions
  Review_to_Done:
    from: Review
    to: Done
    agent: QA
    prereq:
      qa_done: true
      gate: "PASS"
      ac_met: true
      no_critical: true
    desc: "QA passed, done"
  
  Review_to_InProgress:
    from: Review
    to: InProgress
    agent: QA
    prereq:
      qa_done: true
    cond:
      gate: "CONCERNS/FAIL"
      has_issues: true
    desc: "QA found issues, needs Dev fix"
  
  Review_to_Escalated:
    from: Review
    to: Escalated
    agent: QA
    prereq:
      qa_done: true
      arch_concern: true
      severity: "Med/High"
      documented: true
    desc: "QA found arch concerns, needs Architect"
  
  # Escalated transitions
  Escalated_to_AwaitingArchReview:
    from: Escalated
    to: AwaitingArchReview
    agent: Human
    prereq:
      decision: true
      action: "re_review"
    desc: "Re-enter Architect review"
  
  Escalated_to_Approved:
    from: Escalated
    to: Approved
    agent: Human
    prereq:
      decision: true
      action: "approve"
    desc: "Human approval"
  
  Escalated_to_Blocked:
    from: Escalated
    to: Blocked
    agent: Human
    prereq:
      decision: true
      action: "revise"
    desc: "Human requires revision"
  
  Escalated_to_InProgress:
    from: Escalated
    to: InProgress
    agent: Architect
    prereq:
      review_done: true
      decision: "dev_changes"
      guidance: true
    desc: "Architect reviewed, needs Dev changes"
  
  Escalated_to_Review:
    from: Escalated
    to: Review
    agent: Architect
    prereq:
      review_done: true
      decision: "no_changes"
      guidance: true
    desc: "Architect reviewed, no changes, return to QA"

  # ============================================================================
  # Layered Change Management Transitions
  # ============================================================================
  # These transitions support the four-layer change management system:
  # Story (SM) → Epic (PO) → Tech (Architect) → Product (PM)

  # SM Course Correction outcomes
  Any_to_Blocked_via_sm_correction:
    from: [InProgress, Review, Approved]
    to: Blocked
    agent: SM
    prereq:
      sm_correction_done: true
      action: [MODIFY_STORY, CREATE_STORY, SPLIT_STORY]
      quality_recheck_needed: true
    desc: "SM modified/created story, needs quality recheck"

  Blocked_to_AwaitingArchReview_via_sm_correction:
    from: Blocked
    to: AwaitingArchReview
    agent: SM
    prereq:
      sm_correction_done: true
      needs_arch_validation: true
      struct_valid: true
    desc: "SM correction complete, needs Architect validation"

  # Escalation to higher layers
  Any_to_Escalated_via_change_management:
    from: [Blocked, RequiresRevision, InProgress, Review]
    to: Escalated
    agent: [SM, PO, Architect]
    prereq:
      escalation_needed: true
      escalation_target: [PO, Architect, PM]
      change_description: true
    desc: "Change requires higher layer handling"

  # Return from escalation
  Escalated_to_Blocked_from_epic_layer:
    from: Escalated
    to: Blocked
    agent: PO
    prereq:
      po_correction_done: true
      cascade_to_sm: true
      epic_updated: true
    desc: "PO resolved epic change, SM to update stories"

  Escalated_to_AwaitingArchReview_from_tech_layer:
    from: Escalated
    to: AwaitingArchReview
    agent: Architect
    prereq:
      arch_resolution_done: true
      cascade_to_po_sm: true
      tech_change_applied: true
    desc: "Architect resolved tech change, needs revalidation"

  Escalated_to_Blocked_from_product_layer:
    from: Escalated
    to: Blocked
    agent: PM
    prereq:
      prd_updated: true
      cascade_to_architect_po: true
    desc: "PM updated PRD, cascade to Architect and PO"

# Agent Permissions
permissions:
  SM:
    modify: [Blocked, RequiresRevision, InProgress, Review, Approved]
    create: true
    init_status: true
    changes:
      - Blocked -> AwaitingArchReview
      - Blocked -> AwaitingTestDesign
      - Blocked -> Approved
      - Blocked -> Blocked
      - RequiresRevision -> AwaitingArchReview
      - RequiresRevision -> AwaitingTestDesign
      - RequiresRevision -> Approved
      - RequiresRevision -> Blocked
      # Layered change management
      - InProgress -> Blocked (via sm_correction)
      - Review -> Blocked (via sm_correction)
      - Approved -> Blocked (via sm_correction)
      - Any -> Escalated (via change_escalation)
  
  Architect:
    modify: [Draft, AwaitingArchReview, Escalated]
    create: false
    init_status: false
    changes:
      - Draft -> Approved
      - Draft -> AwaitingTestDesign
      - Draft -> RequiresRevision
      - Draft -> Escalated
      - AwaitingArchReview -> Approved
      - AwaitingArchReview -> AwaitingTestDesign
      - AwaitingArchReview -> RequiresRevision
      - AwaitingArchReview -> Escalated
      - Escalated -> InProgress
      - Escalated -> Review
  
  Dev:
    modify: [Approved, TestDesignComplete, InProgress]
    create: false
    init_status: false
    changes:
      - Approved -> InProgress
      - TestDesignComplete -> InProgress
      - InProgress -> Review
      - InProgress -> Blocked
      - InProgress -> Escalated
  
  QA:
    modify: [AwaitingTestDesign, TestDesignComplete, Review]
    create: false
    init_status: false
    changes:
      - AwaitingTestDesign -> TestDesignComplete
      - TestDesignComplete -> Approved
      - Review -> Done
      - Review -> InProgress
      - Review -> Escalated
  
  Human:
    modify: [Escalated]
    create: false
    init_status: false
    changes:
      - Escalated -> AwaitingArchReview
      - Escalated -> Approved
      - Escalated -> Blocked

# Error Messages
errors:
  invalid_transition:
    msg: "Invalid transition: {current_status} -> {target_status}"
    hint: "Allowed: {allowed_transitions}"
  
  unauthorized:
    msg: "{agent} cannot modify {status}"
    hint: "Responsible: {responsible_agent}"
  
  missing_prereq:
    msg: "Prerequisites not met"
    hint: "Missing: {missing_prerequisites}"
  
  invalid_status:
    msg: "Invalid status: {status}"
    hint: "Valid: {valid_statuses}"

# Validation Rules
validation:
  enforce_transitions: true
  enforce_permissions: true
  enforce_prereq: true
  log_transitions: true
  allow_human_override: true
  
  # Special validations (Req 5.1-5.6)
  special:
    AwaitingArchReview_to_Approved:
      check_test_level: true
      allowed_levels: ["Simple"]
      error: "Cannot -> Approved with Std/Comp test level. Use AwaitingTestDesign."
    
    AwaitingArchReview_to_AwaitingTestDesign:
      check_test_level: true
      allowed_levels: ["Standard", "Comprehensive"]
      error: "Cannot -> AwaitingTestDesign with Simple test level. Use Approved."
    
    RequiresRevision_to_AwaitingTestDesign:
      check_test_exists: true
      should_exist: false
      error: "Test exists. SM should mark for review, not create new transition."
      extra:
        - check_arch_not_needed: true
        - check_test_level: ["Standard", "Comprehensive"]
    
    InProgress_to_Blocked:
      check_blocking: true
      required: [issue_desc, issue_type, blocking_reason]
      error: "Document blocking issue in Dev Log before blocking."
    
    Review_to_Escalated:
      check_escalation: true
      required: [arch_concern, severity, concern_desc]
      error: "Document arch concern in QA Results before escalation."
    
    Escalated_to_InProgress:
      check_guidance: true
      required: [arch_result, guidance, changes]
      error: "Architect must provide guidance before -> InProgress."
    
    Escalated_to_Review:
      check_guidance: true
      required: [arch_result, guidance, rationale]
      error: "Architect must provide guidance before -> Review."
    
    all_transitions:
      require_log: true
      log_fields: [from, to, agent, timestamp, reason, decision_path]
      error: "All transitions must be logged in Change Log."
