# QA Decision: Gate Decision
decision_type: qa-gate-decision

description: >
  Determine QA Gate result (PASS/FAIL/CONCERNS) using progressive standards:
  stricter on first review, more lenient on subsequent reviews.

inputs:
  - name: review_round
    type: number
    required: true
  - name: issues_by_severity
    type: object
    required: true
    properties:
      critical: {type: number}
      high: {type: number}
      medium: {type: number}
      low: {type: number}
  - name: previous_issues
    type: object
    required: false
    nullable: true
    properties:
      critical: {type: number}
      high: {type: number}
      medium: {type: number}
      low: {type: number}

rules:
  # PASS: Perfect or high quality
  - condition: "issues_by_severity.critical == 0 AND issues_by_severity.high == 0 AND (issues_by_severity.medium <= 1 OR review_round >= 2)"
    result: PASS
    reasoning: "No critical/high issues, quality meets standards"
    next_status: Done
    next_action: "mark_story_complete"
    metadata:
      quality_level: "excellent"

  # PASS: Progressive standard for re-review
  - condition: "review_round >= 2 AND issues_by_severity.critical == 0 AND issues_by_severity.high <= 1 AND issues_by_severity.medium <= 2"
    result: PASS
    reasoning: "Re-review with minimal issues, progressive standard applied"
    next_status: Done
    next_action: "mark_story_complete"
    metadata:
      quality_level: "acceptable"
      progressive_standard_applied: true
  
  # CONCERNS: Moderate issues
  - condition: "issues_by_severity.critical <= 1 AND issues_by_severity.high <= 2 AND issues_by_severity.medium <= 4"
    result: CONCERNS
    reasoning: "Moderate issues found, targeted fixes needed"
    next_status: InProgress
    next_action: "handoff_to_dev_fix"
    metadata:
      quality_level: "needs_improvement"
      expected_effort: "medium"

  # FAIL: Multiple critical or excessive high issues
  - condition: "issues_by_severity.critical >= 2 OR (issues_by_severity.critical >= 1 AND issues_by_severity.high >= 3) OR issues_by_severity.high >= 4"
    result: FAIL
    reasoning: "Multiple critical/high issues indicate systemic problems"
    next_status: InProgress
    next_action: "handoff_to_dev_rework"
    metadata:
      quality_level: "poor"
      expected_effort: "high"
      rework_required: true
  
  # FAIL: No improvement after multiple reviews
  - condition: "review_round >= 3 AND previous_issues != null AND (issues_by_severity.critical + issues_by_severity.high) >= (previous_issues.critical + previous_issues.high)"
    result: FAIL
    reasoning: "No improvement after multiple reviews, escalating"
    next_status: Escalated
    next_action: "escalate_to_architect"
    metadata:
      quality_level: "stalled"
      escalation_reason: "no_improvement"
  
  # FAIL: Excessive total issues
  - condition: "(issues_by_severity.critical + issues_by_severity.high + issues_by_severity.medium) >= 10"
    result: FAIL
    reasoning: "Excessive issue count, thorough self-review needed"
    next_status: InProgress
    next_action: "handoff_to_dev_rework"
    metadata:
      quality_level: "poor"
      expected_effort: "high"

  # CONCERNS: Default for borderline cases
  - condition: "issues_by_severity.critical == 0"
    result: CONCERNS
    reasoning: "Issues found but no critical blockers"
    next_status: InProgress
    next_action: "handoff_to_dev_fix"
    metadata:
      quality_level: "needs_improvement"
      expected_effort: "medium"

output:
  gate_result:
    type: enum
    values: [PASS, FAIL, CONCERNS]
  reasoning:
    type: string
  next_status:
    type: string
  next_action:
    type: string
  metadata:
    type: object
    properties:
      quality_level: {type: string}
      expected_effort: {type: string}
      progressive_standard_applied: {type: boolean}
      rework_required: {type: boolean}

metadata:
  version: "1.0.0"
  last_updated: "2025-01-17"
  owner: "QA Agent"
  related_requirements: ["6.2", "6.4", "6.8"]
  usage_context: >
    Called by QA at end of review-story. Progressive standards: strict on first review,
    lenient on re-reviews. PASS: Set Status=Complete. FAIL/CONCERNS: Set Status=Review,
    handoff to Dev with issue details.

examples:
  - input: {review_round: 1, issues_by_severity: {critical: 0, high: 0, medium: 0, low: 2}}
    output: {gate_result: PASS, next_status: Complete}
  - input: {review_round: 1, issues_by_severity: {critical: 0, high: 2, medium: 3, low: 1}}
    output: {gate_result: CONCERNS, next_status: Review}
  - input: {review_round: 2, issues_by_severity: {critical: 0, high: 1, medium: 2, low: 0}}
    output: {gate_result: PASS, next_status: Complete}
  - input: {review_round: 1, issues_by_severity: {critical: 2, high: 1, medium: 0, low: 0}}
    output: {gate_result: FAIL, next_status: Review}
