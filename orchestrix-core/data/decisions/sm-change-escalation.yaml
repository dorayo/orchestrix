# SM Change Escalation Decision
# Determines if SM should escalate a Story-level change to higher layers.

decision_type: sm-change-escalation

description: >
  After SM analyzes a change request, this decision determines whether the change
  can be handled within story scope or needs escalation to Epic (PO) or Tech (Architect) layer.

version: "1.0.0"

inputs:
  - name: analysis_result
    type: object
    required: true
    properties:
      stories_impacted:
        type: number
        description: Number of stories affected by this change
      requires_architecture_change:
        type: boolean
        description: True if change requires architecture modification
      requires_epic_restructure:
        type: boolean
        description: True if change requires epic-level reorganization
      resolvable_within_story:
        type: boolean
        description: True if change can be fully resolved within single story
      action_type:
        type: string
        enum: [MODIFY_STORY, CREATE_STORY, SPLIT_STORY, DEPRECATE_STORY]
        description: Type of action being performed

rules:
  # Rule 1: Architecture change required - escalate to Architect
  - name: escalate_to_tech
    priority: 1
    condition: >
      analysis_result.requires_architecture_change == true
    result:
      decision: ESCALATE_TO_TECH
      handoff_to: ARCHITECT
      handoff_command: "*resolve-tech-change"
    reasoning: "Architecture change required, escalating to Architect"

  # Rule 2: Multi-story impact or epic restructure - escalate to PO
  - name: escalate_to_epic
    priority: 2
    condition: >
      analysis_result.stories_impacted > 1
      OR analysis_result.requires_epic_restructure == true
    result:
      decision: ESCALATE_TO_EPIC
      handoff_to: PO
      handoff_command: "*correct-course"
    reasoning: "Multi-story impact or epic restructure needed, escalating to PO"

  # Rule 3: Split story may affect epic structure
  - name: split_story_check
    priority: 3
    condition: >
      analysis_result.action_type == "SPLIT_STORY"
      AND analysis_result.stories_impacted > 2
    result:
      decision: ESCALATE_TO_EPIC
      handoff_to: PO
      handoff_command: "*correct-course"
    reasoning: "Story split creates multiple new stories, PO should coordinate"

  # Rule 4: Resolvable within story scope
  - name: handle_in_story
    priority: 4
    condition: >
      analysis_result.resolvable_within_story == true
      AND analysis_result.stories_impacted <= 1
      AND analysis_result.requires_architecture_change == false
      AND analysis_result.requires_epic_restructure == false
    result:
      decision: HANDLE_IN_STORY
      next_action: finalize_story_update
    reasoning: "Change is within single story scope, handling locally"

  # Rule 5: Default - handle in story with caution
  - name: default_handle
    priority: 5
    condition: "true"
    result:
      decision: HANDLE_IN_STORY
      next_action: finalize_story_update
    reasoning: "Defaulting to story-level handling"

output:
  decision:
    type: enum
    values: [HANDLE_IN_STORY, ESCALATE_TO_EPIC, ESCALATE_TO_TECH]
    description: Escalation decision

  handoff_to:
    type: string
    enum: [PO, ARCHITECT]
    description: Target agent for escalation (if escalating)

  handoff_command:
    type: string
    description: Command to include in HANDOFF message

  handoff_context:
    type: string
    description: Context to pass to target agent

  next_action:
    type: string
    description: Next action if handling locally

handoff_templates:
  ESCALATE_TO_EPIC: >
    🎯 HANDOFF TO PO: *correct-course
    Context: {handoff_context}
    Stories affected: {stories_impacted}
    Reason: {reasoning}

  ESCALATE_TO_TECH: >
    🎯 HANDOFF TO ARCHITECT: *resolve-tech-change
    Context: {handoff_context}
    Architecture impact: {architecture_impact_description}
    Reason: {reasoning}

metadata:
  owner: SM Agent
  usage_context: >
    Called at the end of sm-correct-course.md Step 6 to determine
    if change should be escalated or handled locally.
