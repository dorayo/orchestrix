# SM Decision: Revision Approval
decision_type: sm-revision-approval

description: >
  Determine if revised Story should be auto-approved (skip Round 2), require
  Round 2 review, prompt user, or remain blocked based on quality improvement.

inputs:
  - name: previous_architect_score
    type: number
    required: true
  - name: new_quality_score
    type: number
    required: true
  - name: critical_issues_total
    type: number
    required: true
  - name: critical_issues_resolved
    type: number
    required: true
  - name: high_issues_total
    type: number
    required: true
  - name: high_issues_resolved
    type: number
    required: true
  - name: medium_issues_total
    type: number
    required: true
  - name: medium_issues_resolved
    type: number
    required: true
  - name: structure_validation_passed
    type: boolean
    required: true
  - name: technical_extraction_rate
    type: number
    required: true
  - name: review_round
    type: number
    required: true

rules:
  # AUTO_APPROVED: Significant improvement
  - condition: "critical_issues_total == critical_issues_resolved AND (new_quality_score - previous_architect_score) >= 2.0 AND new_quality_score >= 8.0 AND structure_validation_passed == true AND technical_extraction_rate >= 80"
    result: AUTO_APPROVED
    reasoning: "Significant quality improvement: all critical issues resolved, score ≥8.0"
    next_action: "check_test_design_for_final_status"
    metadata:
      skip_round_2: true
      approval_type: "significant_improvement"
  
  # AUTO_APPROVED: Only minor issues
  - condition: "critical_issues_total == 0 AND high_issues_total == 0 AND new_quality_score >= 8.0 AND structure_validation_passed == true AND technical_extraction_rate >= 80"
    result: AUTO_APPROVED
    reasoning: "Only minor issues revised, high quality achieved (≥8.0)"
    next_action: "check_test_design_for_final_status"
    metadata:
      skip_round_2: true
      approval_type: "minor_issues_only"
  
  # ROUND_2_REVIEW_REQUIRED: Critical/High issues revised but quality <8.0
  - condition: "(critical_issues_resolved > 0 OR high_issues_resolved > 0) AND new_quality_score < 8.0 AND new_quality_score >= 6.0"
    result: ROUND_2_REVIEW_REQUIRED
    reasoning: "Critical/High issues revised but quality <8.0, validation needed"
    next_status: AwaitingArchReview
    next_action: "handoff_to_architect_round_2"
    metadata:
      skip_round_2: false
      review_round: 2
  
  # USER_DECISION_REQUIRED: Medium issues, good quality
  - condition: "critical_issues_total == critical_issues_resolved AND high_issues_total == high_issues_resolved AND medium_issues_resolved > 0 AND new_quality_score >= 7.0 AND new_quality_score < 8.0 AND structure_validation_passed == true AND technical_extraction_rate >= 80"
    result: USER_DECISION_REQUIRED
    reasoning: "Medium issues revised with good quality (7.0-7.9), user can choose"
    next_action: "prompt_user_decision"
    metadata:
      skip_round_2: "user_choice"
      quality_level: "good"
      risk_level: "low"
  
  # BLOCKED: Quality too low
  - condition: "new_quality_score < 6.0"
    result: BLOCKED
    reasoning: "Quality score <6.0, insufficient quality"
    next_status: Blocked
    next_action: "sm_continue_revision"
    metadata:
      blocked_reason: "insufficient_quality"
  
  # BLOCKED: Structure validation failed
  - condition: "structure_validation_passed == false"
    result: BLOCKED
    reasoning: "Structure validation failed, fix structure issues"
    next_status: Blocked
    next_action: "sm_fix_structure"
    metadata:
      blocked_reason: "structure_validation_failed"
  
  # BLOCKED: Technical extraction insufficient
  - condition: "technical_extraction_rate < 80"
    result: BLOCKED
    reasoning: "Technical extraction <80%, improve technical details"
    next_status: Blocked
    next_action: "sm_improve_technical_details"
    metadata:
      blocked_reason: "insufficient_technical_extraction"
  
  # Default: Standard Round 2 Review
  - condition: "new_quality_score >= 6.0 AND structure_validation_passed == true AND technical_extraction_rate >= 80"
    result: ROUND_2_REVIEW_REQUIRED
    reasoning: "Quality improved but requires Architect validation"
    next_status: AwaitingArchReview
    next_action: "handoff_to_architect_round_2"
    metadata:
      skip_round_2: false
      review_round: 2

output:
  approval_decision:
    type: enum
    values: [AUTO_APPROVED, ROUND_2_REVIEW_REQUIRED, USER_DECISION_REQUIRED, BLOCKED]
  reasoning:
    type: string
  next_status:
    type: string
  next_action:
    type: string
  metadata:
    type: object
    properties:
      skip_round_2: {type: [boolean, string]}
      approval_type: {type: string}
      review_round: {type: number}
      quality_level: {type: string}
      risk_level: {type: string}
      blocked_reason: {type: string}

metadata:
  version: "1.0.0"
  last_updated: "2025-01-17"
  owner: "SM Agent"
  related_requirements: ["6.9", "6.11"]
  usage_context: >
    Called by SM after quality re-check in revise-story-from-architect-feedback.
    AUTO_APPROVED: Call sm-story-status for final status. ROUND_2_REVIEW_REQUIRED:
    Handoff to Architect. USER_DECISION_REQUIRED: Prompt user. BLOCKED: Continue revision.

examples:
  - input: {previous_architect_score: 6.5, new_quality_score: 8.5, critical_issues_total: 1, critical_issues_resolved: 1, structure_validation_passed: true, technical_extraction_rate: 95}
    output: {approval_decision: AUTO_APPROVED, next_action: "check_test_design_for_final_status"}
  - input: {previous_architect_score: 6.5, new_quality_score: 7.5, critical_issues_resolved: 1, structure_validation_passed: true, technical_extraction_rate: 85}
    output: {approval_decision: ROUND_2_REVIEW_REQUIRED, next_status: AwaitingArchReview}
  - input: {previous_architect_score: 6.5, new_quality_score: 5.5, structure_validation_passed: true, technical_extraction_rate: 75}
    output: {approval_decision: BLOCKED, next_status: Blocked}
