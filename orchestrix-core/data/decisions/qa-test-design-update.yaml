# QA Decision: Test Design Update Required
decision_type: qa-test-design-update

description: >
  Determine if QA test design needs update after SM revision based on
  revision type, AC changes, and test design level changes.

inputs:
  - name: sm_revision_type
    type: string
    required: true
    enum: [ACCEPTANCE_CRITERIA_CHANGED, DEV_NOTES_ONLY, TECHNICAL_DETAILS_ONLY, SCOPE_CHANGED, REQUIREMENTS_CLARIFIED]
  - name: ac_changed
    type: boolean
    required: true
  - name: test_design_exists
    type: boolean
    required: true
  - name: test_design_level
    type: string
    required: false
    enum: [Simple, Standard, Comprehensive]
  - name: new_test_design_level
    type: string
    required: false
    enum: [Simple, Standard, Comprehensive]
  - name: scope_impact
    type: string
    required: false
    enum: [MINOR, MODERATE, MAJOR]
    default: MINOR

rules:
  # UPDATE_REQUIRED: AC changed or test level upgraded
  - condition: "ac_changed == true OR (test_design_level == 'Simple' AND new_test_design_level IN ['Standard', 'Comprehensive'])"
    result: UPDATE_REQUIRED
    reasoning: "AC changes or test level upgrade requires test design update"
    next_action: "update_test_design"
    metadata:
      update_type: "FULL_REVIEW"
      urgency: "high"
  
  # UPDATE_REQUIRED: Major scope change
  - condition: "sm_revision_type == 'SCOPE_CHANGED' AND scope_impact == 'MAJOR' AND test_design_exists == true"
    result: UPDATE_REQUIRED
    reasoning: "Major scope changes require comprehensive test design review"
    next_action: "update_test_design"
    metadata:
      update_type: "SCOPE_REVISION"
      urgency: "high"
  
  # UPDATE_REQUIRED: Moderate scope change
  - condition: "sm_revision_type == 'SCOPE_CHANGED' AND scope_impact == 'MODERATE' AND test_design_exists == true"
    result: UPDATE_REQUIRED
    reasoning: "Moderate scope changes require targeted test design updates"
    next_action: "update_test_design"
    metadata:
      update_type: "TARGETED_UPDATE"
      urgency: "medium"
  
  # REVIEW_REQUIRED: Requirements clarified or dev notes changed
  - condition: "sm_revision_type IN ['REQUIREMENTS_CLARIFIED', 'DEV_NOTES_ONLY'] AND test_design_exists == true"
    result: REVIEW_REQUIRED
    reasoning: "Clarifications may affect test design, review needed"
    next_action: "review_test_design"
    metadata:
      update_type: "CLARIFICATION_REVIEW"
      urgency: "medium"
  
  # REVIEW_REQUIRED: Technical details or minor scope change
  - condition: "(sm_revision_type == 'TECHNICAL_DETAILS_ONLY' OR scope_impact == 'MINOR') AND test_design_exists == true"
    result: REVIEW_REQUIRED
    reasoning: "Minor changes, quick review to confirm test design validity"
    next_action: "review_test_design"
    metadata:
      update_type: "QUICK_REVIEW"
      urgency: "low"
      can_mark_no_changes: true
  
  # NO_UPDATE_NEEDED: Test level downgraded
  - condition: "test_design_level IN ['Standard', 'Comprehensive'] AND new_test_design_level == 'Simple'"
    result: NO_UPDATE_NEEDED
    reasoning: "Test level downgraded, archive existing test design"
    next_action: "archive_test_design"
    metadata:
      update_type: "LEVEL_DOWNGRADE"
      urgency: "low"
  
  # NO_UPDATE_NEEDED: No test design yet
  - condition: "test_design_exists == false AND ac_changed == false"
    result: NO_UPDATE_NEEDED
    reasoning: "No test design yet, changes will be incorporated when created"
    next_action: "no_action"
    metadata:
      update_type: "NONE"
      urgency: "none"

output:
  update_required:
    type: enum
    values: [UPDATE_REQUIRED, REVIEW_REQUIRED, NO_UPDATE_NEEDED]
  reasoning:
    type: string
  next_action:
    type: string
  metadata:
    type: object
    properties:
      update_type: {type: string}
      urgency: {type: string}
      can_mark_no_changes: {type: boolean}

metadata:
  version: "1.0.0"
  last_updated: "2025-01-17"
  owner: "QA Agent"
  related_requirements: ["6.2", "6.4", "6.8"]
  usage_context: >
    Called by QA when SM revises Story. UPDATE_REQUIRED: Update test design and add
    revision history. REVIEW_REQUIRED: Review and mark as valid or update. NO_UPDATE_NEEDED:
    No action required.

examples:
  - input: {sm_revision_type: "ACCEPTANCE_CRITERIA_CHANGED", ac_changed: true, test_design_exists: true}
    output: {update_required: UPDATE_REQUIRED, next_action: "update_test_design"}
  - input: {sm_revision_type: "DEV_NOTES_ONLY", ac_changed: false, test_design_exists: true}
    output: {update_required: REVIEW_REQUIRED, next_action: "review_test_design"}
  - input: {sm_revision_type: "TECHNICAL_DETAILS_ONLY", ac_changed: false, test_design_exists: false}
    output: {update_required: NO_UPDATE_NEEDED, next_action: "no_action"}
