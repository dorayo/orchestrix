# Architect Change Escalation Decision
# Determines if Architect should escalate a Tech-level change to Product layer.

decision_type: architect-change-escalation

description: >
  After Architect analyzes a technical change request, this decision determines
  whether the change can be resolved with a technical solution or needs escalation
  to Product (PM) layer for PRD/feature changes.

version: "1.1.0"

constants:
  proposal_location: "docs/architecture/proposals"
  large_scope_threshold: 3
  effort_levels: [low, medium, high]

inputs:
  - name: analysis_result
    type: object
    required: true
    properties:
      requires_feature_change:
        type: boolean
        description: True if change requires feature definition modification
      requires_scope_reduction:
        type: boolean
        description: True if change requires reducing project scope
      mvp_viability_affected:
        type: boolean
        description: True if MVP viability is at risk
      resolvable_with_tech_solution:
        type: boolean
        description: True if a pure technical solution exists
      architecture_components_affected:
        type: array
        items:
          type: string
        description: List of architecture components impacted
      api_contracts_affected:
        type: boolean
        description: True if API contracts need modification
      database_schema_affected:
        type: boolean
        description: True if database schema needs modification
      estimated_effort:
        type: string
        enum: [low, medium, high]
        description: Estimated implementation effort
      cross_epic_impact:
        type: boolean
        description: True if change affects multiple epics
      proposal_path:
        type: string
        description: Path to generated proposal document

rules:
  # Rule 1: Feature change required - escalate to PM
  - name: escalate_feature_change
    priority: 1
    condition: >
      analysis_result.requires_feature_change == true
    result:
      decision: ESCALATE_TO_PRODUCT
      handoff_to: PM
      handoff_command: "*revise-prd"
    reasoning: "Feature definition change required, escalating to PM"

  # Rule 2: Scope reduction required - escalate to PM
  - name: escalate_scope_reduction
    priority: 2
    condition: >
      analysis_result.requires_scope_reduction == true
    result:
      decision: ESCALATE_TO_PRODUCT
      handoff_to: PM
      handoff_command: "*revise-prd"
    reasoning: "Scope reduction required, PM must approve"

  # Rule 3: MVP viability at risk - escalate to PM
  - name: escalate_mvp_risk
    priority: 3
    condition: >
      analysis_result.mvp_viability_affected == true
    result:
      decision: ESCALATE_TO_PRODUCT
      handoff_to: PM
      handoff_command: "*revise-prd"
    reasoning: "MVP viability at risk, PM decision required"

  # Rule 4: Technical solution - large scope - route to PO
  - name: handle_in_tech_large_scope
    priority: 4
    condition: >
      analysis_result.resolvable_with_tech_solution == true
      AND analysis_result.requires_feature_change == false
      AND analysis_result.requires_scope_reduction == false
      AND analysis_result.mvp_viability_affected == false
      AND (
        analysis_result.architecture_components_affected.length >= 3
        OR analysis_result.estimated_effort == "high"
        OR analysis_result.cross_epic_impact == true
        OR analysis_result.api_contracts_affected == true
        OR analysis_result.database_schema_affected == true
      )
    result:
      decision: HANDLE_IN_TECH
      next_action: route_to_po
      downstream_handoffs:
        - to: PO
          command: "*review-tech-proposal"
          context: "Tech proposal requires scope evaluation"
    reasoning: "Large scope tech change, PO to evaluate Epic assignment"

  # Rule 5: Technical solution - small scope - route to SM
  - name: handle_in_tech_small_scope
    priority: 5
    condition: >
      analysis_result.resolvable_with_tech_solution == true
      AND analysis_result.requires_feature_change == false
      AND analysis_result.requires_scope_reduction == false
      AND analysis_result.mvp_viability_affected == false
      AND analysis_result.architecture_components_affected.length < 3
      AND analysis_result.estimated_effort != "high"
      AND analysis_result.cross_epic_impact == false
      AND analysis_result.api_contracts_affected == false
      AND analysis_result.database_schema_affected == false
    result:
      decision: HANDLE_IN_TECH
      next_action: route_to_sm
      downstream_handoffs:
        - to: SM
          command: "*create-tech-story"
          context: "Small scope tech improvement"
          default_epic: "0"
    reasoning: "Small scope tech change, SM to create Story directly"

  # Rule 6: Default - route to PO for evaluation
  - name: default_handle
    priority: 6
    condition: "true"
    result:
      decision: HANDLE_IN_TECH
      next_action: route_to_po
      downstream_handoffs:
        - to: PO
          command: "*review-tech-proposal"
          context: "Tech proposal requires evaluation"
    reasoning: "Default to PO for scope evaluation"

output:
  decision:
    type: enum
    values: [HANDLE_IN_TECH, ESCALATE_TO_PRODUCT]
    description: Escalation decision

  handoff_to:
    type: string
    enum: [PM]
    description: Target agent for escalation (if escalating)

  handoff_command:
    type: string
    description: Command to include in HANDOFF message

  handoff_context:
    type: string
    description: Context to pass to target agent

  next_action:
    type: string
    description: Next action if handling locally

  downstream_handoffs:
    type: array
    items:
      type: object
      properties:
        to:
          type: string
          enum: [PO, SM, DEV]
        command:
          type: string
        context:
          type: string
    description: Downstream agents to notify after resolution

handoff_templates:
  ESCALATE_TO_PRODUCT: |
    🎯 HANDOFF TO PM: *revise-prd
    Context: {handoff_context}
    Technical Analysis: {technical_analysis_summary}
    Feature impact: {feature_impact}
    MVP risk: {mvp_viability_affected}
    Reason: {reasoning}

  ROUTE_TO_PO: |
    🎯 HANDOFF TO PO: *review-tech-proposal {proposal_path}
    Context: Tech proposal requires scope evaluation
    Components affected: {architecture_components_affected}
    Estimated effort: {estimated_effort}
    Action: Determine Epic assignment and create Story definition

  ROUTE_TO_SM: |
    🎯 HANDOFF TO SM: *create-tech-story {proposal_path}
    Context: Small-scope technical improvement
    Default Epic: 0 (Technical Debt)
    Action: Create Story directly from proposal

metadata:
  owner: Architect Agent
  usage_context: >
    Called at the end of architect-resolve-change.md Step 6 to determine
    if change should be escalated or handled with downstream notifications.
