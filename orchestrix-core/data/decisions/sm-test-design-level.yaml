# SM Decision: Test Design Level
decision_type: sm-test-design-level

description: >
  Determine test design level (Simple/Standard/Comprehensive) based on Story
  complexity, quality, and security sensitivity.

inputs:
  - name: complexity_indicators
    type: number
    required: true
  - name: quality_score
    type: number
    required: true
  - name: security_sensitive
    type: boolean
    required: true

rules:
  # Simple: High quality + No complexity + No security
  - condition: "quality_score >= 8.5 AND complexity_indicators == 0 AND security_sensitive == false"
    result: Simple
    reasoning: "High quality with no complexity, minimal test design needed"
    next_status: TestDesignComplete
    next_action: "skip_qa_test_design"
    metadata:
      test_design_required: false
      test_levels: ["unit"]
  
  # Standard: High quality + Low complexity OR medium quality
  - condition: "(quality_score >= 7.0 AND complexity_indicators <= 2 AND security_sensitive == false)"
    result: Standard
    reasoning: "Good quality with low/moderate complexity, standard test design needed"
    next_status: AwaitingTestDesign
    next_action: "handoff_to_qa_test_design"
    metadata:
      test_design_required: true
      test_levels: ["unit", "integration"]
  
  # Comprehensive: High complexity (3+ indicators)
  - condition: "complexity_indicators >= 3"
    result: Comprehensive
    reasoning: "High complexity requires comprehensive test design including E2E"
    next_status: AwaitingTestDesign
    next_action: "handoff_to_qa_test_design"
    metadata:
      test_design_required: true
      test_levels: ["unit", "integration", "e2e"]
      priority: "high"
  
  # Comprehensive: Security sensitive (any complexity)
  - condition: "security_sensitive == true"
    result: Comprehensive
    reasoning: "Security-sensitive requires comprehensive test design with security focus"
    next_status: AwaitingTestDesign
    next_action: "handoff_to_qa_test_design"
    metadata:
      test_design_required: true
      test_levels: ["unit", "integration", "e2e", "security"]
      priority: "critical"
      security_focus: true

output:
  test_design_level:
    type: enum
    values: [Simple, Standard, Comprehensive]
  reasoning:
    type: string
  next_status:
    type: string
  next_action:
    type: string
  metadata:
    type: object
    properties:
      test_design_required: {type: boolean}
      test_levels: {type: array}
      priority: {type: string}
      security_focus: {type: boolean}

metadata:
  version: "1.0.0"
  last_updated: "2025-01-17"
  owner: "SM Agent"
  related_requirements: ["6.2", "6.4", "6.5"]
  usage_context: >
    Called by SM after Architect review decision. Simple: Skip QA test design.
    Standard/Comprehensive: Handoff to QA for test design.

examples:
  - input: {complexity_indicators: 0, quality_score: 9.0, security_sensitive: false}
    output: {test_design_level: Simple, next_status: TestDesignComplete}
  - input: {complexity_indicators: 1, quality_score: 8.5, security_sensitive: false}
    output: {test_design_level: Standard, next_status: AwaitingTestDesign}
  - input: {complexity_indicators: 4, quality_score: 8.0, security_sensitive: false}
    output: {test_design_level: Comprehensive, next_status: AwaitingTestDesign}
  - input: {complexity_indicators: 1, quality_score: 7.5, security_sensitive: true}
    output: {test_design_level: Comprehensive, next_status: AwaitingTestDesign}
