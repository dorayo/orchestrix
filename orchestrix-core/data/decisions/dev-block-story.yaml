# Dev Decision: Block Story
decision_type: dev-block-story

description: >
  Determine if Dev should block Story implementation due to unclear requirements
  based on issue severity and AC clarity.

inputs:
  - name: issue_description
    type: string
    required: true
  - name: severity
    type: string
    required: true
    enum: [LOW, MEDIUM, HIGH, CRITICAL]
  - name: ac_clarity
    type: number
    required: true

rules:
  # BLOCK: Critical/High severity with unclear AC
  - condition: "(severity == 'CRITICAL' AND ac_clarity <= 5) OR (severity == 'HIGH' AND ac_clarity <= 4)"
    result: BLOCK
    reasoning: "Critical/high severity with unclear AC makes implementation impossible"
    next_status: Blocked
    next_action: "handoff_to_sm_clarify"
    metadata:
      urgency: "immediate"
      feedback_type: "CLARIFICATION"
  
  # BLOCK: Medium severity with very unclear AC
  - condition: "severity == 'MEDIUM' AND ac_clarity <= 3"
    result: BLOCK
    reasoning: "Medium severity with unclear AC should be clarified to avoid rework"
    next_status: Blocked
    next_action: "handoff_to_sm_clarify"
    metadata:
      urgency: "medium"
      feedback_type: "CLARIFICATION"
  
  # BLOCK: Completely unclear AC regardless of severity
  - condition: "ac_clarity <= 2"
    result: BLOCK
    reasoning: "AC too unclear to implement regardless of severity"
    next_status: Blocked
    next_action: "handoff_to_sm_clarify"
    metadata:
      urgency: "high"
      feedback_type: "CLARIFICATION"
      fundamental_clarity_issue: true
  
  # ESCALATE: Critical severity with clear AC
  - condition: "severity == 'CRITICAL' AND ac_clarity > 5"
    result: ESCALATE
    reasoning: "Critical issue with clear AC suggests architectural problem"
    next_status: InProgress
    next_action: "escalate_to_architect"
    metadata:
      urgency: "immediate"
      feedback_type: "ESCALATION"
  
  # FEEDBACK: High/Medium severity with moderately clear AC
  - condition: "(severity == 'HIGH' AND ac_clarity > 4 AND ac_clarity <= 7) OR (severity == 'MEDIUM' AND ac_clarity > 3)"
    result: FEEDBACK
    reasoning: "Issue with moderately clear AC can proceed with documented feedback"
    next_status: InProgress
    next_action: "log_feedback_continue"
    metadata:
      urgency: "medium"
      feedback_type: "ISSUE"
      feedback_target: "SM"
  
  # CONTINUE: Low severity or high clarity
  - condition: "severity == 'LOW' OR ac_clarity >= 8"
    result: CONTINUE
    reasoning: "Low severity or clear AC allows implementation to proceed"
    next_status: InProgress
    next_action: "log_note_continue"
    metadata:
      urgency: "low"
      feedback_type: "NOTE"

output:
  should_block:
    type: boolean
  result:
    type: enum
    values: [BLOCK, ESCALATE, FEEDBACK, CONTINUE]
  reasoning:
    type: string
  next_status:
    type: string
  next_action:
    type: string
  metadata:
    type: object
    properties:
      urgency: {type: string}
      feedback_type: {type: string}
      feedback_target: {type: string}
      fundamental_clarity_issue: {type: boolean}

metadata:
  version: "1.0.0"
  last_updated: "2025-01-17"
  owner: "Dev Agent"
  related_requirements: ["6.2", "6.4", "6.7", "3.1"]
  usage_context: >
    Called by Dev during develop-story when encountering issues. BLOCK: Set Status=Blocked,
    handoff to SM. ESCALATE: Handoff to Architect. FEEDBACK/CONTINUE: Log in Dev Log, proceed.

examples:
  - input: {severity: "HIGH", ac_clarity: 4}
    output: {result: BLOCK, next_status: Blocked}
  - input: {severity: "MEDIUM", ac_clarity: 6}
    output: {result: FEEDBACK, next_status: InProgress}
  - input: {severity: "CRITICAL", ac_clarity: 8}
    output: {result: ESCALATE, next_status: InProgress}
  - input: {severity: "LOW", ac_clarity: 9}
    output: {result: CONTINUE, next_status: InProgress}
