# Dev Decision: Escalate to Architect
decision_type: dev-escalate-architect

description: >
  Determine if Dev should escalate technical deviation or concern to Architect
  based on impact, architectural implications, and security concerns.

inputs:
  - name: deviation_reason
    type: string
    required: true
  - name: impact
    type: string
    required: true
    enum: [LOW, MEDIUM, HIGH, CRITICAL]
  - name: alternatives
    type: string
    required: true
  - name: affects_architecture
    type: boolean
    default: false
  - name: affects_other_services
    type: boolean
    default: false
  - name: security_implications
    type: boolean
    default: false

rules:
  # ESCALATE: Critical impact or security implications
  - condition: "impact == 'CRITICAL' OR security_implications == true"
    result: ESCALATE
    reasoning: "Critical impact or security concerns require immediate Architect review"
    next_action: "escalate_to_architect"
    metadata:
      urgency: "immediate"
  
  # ESCALATE: High impact with architectural concerns
  - condition: "impact == 'HIGH' AND (affects_architecture OR affects_other_services)"
    result: ESCALATE
    reasoning: "High impact architectural changes require Architect validation"
    next_action: "escalate_to_architect"
    metadata:
      urgency: "high"
  
  # ESCALATE: Medium impact affecting architecture/services
  - condition: "impact == 'MEDIUM' AND (affects_architecture OR affects_other_services)"
    result: ESCALATE
    reasoning: "Medium impact architectural changes need Architect review"
    next_action: "escalate_to_architect"
    metadata:
      urgency: "medium"
  
  # ESCALATE: Low impact but affects architecture
  - condition: "impact == 'LOW' AND affects_architecture == true"
    result: ESCALATE
    reasoning: "Even low impact architectural changes need consistency review"
    next_action: "escalate_to_architect"
    metadata:
      urgency: "low"
  
  # DOCUMENT: Low/Medium impact without architectural concerns
  - condition: "impact IN ['LOW', 'MEDIUM'] AND affects_architecture == false AND affects_other_services == false AND security_implications == false"
    result: DOCUMENT
    reasoning: "Low/medium impact without architectural concerns can proceed with documentation"
    next_action: "document_and_proceed"
    metadata:
      urgency: "low"
      requires_qa_review: true

output:
  should_escalate:
    type: boolean
  result:
    type: enum
    values: [ESCALATE, DOCUMENT]
  reasoning:
    type: string
  next_action:
    type: string
  metadata:
    type: object
    properties:
      urgency: {type: string}
      requires_qa_review: {type: boolean}

metadata:
  version: "1.0.0"
  last_updated: "2025-01-17"
  owner: "Dev Agent"
  related_requirements: ["6.2", "6.4", "6.7", "3.3", "3.4"]
  usage_context: >
    Called by Dev during implement-story when needing to deviate from planned approach.
    ESCALATE: Record in Dev Log, add escalation marker, handoff to Architect, wait for
    guidance. DOCUMENT: Record rationale in Dev Log, proceed with implementation.

examples:
  - input: {impact: "HIGH", affects_architecture: true, security_implications: false}
    output: {result: ESCALATE, should_escalate: true}
  - input: {impact: "CRITICAL", affects_architecture: false, security_implications: false}
    output: {result: ESCALATE, should_escalate: true}
  - input: {impact: "LOW", affects_architecture: false, security_implications: false}
    output: {result: DOCUMENT, should_escalate: false}
