# QA Risk Level Decision
#
# Calculates QA risk level to determine review depth and testing strategy.
# Higher risk = more thorough testing, lower risk = streamlined review.

decision_type: qa-risk-level

description: >
  Determine QA review mode based on story complexity, security sensitivity,
  and Dev Gate score. Enables smart simplification for low-risk stories
  while ensuring thorough testing for high-risk ones.

inputs:
  - name: complexity_count
    type: number
    range: 0-7
    source: "Story metadata from SM quality assessment"
    description: "Count of complexity indicators (API changes, DB schema, etc.)"

  - name: security_sensitive
    type: boolean
    source: "Story metadata from SM quality assessment"
    description: "Whether story involves security-related operations"

  - name: dev_gate_score
    type: number
    range: 0-100
    source: "Dev Agent Record self_review.implementation_gate_score"
    description: "Dev's self-review implementation gate score"

  - name: has_ui_changes
    type: boolean
    source: "Detect from story File List (*.tsx, *.jsx, components/, pages/)"
    description: "Whether story includes UI/frontend changes"

  - name: has_api_changes
    type: boolean
    source: "Detect from story File List (routes/, api/, controllers/)"
    description: "Whether story includes API/backend changes"

  - name: test_coverage_level
    type: enum
    values: [high, medium, low, unknown]
    source: "Dev Agent Record or test-design metadata"
    description: "Level of automated test coverage"

outputs:
  - name: risk_level
    type: enum
    values: [LOW, MEDIUM, HIGH]

  - name: review_mode
    type: enum
    values: [automated_only, automated_plus_spot_check, full_testing]

  - name: skip_e2e
    type: boolean
    description: "Whether to skip E2E testing entirely"

  - name: reasoning
    type: string
    description: "Explanation for the risk assessment"

rules:
  # Rule 1: LOW RISK - Minimal review
  # Conditions: Simple story + High quality Dev Gate + No security concerns
  - id: low_risk_simple
    priority: 1
    condition: |
      complexity_count <= 1 AND
      security_sensitive == false AND
      dev_gate_score >= 98 AND
      test_coverage_level in ['high', 'medium']
    result:
      risk_level: LOW
      review_mode: automated_only
      skip_e2e: true
      reasoning: "Low complexity, high Dev Gate score (>=98%), good test coverage. Only automated tests needed."

  # Rule 2: LOW RISK - Library/utility changes
  - id: low_risk_library
    priority: 2
    condition: |
      complexity_count <= 1 AND
      security_sensitive == false AND
      dev_gate_score >= 95 AND
      has_ui_changes == false AND
      has_api_changes == false
    result:
      risk_level: LOW
      review_mode: automated_only
      skip_e2e: true
      reasoning: "Internal library/utility change with no user-facing impact. Automated tests sufficient."

  # Rule 3: MEDIUM RISK - Standard review
  - id: medium_risk_standard
    priority: 3
    condition: |
      complexity_count <= 3 AND
      security_sensitive == false AND
      dev_gate_score >= 95
    result:
      risk_level: MEDIUM
      review_mode: automated_plus_spot_check
      skip_e2e: false
      reasoning: "Moderate complexity, passed Dev Gate. Run automated tests plus spot-check 2-3 key user flows."

  # Rule 4: MEDIUM RISK - UI changes only
  - id: medium_risk_ui_only
    priority: 4
    condition: |
      complexity_count <= 2 AND
      security_sensitive == false AND
      dev_gate_score >= 95 AND
      has_ui_changes == true AND
      has_api_changes == false
    result:
      risk_level: MEDIUM
      review_mode: automated_plus_spot_check
      skip_e2e: false
      reasoning: "UI-only changes. Verify visual rendering and user interactions with spot checks."

  # Rule 5: HIGH RISK - Complex changes
  - id: high_risk_complex
    priority: 5
    condition: |
      complexity_count >= 4
    result:
      risk_level: HIGH
      review_mode: full_testing
      skip_e2e: false
      reasoning: "High complexity (4+ indicators). Full E2E testing required for all scenarios."

  # Rule 6: HIGH RISK - Security sensitive
  - id: high_risk_security
    priority: 6
    condition: |
      security_sensitive == true
    result:
      risk_level: HIGH
      review_mode: full_testing
      skip_e2e: false
      reasoning: "Security-sensitive story. Full testing required including auth, permissions, and data protection."

  # Rule 7: HIGH RISK - Low Dev Gate score
  - id: high_risk_low_gate
    priority: 7
    condition: |
      dev_gate_score < 95
    result:
      risk_level: HIGH
      review_mode: full_testing
      skip_e2e: false
      reasoning: "Dev Gate score below threshold (<95%). Full verification needed."

  # Rule 8: HIGH RISK - Unknown test coverage
  - id: high_risk_no_tests
    priority: 8
    condition: |
      test_coverage_level == 'low' OR test_coverage_level == 'unknown'
    result:
      risk_level: HIGH
      review_mode: full_testing
      skip_e2e: false
      reasoning: "Insufficient automated test coverage. QA must perform comprehensive E2E testing."

  # Default: MEDIUM RISK
  - id: default_medium
    priority: 99
    condition: "true"
    result:
      risk_level: MEDIUM
      review_mode: automated_plus_spot_check
      skip_e2e: false
      reasoning: "Default risk level. Automated tests plus exploratory spot checks."

# Complexity indicators reference (from SM Story Quality assessment)
complexity_indicators:
  - id: api_changes
    patterns: ["endpoint", "REST", "GraphQL", "route", "API"]
  - id: db_schema
    patterns: ["schema", "migration", "table", "column", "database"]
  - id: new_patterns
    patterns: ["new pattern", "design pattern", "architecture change"]
  - id: cross_service
    patterns: ["multiple services", "integration", "microservice"]
  - id: security
    patterns: ["auth", "encryption", "permissions", "PII", "token"]
  - id: performance
    patterns: ["optimization", "caching", "real-time", "latency"]
  - id: core_docs
    patterns: ["data-models.md", "rest-api-spec.md", "architecture"]

# Review mode descriptions
review_modes:
  automated_only:
    description: "Run existing automated tests only. Skip E2E and exploratory testing."
    time_estimate: "1-2 minutes"
    actions:
      - "Run npm test / yarn test"
      - "Verify all tests pass"
      - "Check coverage meets threshold"
      - "Gate decision based on test results"

  automated_plus_spot_check:
    description: "Run automated tests plus 2-3 key user flow spot checks."
    time_estimate: "5-10 minutes"
    actions:
      - "Run npm test / yarn test"
      - "Identify 2-3 most critical user flows from ACs"
      - "Execute spot checks using Playwright/Bash"
      - "Collect evidence for any issues found"
      - "Gate decision based on combined results"

  full_testing:
    description: "Complete E2E testing of all scenarios from test design."
    time_estimate: "15-30 minutes"
    actions:
      - "Run npm test / yarn test"
      - "Execute all P0 and P1 test scenarios"
      - "Test happy paths and error scenarios"
      - "Verify edge cases"
      - "Collect comprehensive evidence"
      - "Gate decision based on all results"
