decision_type: qa-risk-level

description: >
  Determine QA review mode based on story complexity, security sensitivity,
  and Dev Gate score. Higher risk = more thorough testing.

inputs:
  - name: complexity_count
    type: number
    range: 0-7
    source: "Story metadata from SM quality assessment (LLM semantic analysis)"

  - name: security_sensitive
    type: boolean
    source: "Story metadata from SM quality assessment (LLM semantic analysis)"

  - name: dev_gate_score
    type: number
    range: 0-100
    source: "Dev Agent Record self_review.implementation_gate_score"

  - name: has_ui_changes
    type: boolean
    source: "Detect from story File List (*.tsx, *.jsx, components/, pages/)"

  - name: has_api_changes
    type: boolean
    source: "Detect from story File List (routes/, api/, controllers/)"

  - name: test_coverage_level
    type: enum
    values: [high, medium, low, unknown]
    source: "Dev Agent Record or test-design metadata"

outputs:
  - name: risk_level
    type: enum
    values: [LOW, MEDIUM, HIGH]

  - name: review_mode
    type: enum
    values: [automated_only, automated_plus_spot_check, full_testing]

  - name: skip_e2e
    type: boolean

  - name: reasoning
    type: string

rules:
  - id: low_risk_simple
    priority: 1
    condition: |
      complexity_count <= 1 AND
      security_sensitive == false AND
      dev_gate_score >= 98 AND
      test_coverage_level in ['high', 'medium']
    result:
      risk_level: LOW
      review_mode: automated_only
      skip_e2e: true
      reasoning: "Low complexity, high Dev Gate score, good test coverage."

  - id: low_risk_library
    priority: 2
    condition: |
      complexity_count <= 1 AND
      security_sensitive == false AND
      dev_gate_score >= 95 AND
      has_ui_changes == false AND
      has_api_changes == false
    result:
      risk_level: LOW
      review_mode: automated_only
      skip_e2e: true
      reasoning: "Internal library/utility change with no user-facing impact."

  - id: medium_risk_standard
    priority: 3
    condition: |
      complexity_count <= 3 AND
      security_sensitive == false AND
      dev_gate_score >= 95
    result:
      risk_level: MEDIUM
      review_mode: automated_plus_spot_check
      skip_e2e: false
      reasoning: "Moderate complexity, passed Dev Gate."

  - id: medium_risk_ui_only
    priority: 4
    condition: |
      complexity_count <= 2 AND
      security_sensitive == false AND
      dev_gate_score >= 95 AND
      has_ui_changes == true AND
      has_api_changes == false
    result:
      risk_level: MEDIUM
      review_mode: automated_plus_spot_check
      skip_e2e: false
      reasoning: "UI-only changes."

  - id: high_risk_complex
    priority: 5
    condition: "complexity_count >= 4"
    result:
      risk_level: HIGH
      review_mode: full_testing
      skip_e2e: false
      reasoning: "High complexity (4+ indicators)."

  - id: high_risk_security
    priority: 6
    condition: "security_sensitive == true"
    result:
      risk_level: HIGH
      review_mode: full_testing
      skip_e2e: false
      reasoning: "Security-sensitive story."

  - id: high_risk_low_gate
    priority: 7
    condition: "dev_gate_score < 95"
    result:
      risk_level: HIGH
      review_mode: full_testing
      skip_e2e: false
      reasoning: "Dev Gate score below threshold."

  - id: high_risk_no_tests
    priority: 8
    condition: "test_coverage_level == 'low' OR test_coverage_level == 'unknown'"
    result:
      risk_level: HIGH
      review_mode: full_testing
      skip_e2e: false
      reasoning: "Insufficient automated test coverage."

  - id: default_medium
    priority: 99
    condition: "true"
    result:
      risk_level: MEDIUM
      review_mode: automated_plus_spot_check
      skip_e2e: false
      reasoning: "Default risk level."

# Complexity indicators - LLM semantic analysis definitions
# Used by SM during story quality assessment to count complexity_count
complexity_indicators:
  llm_instruction: |
    Analyze story content semantically to detect these 7 indicators.
    Count how many are present (0-7) for complexity_count.

  indicators:
    - id: api_changes
      true_if: Story creates/modifies API endpoints, changes request/response contracts
      false_if: Just calls existing APIs, updates API documentation only

    - id: db_schema
      true_if: Creates/alters tables, columns, indexes, migrations
      false_if: Read-only queries, connection config, ORM usage without schema change

    - id: new_patterns
      true_if: Introduces new architectural patterns, design patterns not used before
      false_if: Uses existing patterns, minor refactoring within existing structure

    - id: cross_service
      true_if: Changes span multiple services, requires coordination across repos
      false_if: Changes contained within single service/module

    - id: security
      true_if: Auth/authz logic, password handling, encryption, permission changes
      false_if: Auth-related UI styling, error messages, documentation

    - id: performance
      true_if: Performance-critical paths, caching logic, real-time requirements
      false_if: General code improvements, non-critical path changes

    - id: core_docs
      true_if: Changes to data-models.md, rest-api-spec.md, architecture docs
      false_if: README updates, code comments, inline documentation

review_modes:
  automated_only:
    description: "Run existing automated tests only."
    time_estimate: "1-2 minutes"

  automated_plus_spot_check:
    description: "Automated tests plus 2-3 key user flow spot checks."
    time_estimate: "5-10 minutes"

  full_testing:
    description: "Complete E2E testing of all scenarios."
    time_estimate: "15-30 minutes"
